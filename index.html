/* v1.5: (1) PACK DE BLOQUE — sexta tarjeta en la galería de plantillas (kind:'pack') que genera UN solo JSON con 3 cuestionarios del mismo bloque (Respuestas trampa + Aplicación práctica + Análisis y razonamiento), 20 preguntas c/u, vía buildPackPromptText. Foco SUAVE hacia objetivos no dominados (focusObjectives, reparto ~60/40 sin excluir el resto del bloque), anti-repetición entre los 3 sets + anti-repetición contra banco previo (arR1..arR4 ON por defecto), clasificación por objetivo. El objeto multi-set por estilo lo importa buildImportPlan SIN cambios. createPackPrompt clona el patrón de createSimulacroPrompt. (2) CAMPO tpl — cada plantilla pide a NotebookLM incrustar la abreviatura del estilo en cada pregunta (RR/ST/RT/AP/AR; pack: RT/AP/AR por cuestionario; simulacro: ninguna). promptTplAbbr + TPL_ID_TO_ABBR. La tarjeta de set muestra estilo (TPL_ABBR/TPL_ABBR_ICON via setTemplateAbbr) y reparto de dificultad real (setDifficultyMix) junto a nº preguntas y fecha → permite quitar el estilo del NOMBRE del set. Retroactivo solo a futuro: los sets viejos no traen tpl. (3) TOGGLE compacto/completo: oculto en pack y simulacro (no tienen versión compacta; antes cambiaba color sin cambiar texto). effMode fuerza 'full' en esos kinds para preview/contador/copiar/descargar. (4) AYUDA sección Progreso reescrita (medición Leitner niveles 1-2-3 umbrales 1,8/2,6 — puntuación SIN cambios; cómo se visualiza; qué hacer en NotebookLM; el catálogo de objetivos va DENTRO del prompt, NO subir tabla aparte). Sincronizada HTML(SECTIONS) + Ayuda_El_Konstructo_v1_5.md. (5) OBJETIVOS: añadido bloque M2-3 (Selección Estratégica de Modelos) a DEFAULT_OBJECTIVES con 3 objetivos derivados de la guía del máster (faltaba; por eso los cuestionarios M2-3.x no clasificaban). OJO: si el navegador tiene objetivos personalizados guardados (quiz_objectives), prevalecen sobre DEFAULT — restaurar por defecto o añadir el bloque a mano en el editor. */
/* v5.36: Cuestionarios — BLOQUE obligatorio de forma ESTRICTA. Sin bloque no se puede copiar ni descargar el prompt: guardBlockRequired (vía promptBlockMissing) bloquea copyPromptToClipboard, downloadPromptPackage, la copia de la vista previa y las descargas directas (mini-barra activo y fila de prompt guardado), mostrando un aviso que redirige a Simulacros (módulo completo) o a Progreso (refuerzo del bloque flojo). El aviso de campos del editor distingue: el Bloque es ⛔ bloqueante; el resto solo degrada a valores genéricos. Exento en Simulacros (kind==='simulacro'). */
/* v5.35: (1) Navegación — pestañas de PRACTICAR numeradas (1. Cuestionarios / 2. Entrenamiento / 3. Simulacros) con subtítulos: Aprender·Después de cada clase / Consolidar·Repaso espaciado / Evaluar·Simular examen. (2) Cabecera (header-row1) — grupo derecho reordenado: universo (La Métrix) → personaje → racha → ⚙️ → ❓ → 🌙 (logo se queda a la izquierda). (3) Entrenamiento — subtítulo "Elige tu programa…" movido a debajo del título y encima de la fila de botones (Revisar/Exportar/selector de cajas). (4) Plantillas reordenadas por exigencia cognitiva creciente: Repaso rápido · Estándar · Respuestas trampa · Aplicación práctica · Análisis y razonamiento. La base por defecto al crear prompts se fija por id (PROMPT_BASE='standard'), no por posición. (5) Plantilla "Errores frecuentes" → "Respuestas trampa" (icono 🎭): distractores que combinan confusiones típicas + casi-correctos por un matiz; dificultad 10/40/50, lenPreg 15/40/65, lenResp 20/20/20, variation 15, cognición reforzada. (6) Cuestionarios — Bloque ahora OBLIGATORIO (asterisco rojo + validación en missingFields); exento en Simulacros (kind==='simulacro'). (7) Refuerzo desde Progreso — startBlockPromptGeneration crea el prompt con kind:'refuerzo' y anti-repetición ACTIVADO por defecto (antirepeat:true + 4 reglas + nombre de fichero sugerido konstructo_preguntas_M{n}-{b}.txt); el editor muestra un aviso explicativo con acceso directo a "⬇ Exportar preguntas.txt". El dispatcher trata 'refuerzo' como cuestionario normal (buildPromptText). */
/* v5.34: (1) Navegación — pestañas de PRACTICAR numeradas (1. Cuestionarios / 2. Entrenamiento / 3. Simulacros) y subtítulos actualizados (Aprender·Después de cada clase / Consolidar·Repaso espaciado / Evaluar·Simular examen). (2) Protagonista (rol) + racha vuelven a la cabecera (header-row1), junto a La Métrix; la fila de navegación queda solo con los dos grupos (antes el bloque envolvía a una segunda línea por el mayor tamaño de la nav agrupada). (3) Eliminada la plantilla de prompt 'exam' (Simulacro de examen) de PROMPT_TEMPLATES: era redundante con la página Simulacros e inducía a error. (4) Cuestionarios SIEMPRE con bloque: retirado el caso sin-bloque del editor (antes "repaso inteligente"); ahora pide indicar bloque y deriva el módulo completo a Simulacros y el refuerzo del punto flojo a Progreso. (5) Progreso — la banda "Tu foco ahora" tiene DOS acciones diferenciadas con textos claros: "▶ Entrenar este bloque" (practicar YA con preguntas existentes, sesión Leitner) y "✨ Generar preguntas nuevas" (crea un prompt y abre Cuestionarios con módulo+bloque prerrellenados para importar material nuevo: startBlockPromptGeneration). El mismo par aparece en el detalle de bloque. (6) Página Cuestionarios reordenada al esqueleto de Simulacros: intro de 3 pasos (Generar → Importar → Practicar), Paso 1 gestor de prompts, Paso 2 caja de importación, Paso 3 ajustes+buscador+listado de sets; la gestión/backup de sets queda al final. */
/* v5.33: SIMULACROS (Opción 4) — nueva página "Simulacros" (evaluar · como en el examen) con esqueleto de 3 pasos compartido con Cuestionarios: Generar → Importar → Realizar. (1) Navegación reorganizada en dos grupos con subtítulos-verbo en orden de ciclo: Practicar (Cuestionarios·Aprender / Entrenamiento·Consolidar / Simulacros·Evaluar) y Resultados (Progreso / Historial); dot de color por rol (teal/púrpura/coral) y responsive (<820px oculta subtítulos y rótulos de grupo). (2) buildSimulacroPromptText: prompt que pide a NotebookLM el OBJETO MULTI-SET POR BLOQUE {"M1-1 Simulacro":[...],...} con obj LOCAL por bloque, catálogo de objetivos agrupado por bloque inline (respaldo) e instrucciones generar-del-contenido/clasificar-con-la-fuente. Dispatcher buildAnyPromptText enruta por p.kind. (3) renderPromptManager(kind) parametrizado: Cuestionarios y Simulacros ven solo sus prompts (kind!=='simulacro' vs ==='simulacro'); botón "Crear prompt de simulacro nuevo"; el editor oculta Bloque/Lección/Foco en modo simulacro y muestra previsualización por bloque. (4) startModuleExam/moduleExamSets: examen de módulo de una sentada que reúne todos los sub-sets M{n}-* del módulo en una sesión combinada con convenciones de examen fijas (freeNav:true, showCorrection:false) y cronómetro regulable (por defecto segundos por pregunta). Resultados con rama propia (repetir simulacro / volver a Simulacros). (5) Import SIN CAMBIOS: el objeto multi-set ya entra por buildImportPlan y objCeil por bloque descarta obj fuera de rango (verificado). (6) Retirado de Cuestionarios el caso sin-bloque simMode==='exam' (el return '' de buildFocusSection y el selector exam/review del editor): sin bloque, Cuestionarios es siempre repaso inteligente; el examen completo vive en su propia página. */
.pe-row{display:flex;align-items:center;gap:12px}
.pe-label{flex:0 0 170px;font-size:12px;color:var(--text2)}
.pe-label strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}
.pe-label small{font-size:11px;color:var(--text3)}
.pe-ctrl{flex:1;display:flex;align-items:center;gap:8px}
.pe-input,.tpl-input{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;color:var(--text);font-family:'Space Grotesk',sans-serif;outline:none;width:100%}
.pe-input:focus,.tpl-input:focus{border-color:var(--accent-border)}
.tpl-input{margin-top:4px}
label .tpl-input{display:block}
.pe-mono{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);min-width:36px;text-align:right}
.pe-divider{height:1px;background:var(--border)}
.diff-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.diff-c{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.diff-c-title{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.diff-c-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.diff-c-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:2px}
.diff-c-fill{height:100%;border-radius:2px;transition:width .2s}
.len-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.len-c{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.len-c-title{font-size:11px;color:var(--text2);margin-bottom:8px}
.len-c-field{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.len-c-field label{font-size:11px;color:var(--text3);flex:0 0 52px}
.len-c-field input{width:54px;font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;text-align:right;outline:none}
.len-c-field span{font-size:11px;color:var(--text3)}
.pe-select{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;color:var(--text);font-family:'Space Grotesk',sans-serif;cursor:pointer;outline:none}
.pe-textarea{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 11px;font-size:12px;font-family:'DM Mono',monospace;line-height:1.7;color:var(--text);resize:vertical;width:100%;min-height:68px;outline:none}
.pe-textarea:focus{border-color:rgba(255,255,255,.3)}
.preview-wrap{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);line-height:1.8;position:relative;white-space:pre-wrap;word-break:break-word}
.preview-wrap.collapsed{max-height:110px;overflow:hidden}
.preview-fade{position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(transparent,var(--surface3));pointer-events:none}
.preview-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 0 2px;font-size:11px;color:var(--text3);user-select:none;border-top:1px solid var(--border);margin-top:6px}
.preview-toggle:hover{color:var(--text2)}
.pe-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
.btn-change-tpl{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .15s}
.btn-change-tpl:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
/* Template modal */
.tpl-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}
.tpl-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto}
.tpl-modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.tpl-modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
/* ── Guía "Léeme" ─────────────────────────────────────────────────────────── */
.guide-modal{width:720px;max-width:96vw;max-height:90vh}
.guide-intro{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:20px}
.guide-toc{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.guide-toc-chip{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--accent-subtle);border:1px solid var(--accent-border);color:var(--accent);cursor:pointer;transition:all .15s}
.guide-toc-chip:hover{background:rgba(var(--accent-rgb),.16)}
.guide-section{margin-bottom:26px;scroll-margin-top:8px}
.guide-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--accent-border)}
.guide-section-icon{font-size:20px;flex-shrink:0}
.guide-section-title{font-size:16px;font-weight:700;color:var(--accent)}
.guide-p{font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.guide-p strong{color:var(--text);font-weight:600}
.guide-steps{list-style:none;counter-reset:gstep;margin:8px 0 12px}
.guide-steps>li{counter-increment:gstep;position:relative;padding-left:34px;margin-bottom:10px;font-size:13.5px;color:var(--text2);line-height:1.6}
.guide-steps>li::before{content:counter(gstep);position:absolute;left:0;top:0;width:24px;height:24px;border-radius:50%;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.guide-list{list-style:none;margin:6px 0 12px}
.guide-list li{position:relative;padding-left:18px;margin-bottom:7px;font-size:13.5px;color:var(--text2);line-height:1.6}
.guide-list li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:12px}
.guide-list li strong{color:var(--text);font-weight:600}
.guide-tip{background:var(--accent-subtle);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;font-size:12.5px;color:var(--text2);line-height:1.6;margin:10px 0}
.guide-tip strong{color:var(--accent)}
.guide-box-legend{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.guide-box{flex:1;min-width:150px;border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border)}
.guide-box-1{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
.guide-box-2{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.guide-box-3{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.guide-box-name{font-size:12px;font-weight:700;margin-bottom:3px}
.guide-box-1 .guide-box-name{color:#ef4444}
.guide-box-2 .guide-box-name{color:#f59e0b}
.guide-box-3 .guide-box-name{color:#22c55e}
.guide-box-desc{font-size:11.5px;color:var(--text2);line-height:1.5}
/* ===== Guía navegable v1.1: índice lateral + secciones colapsables + buscador ===== */
.guide-search{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;margin-bottom:16px}
.guide-search input{background:none;border:none;outline:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;width:100%}
.guide-search input::placeholder{color:var(--text3)}
.guide-search-ico{color:var(--text3);font-size:13px}
.guide-allbtns{display:flex;gap:7px;margin-left:auto}
.guide-allbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:5px 11px;font-size:11px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s}
.guide-allbtn:hover{border-color:var(--accent-border);color:var(--text)}
.guide-layout{display:flex;gap:18px;align-items:flex-start}
.guide-nav{width:212px;flex-shrink:0;position:sticky;top:0;align-self:flex-start;border-right:1px solid var(--border);padding-right:8px}
.guide-navitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent;line-height:1.25;margin-bottom:2px}
.guide-navitem:hover{background:var(--surface2);color:var(--text)}
.guide-navitem.active{background:var(--accent-subtle);color:var(--accent);border-left-color:var(--accent)}
.guide-navnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;width:16px}
.guide-navico{font-size:14px;flex-shrink:0}
.guide-navgroup{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:14px 10px 5px;opacity:.75}
.guide-navgroup:first-child{padding-top:2px}
.guide-main{flex:1;min-width:0}
.guide-section-head{cursor:pointer;user-select:none}
.guide-section-head .guide-chev{margin-left:auto;color:var(--text3);font-size:14px;transition:transform .2s}
.guide-section.collapsed .guide-chev{transform:rotate(-90deg)}
.guide-section-body{overflow:hidden}
.guide-section.collapsed .guide-section-body{display:none}
.guide-hl{background:rgba(var(--accent-rgb),.22);color:var(--text);border-radius:3px;padding:0 1px}
.guide-noresults{padding:28px;text-align:center;color:var(--text3);font-size:13px}
.guide-secret{background:rgba(167,139,250,.08);border-left:3px solid #a78bfa;border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;font-size:12.5px;color:var(--text2);line-height:1.6;margin:10px 0}
.guide-secret strong{color:#a78bfa}
.guide-warn{background:rgba(245,158,11,.08);border-left:3px solid #f59e0b;border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;font-size:12.5px;color:var(--text2);line-height:1.6;margin:10px 0}
.guide-warn strong{color:#f59e0b}
.guide-sub{font-size:12px;font-weight:700;color:var(--text);margin:18px 0 6px;font-family:'DM Mono',monospace;letter-spacing:.3px;text-transform:uppercase}
.guide-pill{display:inline-block;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:1px 7px;font-size:11.5px;font-family:'DM Mono',monospace;color:var(--accent);margin:0 1px}
@media(max-width:680px){.guide-layout{flex-direction:column}.guide-nav{width:100%;position:static;border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:8px;display:flex;flex-wrap:wrap;gap:4px}.guide-navitem{margin-bottom:0}.guide-navgroup{flex-basis:100%;padding:6px 4px 2px}}
.tpl-grid{display:flex;flex-direction:column;gap:8px}
.tpl-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;gap:12px;align-items:flex-start}
.tpl-card:hover{border-color:var(--accent-border);background:rgba(var(--accent-rgb),.03)}
.tpl-card-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.tpl-card-info{flex:1}
.tpl-card-name{font-size:14px;font-weight:700;margin-bottom:3px}
.tpl-card-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.tpl-card-meta{display:flex;gap:8px;flex-wrap:wrap}
.tpl-meta-pill{background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:10px;color:var(--text2);font-family:'DM Mono',monospace}
.tpl-scratch{border:2px dashed var(--border2);background:transparent}
.tpl-scratch:hover{border-color:var(--accent-border);background:rgba(var(--accent-rgb),.03)}
/* ── Sistema de secciones uniformes del gestor de prompts ──────────────────
   Las cuatro zonas (Activo, Crear desde cero, Crear desde plantilla, Guardados)
   comparten la misma anatomía: contenedor + cabecera (icono · título · derecha) + cuerpo. */
.psec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.psec-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius)}
.psec-head:not(:last-child){border-radius:var(--radius) var(--radius) 0 0}
.psec-head.clickable{cursor:pointer;user-select:none}
.psec-head.clickable:hover{background:var(--surface2)}
.psec-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--surface3);color:var(--text2)}
.psec-ico.accent{background:rgba(var(--accent-rgb),.14);color:var(--accent)}
.psec-ttl{font-size:13.5px;font-weight:700;color:var(--text);flex:1;min-width:0;display:flex;align-items:baseline;gap:7px;overflow:hidden}
.psec-ttl .psec-sub{font-size:11px;color:var(--text3);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.psec-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.psec-chev{font-size:14px;color:var(--text3);transition:transform .15s;line-height:1}
.psec-chev.closed{transform:rotate(-90deg)}
.psec-body{padding:0 14px 14px}
.psec-mini{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.psec-mini:hover{border-color:var(--accent-border);color:var(--text)}
.psec-mini.green{color:var(--green)}
.psec-pill{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;background:rgba(var(--accent-rgb),.1);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.25)}
/* Menú de copia compacto/completo */
.copy-menu-wrap{position:relative;display:inline-flex}
.copy-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px;z-index:30;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.copy-menu.up{top:auto;bottom:calc(100% + 4px)}
.copy-menu-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;cursor:pointer;color:var(--text);font-size:12px;white-space:nowrap}
.copy-menu-item:hover{background:var(--surface2)}
.copy-menu-item .cm-words{margin-left:auto;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
/* Galería de plantillas (rejilla dentro de su sección) */
.tpl-inline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.tpl-mini{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;cursor:pointer;background:var(--surface2);transition:all .15s}
.tpl-mini:hover{border-color:var(--accent-border);background:rgba(var(--accent-rgb),.04)}
.tpl-mini-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.tpl-mini-icon{font-size:16px;flex-shrink:0}
.tpl-mini-name{font-size:13px;font-weight:700;color:var(--text)}
.tpl-mini-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.tpl-mini-meta{display:flex;gap:4px;flex-wrap:wrap}
.tpl-mini-badge{font-size:9px;font-family:'DM Mono',monospace;color:var(--text2);background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:2px 7px}
.module-id-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.module-id-field{display:flex;flex-direction:column;gap:4px}
.module-id-field label{font-size:11px;color:var(--text3)}
.module-id-preview{font-size:11px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace}
.module-id-preview span{color:var(--accent)}
/* Antirepeat matrix block */
.antirepeat-block{background:rgba(var(--accent-rgb),.04);border:1px solid var(--accent-strong);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:10px}

<div class="app" id="root"></div>

<script>
/* ===== El Konstructo · v1.8 ===== */
const {useState,useEffect,useRef} = React;

// -- Leitner helpers ──────────────────────────────────────────────────────────
function getLeitner(){try{return JSON.parse(localStorage.getItem('quiz_leitner')||'{}')}catch{return{}}}
function saveLeitner(d){localStorage.setItem('quiz_leitner',JSON.stringify(d))}

// One-time migration: promote cards that already earned promotion under old streak>=2 rule
// Now that streak>=1 is enough, any card with streak>=1 stuck at level 1 or 2 gets promoted.
function migrateLeitnerIfNeeded(){
  const MIGRATION_KEY='quiz_leitner_migrated_v1';
  if(localStorage.getItem(MIGRATION_KEY))return;
  const d=getLeitner();
  let changed=false;
  Object.keys(d).forEach(k=>{
    const e=d[k];
    if(!e)return;
    if(e.level===1&&e.streak>=1){d[k]={...e,level:2};changed=true;}
    else if(e.level===2&&e.streak>=1){d[k]={...e,level:3};changed=true;}
  });
  if(changed)saveLeitner(d);
  localStorage.setItem(MIGRATION_KEY,'1');
}
let __uidCounter=0;
function makeQUid(){return 'q'+Date.now().toString(36)+'-'+(__uidCounter++).toString(36)+'-'+Math.random().toString(36).slice(2,7)}
// Sella un uid único e inmutable en cada pregunta que no lo tenga (identidad Leitner por instancia)
function sealUids(sets){
  let changed=false;
  const out=sets.map(s=>({...s,questions:(s.questions||[]).map(q=>{
    if(q&&q.uid)return q;
    changed=true;return {...q,uid:makeQUid()};
  })}));
  return {sets:out,changed};
}
function getQKey(q){return q.uid||q.id||(q.question||'').slice(0,80)}
function getLeitnerLevel(q){const d=getLeitner();return(d[getQKey(q)]||{level:1,streak:0}).level}

// -- Objetivos de aprendizaje (Fase 1: B + híbrido) ───────────────────────────
// Estructura: { moduleKey(M2/T1...) -> { blockNum("1","2"...) -> [objetivo,...] } }
// El vínculo pregunta<->objetivo es HÍBRIDO: por bloque (parseSetGroup) como base
// robusta; si una pregunta trae q.obj (fase C) se usará para refinar dentro del bloque.
// v1.8: títulos descriptivos del temario (fuente: Excel del máster). Usados en la
// tarjeta compartible de maestría. Claves alineadas con DEFAULT_OBJECTIVES.
const MODULE_TITLES={
  M1:"Fundamentos de IA, Estrategia y Casos de Negocio",
  M2:"Ecosistema LLM y Prompt Engineering Avanzado",
  M3:"Outputs Profesionales y Estandarización Documental",
  M4:"Asistentes Corporativos y Arquitectura RAG",
  M5:"Analítica de Datos Asistida y Cuadros de Mando",
  M6:"Automatización No-Code y Orquestación de Procesos",
  M7:"Agentes Departamentales y Flujos Autónomos",
  M8:"Multimodalidad Avanzada Aplicada a Operaciones",
  M9:"Implementación Profesional, Gobernanza y Gestión del Cambio",
  T1:"Productividad y Organización con IA",
  T2:"Marketing y Creación de Contenido con IA",
  T3:"Carrera Profesional y Empleabilidad con IA",
  T4:"IA Aplicada al Análisis Financiero",
  T5:"Emprendimiento y Creación de Producto con IA"
};
const DEFAULT_OBJECTIVES={"M1":{"1":["Comprender la evolución histórica de la IA y el salto de los sistemas expertos a los LLMs.","Diferenciar entre Machine Learning clásico, Deep Learning e IA generativa, entendiendo qué cambia realmente a nivel tecnológico y de uso.","Identificar el ecosistema actual de la IA, sus principales actores y las tendencias que están marcando su desarrollo y adopción profesional."],"2":["Identificar oportunidades reales de aplicación de la IA en procesos clave de la empresa.","Evaluar el impacto y priorizar proyectos de IA según valor y viabilidad.","Comprender los niveles de madurez en la adopción de IA y las principales barreras organizativas para avanzar en un roadmap estratégico."],"3":["Definir KPIs y métricas de éxito alineadas con los objetivos del negocio.","Construir un cuadro de métricas que permita evaluar el impacto real de iniciativas de IA.","Identificar riesgos asociados a los proyectos y diseñar planes de mitigación para garantizar su viabilidad y sostenibilidad."]},"M2":{"1":["Comprender cómo funcionan internamente los LLMs, incluyendo tokenización, embeddings y gestión del contexto.","Entender cómo influyen los parámetros de generación en el comportamiento del modelo en entornos reales.","Diferenciar entre generación determinista y estocástica para tomar decisiones informadas en aplicaciones empresariales."],"2":["Diseñar prompts profesionales y robustos adaptados a contextos empresariales reales.","Aplicar técnicas avanzadas de prompt engineering como zero-shot, few-shot, chain-of-thought y self-consistency para mejorar la calidad y fiabilidad de las respuestas.","Utilizar el prompt engineering como herramienta de control, razonamiento y estandarización de outputs en sistemas de IA en producción."],"3":["Comparar los principales proveedores de modelos fundacionales según sus capacidades y características operativas.","Evaluar modelos según criterios económicos y técnicos como coste por token, latencia, privacidad y capacidad multimodal.","Decidir la arquitectura de despliegue adecuada (nube pública, privada o local) según los requisitos de privacidad y el caso de uso."]},"M3":{"1":["Comprender las tipologías de entregables corporativos y cómo modelarlos para su generación con IA.","Diseñar plantillas documentales parametrizadas que aseguren consistencia, formato y reutilización.","Construir flujos de procesamiento que transformen información inicial en documentos profesionales completos listos para su uso operativo."],"2":["Analizar y definir el tono comunicativo adecuado según contexto, audiencia y tipo de documento.","Integrar guías de estilo corporativas y control de tono dentro del system prompt para la generación de contenidos con IA.","Garantizar coherencia comunicativa en la generación de múltiples documentos en serie, manteniendo identidad y consistencia de marca."],"3":["Aplicar frameworks de revisión ágil para validar documentos generados con IA mediante checklists, muestreo y validación cruzada.","Detectar alucinaciones factuales, sesgos y errores en documentos largos.","Evaluar la calidad de los outputs documentales utilizando métricas de fidelidad, coherencia, completitud y relevancia."],"4":["Aplicar la IA a la automatización de informes ejecutivos y reportes de seguimiento en contextos reales.","Diseñar sistemas de generación y validación de documentos profesionales a escala, garantizando calidad, coherencia y control en briefings, memos y análisis corporativos."]},"M4":{"1":["Identificar las limitaciones reales de los LLMs sin acceso a datos internos y justificar cuándo es necesario aplicar RAG en contextos empresariales.","Comprender y diseñar la arquitectura RAG completa, entendiendo cada etapa del pipeline.","Dominar los fundamentos de los embeddings y la búsqueda vectorial para recuperar contexto relevante y generar respuestas fiables y controladas."],"2":["Seleccionar y evaluar fuentes documentales de calidad para construir una base RAG sólida y fiable.","Diseñar y aplicar estrategias eficaces de chunking, ajustando tamaño y solapamiento según el caso de uso.","Limpiar y enriquecer los documentos con metadatos y jerarquías, dejando un dataset listo para su uso en asistentes RAG profesionales."],"3":["Diseñar system prompts restrictivos y reglas de comportamiento que garanticen un uso seguro y controlado de asistentes RAG en entornos empresariales.","Implementar mecanismos de citación de fuentes y trazabilidad que vinculen cada respuesta con su documento de origen.","Evaluar el rendimiento de asistentes RAG mediante métricas de precisión, relevancia y cobertura, aplicando benchmarks y testing para validar su fiabilidad antes de producción."]},"M5":{"1":["Estandarizar y limpiar datos corporativos para su uso en sistemas de IA.","Aplicar técnicas de anonimización y enmascaramiento de PII.","Preparar datasets tabulares listos para análisis, asistentes y automatizaciones en entornos empresariales."],"2":["Formular preguntas en lenguaje natural para explorar datos corporativos de forma analítica.","Detectar automáticamente segmentos, patrones y anomalías en datasets empresariales.","Interpretar KPIs mediante el análisis de correlaciones, tendencias y relaciones causales para generar insights accionables."],"3":["Integrar IA con herramientas de Business Intelligence como Power BI y Excel para generar narrativas automáticas e insights sobre datos.","Automatizar resúmenes, predicciones y análisis de KPIs.","Diseñar cuadros de mando auto-resumidos que propongan acciones a partir de los resultados."],"4":["Analizar casos reales de aplicación de la IA en analítica de datos empresarial.","Aplicar IA al análisis exploratorio de datos y a la generación automática de insights y decisiones a partir de dashboards."]},"M6":{"1":["Comprender el ecosistema de plataformas de automatización no-code y seleccionar la herramienta adecuada según el caso de uso.","Diseñar flujos de automatización utilizando conceptos clave como triggers, acciones, filtros e iteradores.","Integrar APIs sin código mediante conectores y webhooks para automatizar procesos empresariales de extremo a extremo."],"2":["Integrar módulos de inferencia LLM en plataformas no-code para tomar decisiones dentro de flujos automatizados.","Aplicar IA a micro-decisiones empresariales como clasificación, priorización y extracción de datos.","Diseñar flujos event-driven que evolucionen de asistentes guiados a procesos autónomos de extremo a extremo."],"3":["Monitorizar flujos automatizados mediante logs y mecanismos de observabilidad.","Gestionar errores con reintentos, rutas alternativas y alertas automáticas.","Validar flujos antes de producción mediante testing, simulación y análisis de edge cases."]},"M7":{"1":["Comprender la arquitectura y los componentes clave de un agente de IA moderno, incluyendo planificación, memoria, ejecución y evaluación.","Diferenciar entre agentes reactivos, deliberativos e híbridos y seleccionar el enfoque adecuado según el caso de uso.","Entender el ciclo operativo de un agente y cómo se implementa su toma de decisiones de forma estructurada."],"2":["Comprender cómo un agente de IA invoca herramientas y funciones externas mediante tool-calling.","Diseñar y estructurar un catálogo de herramientas con inputs, outputs y restricciones claras.","Construir y evaluar agentes multi-herramienta capaces de combinar búsqueda, consulta de bases internas y generación de entregables como briefings operativos."],"3":["Definir matrices de permisos que regulen qué acciones puede ejecutar un agente de forma autónoma y cuáles requieren validación humana.","Diseñar e implementar flujos de aprobación human-in-the-loop para controlar decisiones críticas.","Gestionar riesgos operativos mediante límites, mecanismos de contención y supervisión de fallos en agentes de IA."]},"M8":{"1":["Comprender las capacidades actuales de los modelos de visión por IA y sus usos operativos.","Diseñar prompts visuales para extraer información estructurada de planos, diagramas y documentos fotografiados.","Aplicar OCR inteligente para transformar documentos escaneados en información comprensible y utilizable en procesos empresariales."],"2":["Aplicar modelos de transcripción automática para convertir audio y reuniones en texto estructurado.","Analizar conversaciones mediante diarización, detección de sentimiento y extracción de temas clave.","Extraer información crítica como acuerdos, compromisos y próximos pasos para su uso operativo y documental."],"3":["Comprender la arquitectura de un pipeline multimodal y cómo combinar distintas modalidades de entrada y salida.","Diseñar casos de uso que integren audio, imagen y documentos para generar outputs operativos automatizados.","Identificar las limitaciones actuales de los sistemas multimodales y aplicar criterios de control para reducir errores y alucinaciones."]},"M9":{"1":["Comprender el marco regulatorio europeo de la IA, incluyendo el AI Act y sus implicaciones prácticas en entornos empresariales.","Identificar los riesgos asociados al uso de LLMs en relación con GDPR y el tratamiento de datos personales sensibles.","Prevenir riesgos de shadow-IT y fugas de propiedad intelectual mediante criterios claros de gobernanza y uso responsable de la IA."],"2":["Redactar y diseñar una política de IA generativa adaptada a una empresa.","Definir matrices de uso seguro de LLM que establezcan qué información puede utilizarse y bajo qué condiciones.","Evaluar el cumplimiento mediante auditorías internas y mecanismos de trazabilidad del uso de IA en la organización."],"3":["Impulsar la adopción interna de la IA mediante estrategias de evangelización y comunicación efectiva.","Diseñar acciones formativas para usuarios no técnicos que faciliten el uso real de las herramientas.","Gestionar la resistencia al cambio y medir el impacto de la IA a través de métricas de adopción, eficiencia y reducción de errores."]},"T1":{"1":["Analizar la jornada laboral del alumno para identificar tareas repetitivas o de bajo valor, estructurarlas en un mapa de tareas optimizables y rediseñar una jornada de trabajo más eficiente mediante el uso de Copilot, integrando de forma inteligente correos, reuniones y tareas diarias."],"2":["Definir objetivos analíticos claros y detectar tareas de explotación de datos susceptibles de automatización, aplicando Copilot sobre un conjunto de datos concreto para optimizar su análisis, reducir trabajo manual y facilitar la obtención de resultados útiles para la toma de decisiones."],"3":["Definir de forma integral un proyecto susceptible de optimización, identificar y estructurar un mapa de tareas automatizables y aplicar soluciones prácticas mediante IA Agents y Copilot Notebook para mejorar la planificación, la ejecución y el seguimiento del proyecto en un entorno real."]},"T2":{"1":["Diseñar una estrategia de contenidos coherente y orientada a objetivos, definiendo la estructura y los tipos de contenido más adecuados, y analizar audiencias en distintos formatos mediante el uso de IA para alinear mensajes, canales y formatos con las necesidades reales del público objetivo."],"2":["Generar contenidos parciales a partir de materiales multimedia dispersos y construir nuevo contenido optimizado mediante el uso de IA, integrando distintos formatos y mejorando la calidad, coherencia y eficiencia del proceso de creación de contenido digital."],"3":["Optimizar el posicionamiento del contenido generado mediante el uso de IA, identificando aspectos clave de mejora en visibilidad y alcance, y aplicando técnicas de optimización orientadas a maximizar el impacto del contenido en buscadores y plataformas digitales."]},"T3":{"1":["Comprender el impacto real de la IA en el mercado laboral actual, identificar qué esperan las empresas de los profesionales en este nuevo contexto y redefinir la empleabilidad propia mediante el uso estratégico de asistentes de IA, construyendo un sistema personal de apoyo a la toma de decisiones y al desarrollo de la carrera profesional."],"2":["Construir un posicionamiento profesional sólido y competitivo mediante la optimización de CV y perfil de LinkedIn orientados a conversión, el uso de IA como entrenador de entrevistas y apoyo en mensajes y negociación, y el diseño de un plan de mejora de 30 días enfocado a resultados medibles."]},"T4":{"1":["Comprender los principales ámbitos de aplicación de la IA en el análisis financiero y utilizar herramientas de IA para la búsqueda, seguimiento y control de información procedente de fuentes relevantes, estructurando un sistema básico de apoyo al análisis y a la toma de decisiones financieras."],"2":["Seleccionar y acceder de forma eficiente a fuentes macroeconómicas relevantes mediante el uso de IA, y diseñar un asistente inteligente capaz de sintetizar información compleja y generar insights macroeconómicos útiles para el análisis y la toma de decisiones financieras."],"3":["Seleccionar y analizar fuentes microeconómicas relevantes, como memorias corporativas y fuentes públicas, utilizando IA para estructurar la información y construir un asistente inteligente capaz de generar insights útiles sobre empresas y mercados que apoyen el análisis financiero y la toma de decisiones."],"4":["Diseñar un modelo básico de análisis de riesgo financiero apoyado en IA y construir un simulador inteligente que permita evaluar escenarios, identificar riesgos y apoyar la toma de decisiones en la gestión de carteras de forma más informada y sistemática."]},"T5":{"1":["Identificar oportunidades reales de negocio, formularlas de manera clara en una propuesta conceptual concisa y construir un mapa de oportunidades utilizando IA, analizando la viabilidad de distintas ideas de forma asistida para seleccionar, con criterio y datos, la idea más sólida sobre la que desarrollar un producto."],"2":["Diseñar un MVP funcional alineado con la oportunidad de negocio seleccionada y definir métricas claras de seguimiento que permitan evaluar su desempeño, validar hipótesis clave y orientar la toma de decisiones sobre la evolución del producto desde las primeras fases."],"3":["Construir un prototipo funcional del MVP seleccionado y definir métricas de validación claras que permitan testar el producto con usuarios reales, recoger feedback relevante y evaluar de forma objetiva si la solución resuelve el problema identificado y merece avanzar hacia su lanzamiento o iteración."],"4":["Analizar de forma iterativa los resultados obtenidos a partir del uso del MVP mediante herramientas de IA, integrar feedback real de usuarios y refinar progresivamente la solución hasta alcanzar un prototipo óptimo, validado y listo para su lanzamiento o evolución hacia una siguiente fase de producto."]}};
function getObjectives(){
  try{const s=JSON.parse(localStorage.getItem('quiz_objectives')||'null');return (s&&typeof s==='object')?s:DEFAULT_OBJECTIVES;}
  catch{return DEFAULT_OBJECTIVES;}
}
function saveObjectives(o){localStorage.setItem('quiz_objectives',JSON.stringify(o));}
function resetObjectives(){localStorage.removeItem('quiz_objectives');}
function hasCustomObjectives(){return !!localStorage.getItem('quiz_objectives');}
// Objetivos de un módulo concreto -> { blockNum -> [obj] }  (o {} si no hay)
function objectivesForModule(moduleKey){const o=getObjectives();return (o&&o[moduleKey])||{};}
// Objetivos de un bloque concreto (moduleKey, blockNum) -> [obj]
function objectivesForBlock(moduleKey,blockNum){const m=objectivesForModule(moduleKey);return (m&&m[String(blockNum)])||[];}
// ── COBERTURA DE OBJETIVOS DE UN MÓDULO (base de la maestría y la tarjeta) ─────
// Un objetivo cuenta como DOMINADO solo si está MEDIDO (tiene preguntas propias con
// q.obj) y su media Leitner ≥ MASTERY_THRESHOLD. Los objetivos "estimados" (sin
// preguntas etiquetadas, dominio heredado del bloque) NO cuentan: para sellar el
// módulo el alumno debe haber practicado de verdad cada objetivo. Decisión de diseño.
// Devuelve {total, mastered, blocks, totalBlocks} donde total = nº de objetivos del
// catálogo del módulo, mastered = cuántos están medidos y dominados, blocks = nº de
// bloques con TODOS sus objetivos dominados, totalBlocks = nº de bloques del catálogo.
function moduleObjectiveCoverage(sets,leitner,moduleKey){
  const byBlock=objectivesForModule(moduleKey); // { "1":[obj...], "2":[...] }
  const blockNums=Object.keys(byBlock);
  let total=0, mastered=0, fullBlocks=0;
  blockNums.forEach(bk=>{
    const objs=byBlock[bk]||[];
    const fine=blockObjectiveMastery(blockQuestions(sets,leitner,moduleKey,bk)); // {objNum:{avg,n,box}}|null
    let blockMastered=objs.length>0;
    objs.forEach((o,i)=>{
      total++;
      const num=i+1;
      const fm=(fine&&fine[num]&&fine[num].n>0)?fine[num]:null;
      const ok=!!fm&&isMastered(fm.avg,fm.n);
      if(ok)mastered++; else blockMastered=false;
    });
    if(blockMastered)fullBlocks++;
  });
  return {total, mastered, blocks:fullBlocks, totalBlocks:blockNums.length};
}
// ¿Está el módulo COMPLETO? (todos sus objetivos del catálogo medidos y dominados).
// Exige que el módulo tenga objetivos definidos y al menos un objetivo (total>0).
function isModuleSealed(sets,leitner,moduleKey){
  const c=moduleObjectiveCoverage(sets,leitner,moduleKey);
  return c.total>0 && c.mastered===c.total;
}
// Total de preguntas importadas de un módulo (para la métrica de la tarjeta).
function moduleQuestionCount(sets,moduleKey){
  let n=0;
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    n+=((s.questions||[]).length);
  });
  return n;
}
// Lista de módulos/tracks actualmente sellados (claves M1..T5). Para ofrecer tarjeta.
function sealedModules(sets,leitner){
  const o=getObjectives();
  return Object.keys(o).filter(mk=>isModuleSealed(sets,leitner,mk));
}
// Parser de .md de objetivos -> misma estructura. Tolerante: Módulo N / Track N, Bloque N.
function parseObjectivesMd(text){
  const lines=String(text||'').split(/\r?\n/);
  const res={};let curMod=null,curBlock=null;
  const flush=()=>{};
  for(const ln of lines){
    const mMod=ln.match(/^###\s+M[oó]dulo\s+(\d+)/i);
    const mTrk=ln.match(/^###\s+Track\s+(\d+)/i);
    if(mMod||mTrk){curMod=(mMod?'M':'T')+(mMod||mTrk)[1];curBlock=null;if(!res[curMod])res[curMod]={};continue;}
    const mB=ln.match(/^\s*[-*]\s*\*\*Bloque\s+(\d+)\s*[—-]/i);
    if(mB){curBlock=mB[1];if(curMod){if(!res[curMod])res[curMod]={};if(!res[curMod][curBlock])res[curMod][curBlock]=[];}continue;}
    if(curMod&&curBlock&&/^\s{2,}[-*]\s+/.test(ln)){
      let t=ln.replace(/^\s*[-*]\s+/,'').trim();
      if(t.startsWith('*(')||t.startsWith('(Sin'))continue;
      t=t.replace(/^\*+|\*+$/g,'').trim();
      if(t)res[curMod][curBlock].push(t);
    }
  }
  // limpiar vacíos
  Object.keys(res).forEach(mk=>{Object.keys(res[mk]).forEach(bk=>{if(!res[mk][bk].length)delete res[mk][bk];});if(!Object.keys(res[mk]).length)delete res[mk];});
  return res;
}
// Dominio Leitner medio (1..3) de las preguntas de un bloque dado.
// Devuelve {avg, n} ; n=0 si no hay preguntas de ese bloque importadas todavía.
function blockMasteryLevel(sets,leitner,moduleKey,blockNum){
  let sum=0,n=0;
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    // block viene como "M2-1"; comparamos su parte numérica con blockNum
    const bn=(g.block||'').split('-')[1];
    if(String(bn)!==String(blockNum))return;
    (s.questions||[]).forEach(q=>{sum+=(leitner[getQKey(q)]||{level:1}).level;n++;});
  });
  return {avg:n?sum/n:0,n};
}
// -- Pantalla "Tu dominio actual del temario" (Pieza 2) ────────────────────────────────────────────
// Semáforo de dominio COMPARTIDO por todo el mapa (celdas y objetivos finos).
// Mismos umbrales que el panel de objetivos: gris sin practicar / rojo<1.8 /
// ámbar 1.8–2.6 / verde≥2.6. Devuelve {color,label} para no repetir la lógica.
function masteryTone(avg,n){
  if(!n)return {color:'var(--text3)',label:'sin practicar'};
  if(avg>=2.6)return {color:'var(--green)',label:'dominado'};
  if(avg>=1.8)return {color:'var(--orange)',label:'consolidando'};
  return {color:'var(--red)',label:'por reforzar'};
}
// ── ESTILO DEL SET (plantilla + reparto de dificultad) ────────────────────────
// La plantilla viaja DENTRO del JSON: cada pregunta puede traer un campo `tpl` con
// la abreviatura que el prompt pidió a NotebookLM (RR/ST/RT/AP/AR/PB). El importador
// lo conserva al sellar (copia todos los campos de la pregunta). Aquí se traduce.
const TPL_ABBR={RR:'Repaso rápido',ST:'Estándar',RT:'Respuestas trampa',AP:'Aplicación práctica',AR:'Análisis y razonamiento',PB:'Pack de bloque'};
const TPL_ABBR_ICON={RR:'⚡',ST:'📋',RT:'🎭',AP:'🔧',AR:'🔍',PB:'📦'};
// Lee la abreviatura del set (la primera pregunta que la traiga). '' si ninguna.
function setTemplateAbbr(set){
  const qs=(set&&set.questions)||[];
  for(const q of qs){ const t=(q&&q.tpl||'').toString().trim().toUpperCase(); if(t&&TPL_ABBR[t])return t; }
  return '';
}
// Reparto de dificultad REAL del set (cuenta los difficulty de las preguntas).
// Devuelve {easy,med,hard} en % redondeado, o null si no hay difficulty utilizable.
function setDifficultyMix(set){
  const qs=(set&&set.questions)||[];
  let e=0,m=0,h=0,n=0;
  qs.forEach(q=>{
    const d=(q&&q.difficulty||'').toString().toUpperCase();
    if(d.startsWith('F')){e++;n++;}
    else if(d.startsWith('M')){m++;n++;}
    else if(d.startsWith('D')){h++;n++;}
  });
  if(!n)return null;
  const pe=Math.round(e/n*100), pm=Math.round(m/n*100), ph=Math.round(h/n*100);
  return {easy:pe,med:pm,hard:ph};
}
// Recoge TODAS las preguntas de un bloque (módulo+bloque numerado) anotadas con su
// nivel Leitner vivo y su q.obj (si lo traen). Base de cálculo del mapa.
function blockQuestions(sets,leitner,moduleKey,blockNum){
  const out=[];
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    const bn=(g.block||'').split('-')[1];
    if(String(bn)!==String(blockNum))return;
    (s.questions||[]).forEach(q=>{
      const lvl=(leitner[getQKey(q)]||{level:1}).level;
      const obj=Number.isInteger(q.obj)&&q.obj>=1?q.obj:null;
      out.push({q,lvl,obj});
    });
  });
  return out;
}
// Reparto Caja1/2/3 de una lista de preguntas anotadas (de blockQuestions).
function boxBreakdown(items){
  const b={1:0,2:0,3:0};
  (items||[]).forEach(it=>{b[it.lvl]=(b[it.lvl]||0)+1;});
  return b;
}
// Dominio fino por objetivo dentro de un bloque, SOLO si hay preguntas con q.obj.
// Devuelve null cuando ninguna pregunta del bloque trae obj (→ vista por bloque).
// Si está parcialmente etiquetado, agrupa las etiquetadas por su número de objetivo
// y deja el resto en la clave 0 ("sin objetivo asignado").
function blockObjectiveMastery(items){
  const tagged=(items||[]).filter(it=>it.obj!=null);
  if(!tagged.length)return null;
  const by={};
  (items||[]).forEach(it=>{
    const k=it.obj!=null?it.obj:0;
    if(!by[k])by[k]={sum:0,n:0,box:{1:0,2:0,3:0}};
    by[k].sum+=it.lvl;by[k].n++;by[k].box[it.lvl]++;
  });
  const res={};
  Object.keys(by).forEach(k=>{const e=by[k];res[k]={avg:e.n?e.sum/e.n:0,n:e.n,box:e.box};});
  return res; // claves: número de objetivo (1..N) y 0 para sin-obj
}
// Para un módulo: lista de bloques ordenados por "flojera" (menor dominio primero).
// Cada item: {blockNum, objetivos:[...], avg, n}. Bloques sin preguntas (n=0) van primero.
// Devuelve los bloques del módulo ordenados, ANOTANDO dominio Leitner.
// Para el "foco sugerido" solo cuentan los bloques YA PRACTICADOS (n>0): un bloque sin
// preguntas (n=0) significa "aún no dado en clase", no "lo peor que dominas", así que no
// debe sugerirse. La lista completa (incl. n=0) se usa solo para mostrar en el panel.
function weakBlocksForModule(sets,leitner,moduleKey){
  const m=objectivesForModule(moduleKey);
  const arr=Object.keys(m).map(bk=>{
    const ml=blockMasteryLevel(sets,leitner,moduleKey,bk);
    return {blockNum:bk,objetivos:m[bk],avg:ml.avg,n:ml.n};
  });
  // Solo bloques empezados, ordenados por menor dominio. Los n=0 quedan fuera del foco.
  return arr.filter(b=>b.n>0).sort((a,b)=>a.avg-b.avg);
}
// Preguntas de "módulo general" (sets sin bloque numerado: Masterclass, Pool, repaso…).
// No se atribuyen a ningún bloque/objetivo concreto; se reportan aparte para no falsear
// el dominio por bloque. Devuelve {n, avg} (avg de nivel Leitner, informativo).
function generalSetsForModule(sets,leitner,moduleKey){
  let n=0,sum=0;
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    const bn=(g.block||'').split('-')[1];
    if(bn&&bn!=='0')return;            // tiene bloque numerado -> no es general
    (s.questions||[]).forEach(q=>{sum+=(leitner[getQKey(q)]||{level:1}).level;n++;});
  });
  return {n,avg:n?sum/n:0};
}
// ── DOMINIO POR LECCIÓN (Opción A) ───────────────────────────────────────────
// La lección (M2-1.3) es la unidad de trabajo real del usuario. Estas funciones son
// hermanas de las de bloque, una granularidad más abajo. NO sustituyen a las de bloque:
// el bloque sigue agregando todas sus lecciones; la lección desglosa dentro del bloque.
// Las lecciones se DERIVAN de los nombres de set (no hay catálogo de lecciones).

// Lista ordenada de números de lección presentes en los sets de un bloque dado.
function lessonsForBlock(sets,moduleKey,blockNum){
  const seen=new Set();
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    if(String((g.block||'').split('-')[1])!==String(blockNum))return;
    if(g.lessonNum)seen.add(g.lessonNum);
  });
  return Array.from(seen).sort((a,b)=>parseInt(a)-parseInt(b));
}
// Dominio Leitner medio (1..3) de las preguntas de UNA lección. Clon de blockMasteryLevel
// filtrando además por g.lessonNum. {avg,n}; n=0 si no hay preguntas de esa lección.
function lessonMasteryLevel(sets,leitner,moduleKey,blockNum,lessonNum){
  let sum=0,n=0;
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    if(String((g.block||'').split('-')[1])!==String(blockNum))return;
    if(String(g.lessonNum)!==String(lessonNum))return;
    (s.questions||[]).forEach(q=>{sum+=(leitner[getQKey(q)]||{level:1}).level;n++;});
  });
  return {avg:n?sum/n:0,n};
}
// Preguntas de UNA lección anotadas con nivel Leitner y q.obj. Clon de blockQuestions
// con filtro de lección. Base para el reparto Caja 1/2/3 por lección (vía boxBreakdown).
function lessonQuestions(sets,leitner,moduleKey,blockNum,lessonNum){
  const out=[];
  (sets||[]).forEach(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return;
    if(String((g.block||'').split('-')[1])!==String(blockNum))return;
    if(String(g.lessonNum)!==String(lessonNum))return;
    (s.questions||[]).forEach(q=>{
      const lvl=(leitner[getQKey(q)]||{level:1}).level;
      const obj=Number.isInteger(q.obj)&&q.obj>=1?q.obj:null;
      out.push({q,lvl,obj});
    });
  });
  return out;
}
// Nombre corto derivado del primer set de una lección (quita el prefijo "M2-1.3 ").
// Devuelve '' si no se puede derivar nada útil.
function lessonLabel(sets,moduleKey,blockNum,lessonNum){
  let label='';
  (sets||[]).some(s=>{
    const g=parseSetGroup(s.name||'');
    if(g.moduleKey!==moduleKey)return false;
    if(String((g.block||'').split('-')[1])!==String(blockNum))return false;
    if(String(g.lessonNum)!==String(lessonNum))return false;
    const rest=String(s.name||'').replace(/^[MT]\d+-\d+\.\d+\s*/,'').trim();
    if(rest){label=rest;return true;}
    return false;
  });
  return label;
}
// Lecciones de un bloque ya PRACTICADAS (n>0) ordenadas por menor dominio primero.
// Clon de weakBlocksForModule una granularidad abajo. Para el "foco sugerido" de lección.
function weakLessonsForBlock(sets,leitner,moduleKey,blockNum){
  return lessonsForBlock(sets,moduleKey,blockNum).map(ln=>{
    const ml=lessonMasteryLevel(sets,leitner,moduleKey,blockNum,ln);
    return {lessonNum:ln,avg:ml.avg,n:ml.n};
  }).filter(l=>l.n>0).sort((a,b)=>a.avg-b.avg);
}
// Lección más floja de TODO un módulo (recorre todos sus bloques con lecciones).
// Devuelve {moduleKey,blockNum,lessonNum,avg,n} o null si no hay lecciones practicadas.
function weakLessonsForModule(sets,leitner,moduleKey){
  const objs=objectivesForModule(moduleKey);
  let out=[];
  Object.keys(objs).forEach(bk=>{
    weakLessonsForBlock(sets,leitner,moduleKey,bk).forEach(l=>{
      out.push({moduleKey,blockNum:bk,lessonNum:l.lessonNum,avg:l.avg,n:l.n});
    });
  });
  return out.sort((a,b)=>a.avg-b.avg);
}
// ── Detección de "dominado" para el easter egg de recompensa ───────────────────
// Umbral de dominio (verde) compartido con masteryTone: avg Leitner ≥ 2.6.
const MASTERY_THRESHOLD = 2.6;
function isMastered(avg,n){ return n>0 && avg>=MASTERY_THRESHOLD; }
// A partir de las preguntas de una sesión (cada una con _setName), deriva el
// conjunto ÚNICO de bloques, lecciones y objetivos que la sesión ha tocado.
// Devuelve {blocks:[{mk,bk}], lessons:[{mk,bk,ln}], objectives:[{mk,bk,obj}]}.
function scopeTouchedBySession(sessionQuestions){
  const blocks={},lessons={},objectives={};
  (sessionQuestions||[]).forEach(q=>{
    const g=parseSetGroup(q._setName||'');
    const mk=g.moduleKey; if(!mk||mk==='_')return;
    const bk=(g.block||'').split('-')[1];
    if(bk==null||bk==='')return;
    blocks[mk+'|'+bk]={mk,bk};
    if(g.lessonNum!=null&&g.lessonNum!=='') lessons[mk+'|'+bk+'|'+g.lessonNum]={mk,bk,ln:g.lessonNum};
    const obj=Number.isInteger(q.obj)&&q.obj>=1?q.obj:null;
    if(obj!=null) objectives[mk+'|'+bk+'|'+obj]={mk,bk,obj};
  });
  return {
    blocks:Object.values(blocks),
    lessons:Object.values(lessons),
    objectives:Object.values(objectives)
  };
}
// Dado el alcance tocado y un leitner concreto, calcula el mapa de dominio
// (clave→bool) para bloques, lecciones y objetivos. Se llama dos veces (antes y
// después de la sesión) para detectar CRUCES no-dominado → dominado.
function masteryMapForScope(sets,leitner,scope){
  const m={blocks:{},lessons:{},objectives:{}};
  scope.blocks.forEach(({mk,bk})=>{
    const r=blockMasteryLevel(sets,leitner,mk,bk);
    m.blocks[mk+'|'+bk]=isMastered(r.avg,r.n);
  });
  scope.lessons.forEach(({mk,bk,ln})=>{
    const r=lessonMasteryLevel(sets,leitner,mk,bk,ln);
    m.lessons[mk+'|'+bk+'|'+ln]=isMastered(r.avg,r.n);
  });
  scope.objectives.forEach(({mk,bk,obj})=>{
    const items=blockQuestions(sets,leitner,mk,bk).filter(it=>Number(it.obj)===Number(obj));
    let sum=0,n=0; items.forEach(it=>{sum+=it.lvl;n++;});
    m.objectives[mk+'|'+bk+'|'+obj]=isMastered(n?sum/n:0,n);
  });
  return m;
}
// Compara dos mapas de dominio (before/after) y devuelve el cruce de MAYOR nivel
// (bloque > objetivo > lección), o null si nada cruzó. Implementa la decisión de
// diseño "solo el nivel más alto". El objeto incluye los metadatos para el overlay.
function highestMasteryCrossing(before,after,scope,sets){
  // Bloque
  for(const {mk,bk} of scope.blocks){
    const k=mk+'|'+bk;
    if(after.blocks[k]&&!before.blocks[k]){
      const modLabel=(mk.charAt(0)==='M'?'Módulo '+mk.slice(1):'Track '+mk.slice(1));
      return {level:'block',mk,bk,code:mk+'-'+bk,
        title:'BLOQUE DOMINADO',subtitle:modLabel+' · Bloque '+bk};
    }
  }
  // Objetivo
  for(const {mk,bk,obj} of scope.objectives){
    const k=mk+'|'+bk+'|'+obj;
    if(after.objectives[k]&&!before.objectives[k]){
      const list=objectivesForBlock(mk,bk);
      const txt=(list&&list[obj-1])?list[obj-1]:('Objetivo '+obj);
      return {level:'objective',mk,bk,obj,code:mk+'-'+bk+' · Obj. '+obj,
        title:'OBJETIVO DOMINADO',subtitle:txt};
    }
  }
  // Lección
  for(const {mk,bk,ln} of scope.lessons){
    const k=mk+'|'+bk+'|'+ln;
    if(after.lessons[k]&&!before.lessons[k]){
      const lbl=lessonLabel(sets,mk,bk,ln);
      return {level:'lesson',mk,bk,ln,code:mk+'-'+bk+'.'+ln,
        title:'LECCIÓN DOMINADA',subtitle:lbl||('Lección '+bk+'.'+ln)};
    }
  }
  return null;
}
// Serializa la estructura de objetivos al MISMO formato .md que entiende parseObjectivesMd.
// Garantiza round-trip: descargar -> editar -> reimportar sin perder formato.
function objectivesToMd(obj){
  let out='# Objetivos de aprendizaje\n\n';
  const order=Object.keys(obj).sort((a,b)=>{
    const ta=a[0],tb=b[0];if(ta!==tb)return ta==='M'?-1:1;
    return parseInt(a.slice(1))-parseInt(b.slice(1));
  });
  order.forEach(mk=>{
    const label=mk.startsWith('M')?('Módulo '+mk.slice(1)):('Track '+mk.slice(1));
    out+='### '+label+'\n\n';
    Object.keys(obj[mk]).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(bk=>{
      out+='- **Bloque '+bk+' — (título del bloque)**\n';
      obj[mk][bk].forEach(o=>{out+='  - '+o+'\n';});
    });
    out+='\n';
  });
  return out;
}
// Objetivos a inyectar en "##Objetivos de esta generación".
// - Si el prompt indica un BLOQUE concreto: usa SIEMPRE los objetivos de ese bloque,
//   lo hayas practicado o no (flujo "genero preguntas justo después de la clase").
// - Si NO indica bloque (prompt de módulo): usa el bloque YA PRACTICADO con menor dominio.
//   Si ningún bloque del módulo tiene preguntas todavía, no inyecta nada.
// Máximo `max` objetivos para respetar el presupuesto de tokens. Si se pasa
// max=0, devuelve TODOS los candidatos del bloque (el corte lo hará después
// applyFocusSelection según la selección manual del usuario).
function focusObjectives(sets,leitner,moduleKey,blockNum,max){
  max=max||3;
  if(!moduleKey)return [];
  let objs=blockNum?objectivesForBlock(moduleKey,blockNum):[];
  let label=blockNum?(moduleKey+'-'+blockNum):'';
  if(!objs.length){
    const weak=weakBlocksForModule(sets,leitner,moduleKey);
    if(weak.length){objs=weak[0].objetivos;label=moduleKey+'-'+weak[0].blockNum;}
  }
  return {label,objetivos:max?(objs||[]).slice(0,max):(objs||[])};
}

// Foco SELECTIVO: aplica la selección manual del usuario sobre los objetivos
// candidatos antes de cortar. Se guarda en p.focusExclude la lista de TEXTOS de
// objetivos DESMARCADOS (no los marcados), igual que la selección de sets en
// Leitner guarda lo desmarcado: así, por defecto entran todos y la exclusión
// sobrevive a cambios de módulo/bloque (si un objetivo ya no aparece, su
// exclusión simplemente no aplica). Devuelve la lista final ya cortada.
// - Sin exclusiones (no ha tocado nada): corte automático de `maxAuto` (3/2), como siempre.
// - Con selección manual: respeta lo elegido hasta un tope de seguridad `maxManual`.
function applyFocusSelection(objetivos,p,maxAuto){
  const list=objetivos||[];
  const excl=(p&&Array.isArray(p.focusExclude))?p.focusExclude:[];
  if(!excl.length)return list.slice(0,maxAuto||3);
  const kept=list.filter(o=>excl.indexOf(o)<0);
  const MAX_MANUAL=5;
  return kept.slice(0,MAX_MANUAL);
}
function updateLeitner(q,correct){
  const d=getLeitner();const k=getQKey(q);
  const cur=d[k]||{level:1,streak:0};
  if(correct){
    const newStreak=cur.streak+1;
    const newLevel=newStreak>=1?Math.min(3,cur.level+1):cur.level;
    d[k]={level:newLevel,streak:newStreak,lastSeen:Date.now()};
  } else {
    d[k]={level:1,streak:0,lastSeen:Date.now()};
  }
  saveLeitner(d);
}

// -- TOC parsing ──────────────────────────────────────────────────────────────
// Tolerant parser — handles all three granularities:
//   M2-1.1 Nombre  → moduleKey:M2, block:M2-1, specificity:2 (session)
//   M2-1 Nombre    → moduleKey:M2, block:M2-1, specificity:1 (block)
//   M2 Nombre      → moduleKey:M2, block:M2-0 (general), specificity:0 (module)
function parseSetGroup(name){
  // Full: M2-1.1 or T1-2.3  → captura módulo, bloque Y lección (3er grupo).
  // La lección es un nivel ADICIONAL: NO altera block/moduleKey/specificity.
  const mFull=name.match(/^([MT]\d+)-(\d+)\.(\d+)/);
  if(mFull){
    const prefix=mFull[1];const blockNum=mFull[2];const lessonNum=mFull[3];
    const modLabel=prefix.startsWith('M')?'Módulo '+prefix.slice(1):'Track '+prefix.slice(1);
    return{module:modLabel,block:prefix+'-'+blockNum,moduleKey:prefix,specificity:2,blockSortKey:blockNum,
      lessonNum:lessonNum,lessonKey:prefix+'-'+blockNum+'.'+lessonNum};
  }
  // Block: M2-1 or T1-2
  const mBlock=name.match(/^([MT]\d+)-(\d+)(?:\s|$)/);
  if(mBlock){
    const prefix=mBlock[1];const blockNum=mBlock[2];
    const modLabel=prefix.startsWith('M')?'Módulo '+prefix.slice(1):'Track '+prefix.slice(1);
    return{module:modLabel,block:prefix+'-'+blockNum,moduleKey:prefix,specificity:1,blockSortKey:blockNum,
      lessonNum:'',lessonKey:''};
  }
  // Module: M2 or T1
  const mMod=name.match(/^([MT]\d+)(?:\s|$)/);
  if(mMod){
    const prefix=mMod[1];
    const modLabel=prefix.startsWith('M')?'Módulo '+prefix.slice(1):'Track '+prefix.slice(1);
    return{module:modLabel,block:prefix+'-0',moduleKey:prefix,specificity:0,blockSortKey:'0',
      lessonNum:'',lessonKey:''};
  }
  return{module:'Sin clasificar',block:'Sin clasificar',moduleKey:'_',specificity:-1,blockSortKey:'_',
    lessonNum:'',lessonKey:''};
}

// -- Import planner (multi-set + troceado) ───────────────────────────────────────
// PURO: convierte el JSON pegado en un PLAN de importación revisable. Es el corazón
// de la importación múltiple: lo usan TANTO la previsualización del modal (Capa 3)
// COMO la confirmación (Capa 2), así que ambas ven exactamente lo mismo.
// Acepta dos formatos de entrada:
//   • Array  [...]            → un solo cuestionario (con el nombre del input).
//   • Objeto {"nombre":[...]} → varios cuestionarios independientes (multi-set);
//                               cada CLAVE es el nombre y su VALOR el array de preguntas.
// Si chunk está activo y la entrada es un array, lo trocea en partes de chunkSize
// generando claves "<nombre> · Parte N" → produce el mismo objeto multi-set por dentro.
// Cada set se valida y normaliza por separado, con la MISMA regla que el import único:
// question / options(array ≥2) / correct(número), más el techo de `obj` por bloque
// (un obj fuera del nº de objetivos del bloque se descarta, sin crear objetivos fantasma).
// El prefijo de lección se conserva intacto (el sufijo "· Parte N" no altera la medición:
// parseSetGroup ancla al inicio del nombre). Devuelve un plan con un entry por set.
// -- Clasificación por CONTENIDO ─────────────────────────────────────────────────
// Deduce el bloque real ("M3-1") de un set a partir del prefijo de los `id` de sus
// preguntas. Los prompts por bloque y de simulacro fijan ese prefijo según el módulo/
// bloque elegido AL GENERAR (p. ej. "M3-1.2_TEMA-Q01" o "M3-1-Q01"), así que el id es
// una declaración fiable del bloque, más que el nombre que se teclea al importar.
// Solo cuenta ids con el patrón [MT]<n>-<n>; ignora el formato libre antiguo
// ("M211_TEMA-Q01") para no clasificar mal. Exige mayoría clara sobre el total de
// preguntas (y un mínimo de 3) para que un id suelto no dispare una reclasificación.
function contentBlockOf(questions){
  const qs=Array.isArray(questions)?questions:[];
  if(!qs.length) return '';
  const blk={};
  qs.forEach(q=>{
    const id=q&&typeof q.id==='string'?q.id.trim():'';
    const m=id.match(/^([mt]\d+)-(\d+)/i);
    if(m){const k=m[1].toUpperCase()+'-'+m[2];blk[k]=(blk[k]||0)+1;}
  });
  let best='',bestN=0;
  Object.keys(blk).forEach(k=>{if(blk[k]>bestN){bestN=blk[k];best=k;}});
  return (best && bestN>=Math.max(3, qs.length*0.5)) ? best : '';
}
function buildImportPlan(rawJson, fallbackName, opts, existingSets){
  const chunk=!!(opts&&opts.chunk);
  const chunkSize=Math.max(1, parseInt((opts&&opts.chunkSize)||20,10)||20);
  let parsed;
  try{ parsed=JSON.parse((rawJson||'').trim()); }
  catch(e){ return {parseError:'JSON inválido: '+e.message, format:null, sets:[]}; }

  // 1) Determinar los grupos {nombre, questions} a importar según el formato.
  let groups=[]; let format=null;
  if(Array.isArray(parsed)){
    format='array';
    const baseName=(fallbackName||'').trim();
    if(chunk && parsed.length>chunkSize){
      const parts=Math.ceil(parsed.length/chunkSize);
      for(let p=0;p<parts;p++){
        groups.push({name:(baseName?baseName+' ':'')+'· Parte '+(p+1), questions:parsed.slice(p*chunkSize,(p+1)*chunkSize)});
      }
    } else {
      groups.push({name:baseName, questions:parsed});
    }
  } else if(parsed && typeof parsed==='object'){
    format='object';
    const baseName=(fallbackName||'').trim();
    groups=Object.keys(parsed).map(k=>{
      const rawKey=(k||'').trim();
      // Si el alumno escribió un nombre en el formulario, lo usamos COMO nombre del set,
      // conservando solo el prefijo de bloque de la clave (lo que clasifica el set en su
      // bloque). Así un pack (3 claves "M3-2 Respuestas trampa", "M3-2 Aplicación…",
      // "M3-2 Análisis…") pasa a "M3-2 <nombre del alumno>" en las 3 tarjetas; el estilo
      // ya se distingue por su pastilla en los metadatos (campo tpl). Para simulacros
      // (claves de bloques DISTINTOS: M2-1, M2-2…) cada una conserva SU prefijo, así no
      // se pierde el bloque. Si no hay nombre en el formulario, se mantiene la clave tal cual.
      if(baseName){
        const mPref=rawKey.match(/^([MT]\d+(?:-\d+)?)/);
        const pref=mPref?mPref[1]:'';
        // Si el nombre del formulario YA empieza por el prefijo de bloque (el alumno lo
        // escribió a mano, p. ej. "M3-2 Identidad…"), no lo dupliquemos. Comparamos contra
        // el prefijo seguido de espacio o de guion-bloque para no confundir "M3" con "M30".
        const baseHasPref=pref && new RegExp('^'+pref.replace(/[-]/g,'\\$&')+'(?=\\s|-|$)','i').test(baseName);
        const finalName = baseHasPref ? baseName : ((pref?pref+' ':'')+baseName);
        return {name:finalName, questions:parsed[k]};
      }
      return {name:rawKey, questions:parsed[k]};
    });
    if(!groups.length) return {parseError:'El objeto JSON no contiene ningún set de preguntas.', format:null, sets:[]};
  } else {
    return {parseError:'El JSON debe ser un array de preguntas o un objeto {"nombre": [preguntas]}.', format:null, sets:[]};
  }

  // 1b) Clasificación por CONTENIDO (red de seguridad ampliada). El bloque real de cada
  // set se deduce del prefijo de los ids de sus preguntas (contentBlockOf). Si ese bloque
  // NO coincide con el que indica el nombre escrito —porque el nombre no clasifica, o
  // porque se tecleó un módulo/bloque equivocado—, reescribimos SOLO el prefijo de bloque
  // del nombre y conservamos su parte descriptiva. Así "M5 Outputs" con preguntas de M3-1
  // se sube como "M3-1 Outputs". Sin ids fiables, el nombre se respeta tal cual. `suffix`
  // (p. ej. "Simulacro") se añade solo si el nombre no aporta texto descriptivo.
  const suffix=((opts&&opts.suffix)||'').trim();
  const reclassified=[];
  groups=groups.map(g=>{
    const contentBlk=contentBlockOf(g.questions);
    g._contentBlk=contentBlk||'';                        // señal real de los id del JSON (antes de sellar)
    if(!contentBlk) return g;                          // sin señal fiable → no tocar
    const sg=parseSetGroup(g.name||'');
    const nameBlk=(sg.specificity>=1 && sg.moduleKey && sg.moduleKey!=='_')
      ? (sg.moduleKey+'-'+(sg.blockSortKey||'')) : '';
    if(nameBlk===contentBlk) return g;                 // el nombre ya clasifica bien → no tocar
    const oldName=(g.name||'').trim();
    const descr=oldName.replace(/^[MT]\d+(?:-\d+(?:\.\d+)?)?\s*/i,'').trim();
    // v1.8.10: PRESERVAR LA LECCIÓN TECLEADA A MANO. La reclasificación por contenido
    // solo debe corregir el prefijo de BLOQUE (contentBlk es nivel bloque, p. ej. "M3-1";
    // contentBlockOf nunca deduce la lección porque los id solo declaran [MT]<n>-<n>).
    // Si el alumno escribió una lección ".N" en el nombre (sg.lessonNum), es información
    // ADICIONAL suya que el importador no debe borrar: se reata al bloque corregido.
    // Así "M3-1.2 Análisis del tono" se mantiene como "M3-1.2 Análisis del tono" en vez
    // de degradarse a "M3-1 Análisis del tono".
    const lesson=sg.lessonNum?('.'+sg.lessonNum):'';
    const newName=(contentBlk+lesson+(descr?(' '+descr):(suffix?(' '+suffix):''))).trim();
    if(newName && newName!==oldName){
      reclassified.push({from:oldName||'(sin nombre)', to:newName});
      return {...g, name:newName, _contentBlk:contentBlk};
    }
    return g;
  });

  // 2) Validar y normalizar cada set por separado (uno inválido no tumba a los demás).
  const existingNames=new Set((existingSets||[]).map(s=>(s.name||'').trim()));
  const seenInBatch=new Set();   // colisión también si dos partes del lote comparten nombre
  const sets=groups.map(g=>{
    const errors=[]; const name=g.name;
    if(!name) errors.push('falta el nombre del set');
    const qs=g.questions;
    if(!Array.isArray(qs)||!qs.length){
      errors.push('no contiene un array con al menos una pregunta');
      const collisionEmpty=!!name&&(existingNames.has(name)||seenInBatch.has(name));
      if(name) seenInBatch.add(name);
      return {name,total:0,sealed:[],withObj:0,outOfRange:0,objCeil:0,collision:collisionEmpty,errors,contentBlk:g._contentBlk||''};
    }
    for(let i=0;i<qs.length;i++){
      const q=qs[i];
      if(!q||!q.question||!Array.isArray(q.options)||q.options.length<2||typeof q.correct!=='number'){
        errors.push('pregunta '+(i+1)+' mal formada (requiere question, options ≥2 y correct numérico)');
      }
    }
    // Techo de obj derivado del nombre del set (igual que el import único).
    const gName=parseSetGroup(name);
    const impBlock=(gName.block||'').split('-')[1]||'';
    const objCeil=(gName.moduleKey&&gName.moduleKey!=='_'&&impBlock)?objectivesForBlock(gName.moduleKey,impBlock).length:0;
    // Prefijo de bloque canónico del set (M3-1, T2-3…) si el nombre ya clasifica a nivel
    // bloque. Se usa para SELLAR el id de cada pregunta: así el set queda autoclasificable
    // en futuras reimportaciones aunque NotebookLM omitiera o estropeara los id. Seguro:
    // getQKey usa uid (que se reasigna al importar), no id, así que Leitner no se ve afectado.
    const blockPref=(gName.moduleKey&&gName.moduleKey!=='_'&&gName.specificity>=1)?(gName.moduleKey+'-'+impBlock):'';
    const idOk=blockPref?new RegExp('^'+blockPref.replace('-','\\-')+'(?=[-._\\s]|$)','i'):null;
    let withObj=0,outOfRange=0;
    const sealed=qs.map((q,qi)=>{
      const out={...q,uid:makeQUid()};
      if(blockPref){
        const curId=typeof out.id==='string'?out.id.trim():'';
        if(!curId||!idOk.test(curId))out.id=blockPref+'-Q'+String(qi+1).padStart(2,'0');
      }
      const n=Number(out.obj);
      if(Number.isInteger(n)&&n>=1){
        if(objCeil>0&&n>objCeil){delete out.obj;outOfRange++;}   // fuera de rango → descartar
        else{out.obj=n;withObj++;}
      } else if('obj' in out){ delete out.obj; }
      return out;
    });
    let collision=false;
    // Estilo del set (tpl de su 1ª pregunta que lo traiga): permite que un PACK importe
    // 3 sets con el MISMO nombre sin marcarlos como duplicados entre sí, porque se
    // distinguen por estilo. Colisión REAL = mismo nombre Y mismo estilo (o choque con un
    // set ya existente). La clave de deduplicación intra-lote combina nombre + estilo.
    let setTpl='';
    for(const q of qs){ const t=(q&&q.tpl||'').toString().trim().toUpperCase(); if(t){ setTpl=t; break; } }
    const batchKey=name+'\u0000'+setTpl;
    if(name){ if(existingNames.has(name)||seenInBatch.has(batchKey)) collision=true; seenInBatch.add(batchKey); }
    return {name,total:qs.length,sealed,withObj,outOfRange,objCeil,collision,errors,contentBlk:g._contentBlk||''};
  });

  return {parseError:'', format, sets, reclassified};
}
// Un set del plan es importable si no tiene errores de estructura ni colisión de nombre.
function planSetValid(s){ return s && s.errors.length===0 && !s.collision; }

const PROMPT_TEXT = `Genera 20 preguntas de examen tipo test sobre los temas de este módulo, siguiendo estas reglas de formato y dificultad:

**1. Normas generales:**
- Cada pregunta tiene exactamente 4 opciones (A, B, C, D)
- Una sola respuesta correcta por pregunta
- Distribución de dificultad: 40% FÁCIL, 40% MEDIA, 20% DIFÍCIL
- Las preguntas FÁCIL son definiciones directas o conceptos concretos (máximo 15 palabras)
- Las preguntas MEDIA presentan un contexto breve antes de la pregunta (máximo 35 palabras incluyendo el contexto)
- Las preguntas DIFÍCIL plantean un caso con datos específicos y requieren tomar una decisión justificada (máximo 55 palabras incluyendo el caso)
- La respuesta correcta debe tener una longitud similar a las incorrectas (±20% de variación máxima)
- La respuesta correcta debe distribuirse aleatoriamente entre las posiciones A, B, C y D
- Evita subordinadas encadenadas, paréntesis explicativos y aclaraciones entre comas

**2. Normas sobre las respuestas incorrectas:**
- Deben ser plausibles y técnicamente relacionadas con el tema, nunca absurdas
- Deben mezclar términos reales del módulo usados en contexto incorrecto
- En preguntas FÁCIL: entre 5 y 18 palabras por opción incorrecta
- En preguntas MEDIA y DIFÍCIL: entre 8 y 18 palabras por opción incorrecta. Nunca superar las 20 palabras

**3. Formato requerido:**
Devuelve el resultado ÚNICAMENTE como un array JSON válido, sin texto adicional, sin explicaciones, sin bloques de código markdown. Empieza directamente con \`[\` y termina con \`]\`. Cada objeto debe tener exactamente esta estructura:
\`{"id": "PREFIJO-Q01", "question": "texto", "options": ["A", "B", "C", "D"], "correct": 0, "difficulty": "FÁCIL", "explicacion": "Explicación breve de por qué la respuesta es correcta."}\`

Donde:
- \`id\` sigue el patrón PREFIJO-Q01, PREFIJO-Q02... usando las iniciales del módulo como prefijo (ej: M211_TOKENIZACION-Q01)
- \`correct\` es el índice 0-3 de la opción correcta
- \`difficulty\` solo admite: "FÁCIL", "MEDIA" o "DIFÍCIL"
- \`explicacion\` es una frase corta (máximo 30 palabras) que justifica la respuesta correcta

**4. (Opcional) Trocear un lote grande en partes:**
Si pides MUCHAS preguntas de UNA misma lección y quieres importarlas como varios cuestionarios más manejables, puedes devolver, en lugar del array, un OBJETO JSON donde cada clave es el nombre del cuestionario y su valor el array de preguntas:
\`{"M2-1.1 · Parte 1": [ ...primeras preguntas... ], "M2-1.1 · Parte 2": [ ...siguientes preguntas... ]}\`
Reglas del troceo: reparte las preguntas en partes del tamaño indicado SIN solapar ninguna entre partes; mantén el MISMO prefijo de lección (ej. \`M2-1.1\`) en todas las claves, variando solo el "· Parte N"; cada pregunta conserva la estructura exacta de arriba. El formato array de un solo cuestionario sigue siendo válido: el objeto multi-parte es solo un añadido para cuando quieras trocear.`;
