// ── TARJETA COMPARTIBLE DE MAESTRÍA DE MÓDULO (v1.8) ──────────────────────────
// Imagen (canvas) con la piel del universo activo, para presumir el logro en Discord.
// Solo se abre desde un módulo SELLADO (todos sus objetivos medidos y dominados).
// Métricas: objetivos X/Y · bloques · fecha. Cita FIJA del módulo (getModulePhrase).
// Alias opcional editable, recordado en localStorage. Botones: copiar imagen al
// portapapeles (donde el navegador lo permita) y descargar PNG (siempre).
// El canvas se dibuja a 2x para nitidez; el fondo "lluvia" se renderiza como UN
// fotograma estático (un PNG no anima). onClose cierra.
function MasteryCardModal({moduleKey,sets,leitner,onClose}){
  const canvasRef=React.useRef(null);
  const [alias,setAlias]=React.useState(getAlias());
  const [copied,setCopied]=React.useState(false);
  if(!moduleKey)return null;
  const cov=moduleObjectiveCoverage(sets,leitner,moduleKey);
  const modLabel=moduleKey.startsWith('M')?'Módulo '+moduleKey.slice(1):'Track '+moduleKey.slice(1);
  const modTitle=(MODULE_TITLES&&MODULE_TITLES[moduleKey])||'';
  const phrase=getModulePhrase(moduleKey);
  const qCount=moduleQuestionCount(sets,moduleKey);
  const dateStr=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Dibujado del canvas. Se re-dibuja al cambiar alias.
  React.useEffect(()=>{
    const cv=canvasRef.current; if(!cv)return;
    const u=U(); const night=u.night||{};
    const accent=night.accent||'#00ff41';
    const rgb=(night.accentRgb||'0,255,65');
    const S=2, W=460, H=260; cv.width=W*S; cv.height=H*S;
    const ctx=cv.getContext('2d'); ctx.scale(S,S);
    // Fondo
    ctx.fillStyle='#080c08'; ctx.fillRect(0,0,W,H);
    // Patrón de fondo segun el universo (night.cardPattern):
    //  'rain'  → lluvia de glifos (Matrix). 'discs' → discos de identidad (Tron).
    //  ausente/otro → sin patrón (fondo neutro; universos personalizados).
    const cardPattern=night.cardPattern||'';
    if(cardPattern==='rain'){
      // Lluvia/efecto estático: columnas de glifos tenues con el color de acento.
      ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle=accent; ctx.font='12px monospace';
      const glyphs='01ｱｲｳｴｵｶｷｸ<>/\\{}[]';
      for(let x=0;x<W;x+=12){
        let y=(Math.floor(Math.random()*20)-20)*12;
        const len=8+Math.floor(Math.random()*12);
        for(let k=0;k<len;k++){ const g=glyphs[Math.floor(Math.random()*glyphs.length)]; ctx.fillText(g,x,y); y+=14; if(y>H)break; }
      }
      ctx.restore();
    } else if(cardPattern==='discs'){
      // Discos de identidad: anillos concéntricos tenues con el color de acento.
      // Posiciones FIJAS (resultado consistente en la tarjeta compartible).
      ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle=accent; ctx.lineWidth=1.5;
      const discs=[ [60,60,[34,22,10]], [410,90,[40,26,13]], [100,210,[46,30,15]],
                    [370,215,[28,16]], [230,30,[20,10]] ];
      discs.forEach(d=>{ const cxd=d[0],cyd=d[1],radii=d[2];
        radii.forEach(r=>{ ctx.beginPath(); ctx.arc(cxd,cyd,r,0,Math.PI*2); ctx.stroke(); }); });
      ctx.restore();
    }
    // Marco
    ctx.strokeStyle='rgba('+rgb+',.35)'; ctx.lineWidth=1; ctx.strokeRect(8,8,W-16,H-16);
    const cx=W/2;
    // Cabecera
    ctx.textAlign='left'; ctx.fillStyle='rgba('+rgb+',.55)'; ctx.font='10px monospace';
    ctx.fillText(('EL KONSTRUCTO · '+(u.name||'')).toUpperCase(),24,30);
    ctx.textAlign='right'; ctx.fillStyle='rgba('+rgb+',.4)';
    ctx.fillText(dateStr,W-24,30);
    // Sello
    ctx.textAlign='center';
    ctx.font='30px serif'; ctx.fillStyle=accent; ctx.fillText('🏆',cx,68);
    ctx.fillStyle='rgba('+rgb+',.6)'; ctx.font='10px monospace';
    ctx.fillText('M Ó D U L O   D O M I N A D O',cx,90);
    ctx.fillStyle=accent; ctx.font='700 24px monospace';
    ctx.shadowColor='rgba('+rgb+',.5)'; ctx.shadowBlur=12;
    ctx.fillText(modLabel.toUpperCase(),cx,118); ctx.shadowBlur=0;
    if(modTitle){ ctx.fillStyle='rgba('+rgb+',.75)'; ctx.font='12px sans-serif';
      // recorte si muy largo
      let t=modTitle; while(ctx.measureText(t).width>W-60&&t.length>4){t=t.slice(0,-2);} if(t!==modTitle)t=t.replace(/…?$/,'…');
      ctx.fillText(t,cx,138); }
    // Métricas
    const my=176;
    ctx.strokeStyle='rgba('+rgb+',.15)'; ctx.beginPath();ctx.moveTo(40,152);ctx.lineTo(W-40,152);ctx.stroke();
    ctx.beginPath();ctx.moveTo(40,190);ctx.lineTo(W-40,190);ctx.stroke();
    const metrics=[[cov.mastered+'/'+cov.total,'objetivos'],[String(cov.totalBlocks),'bloques'],[dateStr.slice(0,5),'fecha']];
    const colW=(W-80)/3;
    metrics.forEach((m,i)=>{
      const mx=40+colW*i+colW/2;
      ctx.fillStyle=accent; ctx.font='700 20px monospace'; ctx.fillText(m[0],mx,my);
      ctx.fillStyle='rgba('+rgb+',.5)'; ctx.font='9px monospace'; ctx.fillText(m[1].toUpperCase(),mx,my+15);
    });
    // Cita (envuelta a 2 líneas máx)
    ctx.fillStyle='rgba('+rgb+',.85)'; ctx.font='italic 12px sans-serif';
    const words=('«'+phrase+'»').split(' '); const maxW=W-64; let line='',lines=[];
    words.forEach(w=>{ const test=line?line+' '+w:w; if(ctx.measureText(test).width>maxW){lines.push(line);line=w;} else line=test; });
    if(line)lines.push(line); lines=lines.slice(0,2);
    lines.forEach((ln,i)=>ctx.fillText(ln,cx,218+i*16));
    // Alias
    if(alias.trim()){ ctx.fillStyle=accent; ctx.font='700 11px monospace';
      ctx.fillText('— '+alias.trim().slice(0,40),cx,H-16); }
  },[alias,moduleKey]);

  const filename=()=>'konstructo_maestria_'+moduleKey+'.png';
  const doDownload=()=>{ const cv=canvasRef.current; if(!cv)return;
    cv.toBlob(b=>{ const url=URL.createObjectURL(b); const a=document.createElement('a');
      a.href=url; a.download=filename(); document.body.appendChild(a); a.click();
      document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000); },'image/png'); };
  const doCopy=()=>{ const cv=canvasRef.current; if(!cv)return;
    try{ cv.toBlob(async b=>{ try{ await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);
      setCopied(true); setTimeout(()=>setCopied(false),1800); }catch(e){ doDownload(); } },'image/png');
    }catch(e){ doDownload(); } };

  return React.createElement('div',{className:'mastery-screen','data-glow':2,onClick:onClose},
    React.createElement('div',{className:'mastery-inner',style:{maxWidth:520},onClick:e=>e.stopPropagation()},
      React.createElement('div',{className:'mastery-prefix'},'// tarjeta de maestría //'),
      React.createElement('canvas',{ref:canvasRef,style:{width:'100%',maxWidth:460,borderRadius:12,border:'1px solid var(--accent-border)',marginBottom:16}}),
      React.createElement('div',{style:{width:'100%',maxWidth:460,marginBottom:14}},
        React.createElement('label',{style:{display:'block',fontSize:11,color:'var(--text2)',marginBottom:5,textAlign:'left'}},'Nombre a mostrar (opcional)'),
        React.createElement('input',{type:'text',value:alias,maxLength:40,placeholder:'Tu nombre o alias',
          onChange:e=>{setAlias(e.target.value);saveAlias(e.target.value);},
          style:{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)',fontSize:13,boxSizing:'border-box'}})
      ),
      React.createElement('div',{style:{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}},
        React.createElement('button',{className:'btn btn-primary',onClick:doCopy},copied?'✓ Imagen copiada':'⧉ Copiar imagen'),
        React.createElement('button',{className:'btn',onClick:doDownload},'⤓ Descargar PNG')
      ),
      React.createElement('button',{className:'matrix-rain-dismiss',style:{marginTop:18},onClick:onClose},'[ cerrar ]')
    )
  );
}

// Overlay de descubrimiento: aparece al CASCAR un easter egg (lugar secreto activado).
// Reutiliza el lenguaje visual de los overlays existentes. `egg` = entrada del catálogo;
// `payload` = contenido del universo (cita/efecto) cuando el egg no muestra su propia
// pantalla nativa (terminal/duelo tienen la suya y NO usan este overlay).

  if(!egg) return null;
  const Bg=EFFECT_REGISTRY[U().effect]||MatrixRainBg;
  return React.createElement('div',{className:'mastery-screen','data-glow':2,onClick:onDismiss},
    React.createElement('div',{className:'mastery-bg'},React.createElement(Bg,null)),
    React.createElement('div',{className:'mastery-inner'},
      React.createElement('div',{style:{marginBottom:6}},React.createElement(EggOpenIcon,{size:78})),
      React.createElement('div',{className:'mastery-prefix'},'// easter egg descubierto //'),
      React.createElement('div',{className:'mastery-title'},egg.name),
      payload&&React.createElement('div',{className:'mastery-phrase'},payload),
      React.createElement('div',{className:'mastery-subtitle',style:{marginTop:10,opacity:.7,fontSize:12}},'✓ '+egg.reveal),
      React.createElement('button',{className:'matrix-rain-dismiss',style:{marginTop:22},onClick:onDismiss},'[ continuar ]')
    )
  );
}

    // Sección OCULTA (easter egg "La página que no estaba"): no aparece en el índice
    // ni al navegar; solo emerge si el alumno teclea la palabra clave en el buscador.
    {id:'_secret',icon:'🥚',num:'★',hidden:true,title:'La página que no estaba',body:[
      quote('Has encontrado una página que no figura en ningún índice.'),
      p('Enhorabuena: tecleaste el nombre de la app en el buscador y has destapado uno de los ',em('easter eggs'),' más escondidos de El Konstructo. No todo lo que existe está a la vista.'),
      secret(b('Premio del explorador: '),'este hallazgo ya consta en tu lista de ',em('easter eggs'),', en Historial. Quedan más repartidos por la interfaz. Sigue curioseando.'),
    ]},
  ];

  const q=query.trim().toLowerCase();
  // Palabra clave que destapa la sección oculta (easter egg "La página que no estaba").
  const SECRET_KEY='konstructo';
  const secretUnlocked=q.includes(SECRET_KEY);
  // Texto plano de una sección, para el buscador (recorre los hijos React).
  const plainText=(node)=>{
    if(node==null||node===false)return '';
    if(typeof node==='string'||typeof node==='number')return String(node);
    if(Array.isArray(node))return node.map(plainText).join(' ');
    if(node.props&&node.props.children!=null)return plainText(node.props.children);
    return '';
  };
  // Una sección oculta SOLO casa si se ha tecleado la palabra clave; las normales,
  // por su contenido. Sin query, las ocultas nunca aparecen (ni en el índice).
  const secMatches=(s)=> s.hidden ? secretUnlocked
                                  : (!q||(s.title+' '+plainText(s.body)).toLowerCase().includes(q));
  const visibleSecs=SECTIONS.filter(secMatches);
  // Al destapar la sección oculta, registra el easter egg (idempotente, sin overlay:
  // el "premio" es la propia página secreta que el alumno está leyendo).
  React.useEffect(()=>{ if(secretUnlocked) discoverEasterEgg('ee_help_hidden'); },[secretUnlocked]);

  // Resaltado del término buscado. Recorre el árbol React y, al llegar a un nodo de
  // texto, lo parte por las coincidencias de `q` (insensible a mayúsculas) envolviendo
  // los trozos coincidentes en <mark class="guide-hl">. No altera el texto literal:
  // solo lo trocea. Preserva nodos no-texto (negritas, listas, tips…) intactos.
  const hlKey={n:0};
  const highlightText=(str)=>{
    if(!q)return str;
    const low=str.toLowerCase();
    const out=[];let i=0,idx;
    while((idx=low.indexOf(q,i))!==-1){
      if(idx>i)out.push(str.slice(i,idx));
      out.push(h('mark',{key:'hl'+(hlKey.n++),className:'guide-hl'},str.slice(idx,idx+q.length)));
      i=idx+q.length;
    }
    if(i===0)return str;            // sin coincidencias en este fragmento
    if(i<str.length)out.push(str.slice(i));
    return out;
  };
  const highlightNode=(node)=>{
    if(node==null||node===false||node===true)return node;
    if(typeof node==='string')return highlightText(node);
    if(typeof node==='number')return node;
    if(Array.isArray(node))return node.map(highlightNode);
    if(node.props&&node.props.children!=null){
      const kids=React.Children.toArray(node.props.children).map(highlightNode);
      return React.cloneElement(node,undefined,...kids);
    }
    return node;
  };

  const goTo=(id)=>{
    setOpen(o=>({...o,[id]:false}));
    setTimeout(()=>{const el=document.getElementById('gs-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);
  };

  React.useEffect(()=>{
    if(initialSection){const t=setTimeout(()=>goTo(initialSection),60);return()=>clearTimeout(t);}
  },[]);

  // Resaltado del índice según scroll.
  const onScroll=()=>{
    const cont=mainRef.current;if(!cont)return;
    let cur=null;const top=cont.scrollTop;
    visibleSecs.forEach(s=>{const el=document.getElementById('gs-'+s.id);if(el&&el.offsetTop-90<=top)cur=s.id;});
    setActiveSec(cur||(visibleSecs[0]&&visibleSecs[0].id));
  };

  const expandAll=()=>{const o={};SECTIONS.forEach(s=>o[s.id]=false);setOpen(o);};
  const collapseAll=()=>{const o={};SECTIONS.forEach(s=>o[s.id]=true);setOpen(o);};

  return h('div',{className:'tpl-modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'tpl-modal guide-modal'},
      h('div',{className:'tpl-modal-title'},'Guía de la herramienta'),
      h('div',{className:'tpl-modal-sub'},'Cómo sacarle el máximo partido: de tus apuntes a dominar la materia.'),

      // Buscador + plegar/desplegar todo
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}},
        h('div',{className:'guide-search',style:{flex:1,minWidth:180,marginBottom:0}},
          h('span',{className:'guide-search-ico'},'⌕'),
          h('input',{value:query,onChange:e=>setQuery(e.target.value),placeholder:'Buscar en la ayuda…'})
        ),
        h('div',{className:'guide-allbtns',style:{marginLeft:0}},
          h('button',{className:'guide-allbtn',onClick:expandAll},'Desplegar todo'),
          h('button',{className:'guide-allbtn',onClick:collapseAll},'Plegar todo')
        )
      ),

      h('div',{className:'guide-layout'},
        // Índice lateral
        h('nav',{className:'guide-nav'},
          visibleSecs.map((s,i)=>{
            const prevGroup=i>0?visibleSecs[i-1].group:null;
            const showSep=s.group&&s.group!==prevGroup;
            return h(React.Fragment,{key:s.id},
              showSep&&h('div',{className:'guide-navgroup'},s.group),
              h('div',{
                className:'guide-navitem'+(activeSec===s.id?' active':''),
                onClick:()=>goTo(s.id)
              },
                h('span',{className:'guide-navnum'},s.num),
                h('span',{className:'guide-navico'},s.icon),
                h('span',null,s.title)
              )
            );
          })
        ),
        // Contenido
        h('div',{className:'guide-main',ref:mainRef,onScroll:onScroll,style:{maxHeight:'62vh',overflowY:'auto',paddingRight:6}},
          visibleSecs.length===0
            ? h('div',{className:'guide-noresults'},'Sin resultados para tu búsqueda.')
            : visibleSecs.map(s=>{
                const collapsed=!q&&!!open[s.id];
                hlKey.n=0;
                return h('div',{key:s.id,id:'gs-'+s.id,className:'guide-section'+(collapsed?' collapsed':'')},
                  h('div',{className:'guide-section-head',onClick:()=>setOpen(o=>({...o,[s.id]:!o[s.id]}))},
                    h('span',{className:'guide-section-icon'},s.icon),
                    h('span',{className:'guide-section-title'},q?highlightText(s.title):s.title),
                    h('span',{className:'guide-chev'},'▾')
                  ),
                  h('div',{className:'guide-section-body'},...(q?s.body.map(highlightNode):s.body))
                );
              })
        )
      ),

      h('div',{style:{display:'flex',justifyContent:'flex-end',marginTop:14}},
        h('button',{className:'btn btn-primary',onClick:onClose},'Entendido, ¡a practicar!')
      )
    )
  );
}

function Icon({name,size=17,stroke=1.7,style}){

    width:size,height:size,viewBox:'0 0 24 24',

  });
}

  const triggerEgg=(id,payload)=>{

  React.useEffect(()=>{

  // RARO (~15%). Apoyo en los momentos difíciles sin que sea constante: el alumno
  // debe sentirse capaz de superar sus retos por sí mismo la mayoría de las veces.
  const maybeShowMentorAfterSession=(scorePct)=>{
    if(!smithUniverseEnabled()) return false;
    if(!canShowSmith()) return false;
    const hardSession = (typeof scorePct==='number' && scorePct<50) || !getStreakStatus().alive;
    if(hardSession && Math.random()<0.15){

      setDuelForceMentor(true);   // el mentor cierra el duelo en esta aparición

  const summonDuelFromStreak=()=>{

  // -- Exports / Imports ──────────────────────────────────────────────────────
  const exportWithHistory=()=>{

  // -- Exportación filtrada por módulo (y bloque en cuestionarios) ───────────────
  // kind: 'cuestionario' exporta los sets normales; 'simulacro' exporta el banco de
  // simulacros. Conserva ids e historial (mismo formato que exportWithHistory), así
  // que el fichero se restaura con «Importar sets» tal cual.
  const exportKindSets=(kind)=>sets.filter(s=> kind==='simulacro' ? s.kind==='simulacro' : s.kind!=='simulacro');
  const exportModulesPresent=(kind)=>{
    const mk=new Set();
    exportKindSets(kind).forEach(s=>{const g=parseSetGroup(s.name||'');if(g.moduleKey&&g.moduleKey!=='_')mk.add(g.moduleKey);});
    return Array.from(mk).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  };
  const exportBlocksPresent=(kind,modKey)=>{
    if(!modKey)return [];
    const bk=new Set();
    exportKindSets(kind).forEach(s=>{const g=parseSetGroup(s.name||'');if(g.moduleKey===modKey&&g.blockSortKey&&g.blockSortKey!=='_'&&g.blockSortKey!=='0')bk.add(String(g.blockSortKey));});
    return Array.from(bk).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  };
  const exportMatchingSets=(kind,modKey,blockKey)=>exportKindSets(kind).filter(s=>{
    const g=parseSetGroup(s.name||'');
    if(modKey&&g.moduleKey!==modKey)return false;
    if(kind!=='simulacro'&&blockKey&&String(g.blockSortKey)!==String(blockKey))return false;
    return true;
  });
  const runExportFiltered=(kind,modKey,blockKey,share)=>{
    let matched=exportMatchingSets(kind,modKey,blockKey);
    if(!matched.length)return;
    if(share)matched=matched.map(({id,...rest})=>rest); // compartir: sin IDs de set (se conservan los uids de pregunta)
    const stem=share?'sets_compartir':(kind==='simulacro'?'simulacros':'sets_con_historial');
    const scope=(modKey||'todos')+((kind!=='simulacro'&&blockKey)?('-'+blockKey):'');
    const blob=new Blob([JSON.stringify(matched,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='konstructo_'+stem+'_'+scope+'_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(url);
    setExportModal(null);
  };
  const openExportModal=(kind,share)=>{setExportMod('');setExportBlock('');setExportShare(!!share);setExportModal(kind);};
  const importSets=()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const imported=JSON.parse(ev.target.result);
          if(!Array.isArray(imported)||!imported.length){alert('Fichero sin sets válidos.');return;}
          // ── Salvaguarda de importación (v5.32) ────────────────────────────────
          // Mide el aprendizaje real de cada usuario evitando dos problemas:
          //  1) Preguntas IDÉNTICAS (mismo enunciado + mismas opciones) ya presentes
          //     en el banco → se OMITEN (no duplican ni ensucian la repetición).
          //  2) Preguntas NUEVAS cuyo uid colisiona con uno ya existente → se importan
          //     REASIGNANDO el uid, para que entren limpias (sin heredar la caja
          //     Leitner ajena ni la propia) y midan desde cero.
          // La identidad por contenido es fiable; la del uid no (NotebookLM puede
          // repetir patrones de id en preguntas distintas), de ahí la doble pista.
          const normQ=q=>{
            const txt=(q&&q.question||'').toLowerCase().replace(/\s+/g,' ').trim();
            const opts=(q&&Array.isArray(q.options)?q.options:[])
              .map(o=>String(o||'').toLowerCase().replace(/\s+/g,' ').trim())
              .slice().sort().join('||');
            return txt+'@@'+opts;
          };
          const contentSet=new Set();
          const uidSet=new Set();
          sets.forEach(s=>(s.questions||[]).forEach(q=>{
            contentSet.add(normQ(q));
            if(q&&q.uid)uidSet.add(q.uid);
          }));

          let added=0,replaced=0,skippedDup=0,reassigned=0,emptySets=0;
          const updated=[...sets];
          imported.forEach(s=>{
            if(!s.name||!Array.isArray(s.questions)||!s.questions.length)return;
            // Restauración del propio backup: si el set trae id y ese id YA existe,
            // es "mi" set → se reemplaza completo, conservando uids, SIN filtrar
            // duplicados (su contenido coincide consigo mismo a propósito).
            const existIdx=s.id!=null?updated.findIndex(x=>x.id===s.id):-1;
            if(existIdx>=0){
              const sealedQs=s.questions.map(q=>(q&&q.uid)?q:{...q,uid:makeQUid()});
              updated[existIdx]={...s,questions:sealedQs};
              replaced++;
              sealedQs.forEach(q=>{contentSet.add(normQ(q));if(q.uid)uidSet.add(q.uid);});
              return;
            }
            // Set nuevo (típico de "compartir"): filtra idénticas y reasigna uids.
            const keptQs=[];
            s.questions.forEach(q=>{
              if(!q)return;
              const ckey=normQ(q);
              if(contentSet.has(ckey)){skippedDup++;return;} // idéntica → se omite
              let uid=q.uid;
              if(!uid||uidSet.has(uid)){uid=makeQUid();reassigned+=q.uid?1:0;} // colisión o sin uid
              const sealed={...q,uid};
              keptQs.push(sealed);
              contentSet.add(ckey);uidSet.add(uid); // el banco crece dentro del propio lote
            });
            if(!keptQs.length){emptySets++;return;} // set sin nada nuevo → se omite entero
            const newSet={...s,questions:keptQs,id:s.id||Date.now()+Math.random()};
            updated.push(newSet);added++;
          });
          saveSets(updated);
          const parts=[];
          parts.push(`${added} set${added!==1?'s':''} añadido${added!==1?'s':''}`);
          if(replaced)parts.push(`${replaced} reemplazado${replaced!==1?'s':''}`);
          if(skippedDup)parts.push(`${skippedDup} pregunta${skippedDup!==1?'s':''} idéntica${skippedDup!==1?'s':''} omitida${skippedDup!==1?'s':''}`);
          if(reassigned)parts.push(`${reassigned} con identificador reasignado (entran sin practicar)`);
          if(emptySets)parts.push(`${emptySets} set${emptySets!==1?'s':''} sin preguntas nuevas, omitido${emptySets!==1?'s':''}`);
          alert('Importación completada: '+parts.join(', ')+'.');
        }catch(err){alert('Error al leer el fichero: '+err.message);}
      };reader.readAsText(file);
    };input.click();
  };
  const deleteAllSets=()=>{

  // -- Backup total / Restaurar ────────────────────────────────────────────────
  // Serializa TODO el progreso (todas las claves localStorage con prefijo 'quiz_')
  // a un único .json portable, y permite restaurarlo en otro navegador/equipo.
  // Resuelve el problema de que localStorage NO viaja con el HTML (p. ej. al abrir
  // el archivo desde Google Drive en otro dispositivo el progreso arrancaría vacío).
  // Enumera por prefijo en lugar de una lista fija para cubrir claves futuras.
  // Excluye estado de navegación efímero que no tiene sentido restaurar fuera de
  // la sesión donde se generó.
  const BACKUP_EXCLUDE=['quiz_return_page','quiz_return_results_id'];
  const BACKUP_VERSION=1;
  const backupAll=()=>{
    try{
      const data={};
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(!k||k.indexOf('quiz_')!==0)continue;
        if(BACKUP_EXCLUDE.indexOf(k)>=0)continue;
        data[k]=localStorage.getItem(k);
      }
      const payload={_construct_backup:BACKUP_VERSION,date:new Date().toISOString(),keys:Object.keys(data).length,data:data};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);const a=document.createElement('a');
      a.href=url;a.download='konstructo_backup_completo_'+new Date().toISOString().slice(0,10)+'.json';
      a.click();URL.revokeObjectURL(url);
    }catch(err){alert('No se pudo crear el backup: '+err.message);}
  };
  const restoreAll=()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const parsed=JSON.parse(ev.target.result);
          if(!parsed||typeof parsed!=='object'||!parsed.data||typeof parsed.data!=='object'||!parsed._construct_backup){
            alert('Este fichero no es un backup completo de El Konstructo. Usa "⬆ Importar sets" si lo que quieres es cargar solo sets de preguntas.');return;
          }
          const incoming=parsed.data;
          const incomingKeys=Object.keys(incoming).filter(k=>k.indexOf('quiz_')===0&&BACKUP_EXCLUDE.indexOf(k)<0);
          if(!incomingKeys.length){alert('El backup no contiene datos restaurables.');return;}
          const when=parsed.date?(' del '+parsed.date.slice(0,10)):'';
          if(!window.confirm('Vas a RESTAURAR un backup completo'+when+' ('+incomingKeys.length+' claves).\n\nEsto SUSTITUYE todo tu progreso actual en este navegador: sets, historial, repetición espaciada, rachas, insignias, universos, objetivos y prompts.\n\nEsta acción no se puede deshacer. ¿Continuar?'))return;
          // Limpia las claves quiz_ actuales (salvo las efímeras) y vuelca el backup.
          const toRemove=[];
          for(let i=0;i<localStorage.length;i++){
            const k=localStorage.key(i);
            if(k&&k.indexOf('quiz_')===0&&BACKUP_EXCLUDE.indexOf(k)<0)toRemove.push(k);
          }
          toRemove.forEach(k=>localStorage.removeItem(k));
          incomingKeys.forEach(k=>{
            const v=incoming[k];
            if(typeof v==='string')localStorage.setItem(k,v);
          });
          alert('Backup restaurado: '+incomingKeys.length+' claves.\n\nLa página se recargará para aplicar todos los cambios.');
          location.reload();

      };reader.readAsText(file);
    };input.click();
  };

  // -- Export del histórico en .txt legible (banco de preguntas para NotebookLM) ─
  // Recorre el historial (respetando el filtro activo: Todos / Temarios / Leitner),
  // consolida por pregunta ÚNICA (identidad por getQKey: uid > id > texto) para no
  // duplicar la misma pregunta vista en varias sesiones — se conserva la APARICIÓN
  // MÁS RECIENTE (el historial está ordenado con lo último primero). Si wrongOnly,
  // incluye solo las que se fallaron o quedaron sin responder en esa última vez.
  // Salida en texto plano, pensada para cargarla como fuente en NotebookLM.
  const exportHistoryTxt=(wrongOnly)=>{
    const filtered=history.filter(h=>histMatchesFilter(h,historyFilter));
    if(!filtered.length){alert('No hay historial que exportar con el filtro actual.');return;}
    // Consolidar por pregunta única. history viene con lo más reciente primero,
    // así que el primer encuentro de cada clave ES el más reciente: no sobrescribir.
    const seen={};const bank=[];
    filtered.forEach(h=>{
      if(!Array.isArray(h.questions))return;
      h.questions.forEach((q,i)=>{
        const key=getQKey(q);
        if(seen[key])return;
        seen[key]=true;
        const ua=Array.isArray(h.answers)?h.answers[i]:undefined;
        const isTimeout=ua===-1||ua===undefined;
        const isCorrect=!isTimeout&&ua===q.correct;
        bank.push({q,ua,isTimeout,isCorrect});
      });
    });
    const pool=wrongOnly?bank.filter(b=>!b.isCorrect):bank;
    if(!pool.length){alert('No hay preguntas falladas que exportar con el filtro actual.');return;}
    const letter=n=>String.fromCharCode(65+n); // 0->A, 1->B…
    const lines=[];
    const scope=historyFilter==='leitner'?'repetición espaciada':historyFilter==='simulacros'?'simulacros':historyFilter==='temarios'?'tests de temario':'todo el historial';
    lines.push('BANCO DE PREGUNTAS — El Konstructo');
    lines.push('Ámbito: '+scope+(wrongOnly?' · solo preguntas falladas':' · todas las practicadas'));
    lines.push('Generado: '+new Date().toLocaleString('es-ES'));
    lines.push('Preguntas únicas: '+pool.length);
    lines.push('');
    lines.push('========================================');
    lines.push('');
    pool.forEach((b,idx)=>{
      const q=b.q;
      lines.push('PREGUNTA '+(idx+1)+(q.id?(' ['+q.id+']'):'')+(q.difficulty?(' · '+q.difficulty):''));
      lines.push(q.question||'(sin enunciado)');
      lines.push('');
      (q.options||[]).forEach((opt,oi)=>{
        const mark=oi===q.correct?' ✓':'';
        lines.push('  '+letter(oi)+') '+opt+mark);
      });
      lines.push('');
      const correctTxt=(q.options&&q.options[q.correct]!==undefined)?(letter(q.correct)+') '+q.options[q.correct]):'(desconocida)';
      lines.push('Respuesta correcta: '+correctTxt);
      if(wrongOnly){
        const myTxt=b.isTimeout?'(sin respuesta)':(b.ua>=0&&q.options&&q.options[b.ua]!==undefined?(letter(b.ua)+') '+q.options[b.ua]):'(desconocida)');
        lines.push('Tu última respuesta: '+myTxt);
      }
      if(q.explicacion){lines.push('Explicación: '+q.explicacion);}
      lines.push('');
      lines.push('----------------------------------------');
      lines.push('');
    });
    const blob=new Blob([lines.join('\n')],{type:'text/plain'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='konstructo_banco_preguntas'+(wrongOnly?'_falladas':'')+'_'+new Date().toISOString().slice(0,10)+'.txt';
    a.click();URL.revokeObjectURL(url);
  };

  // -- Export de preguntas por caja Leitner en .txt (desde Entrenamiento) ────────

    lines.push('========================================');
    lines.push('');
    pool.forEach((q,idx)=>{
      lines.push('PREGUNTA '+(idx+1)+(q.id?(' ['+q.id+']'):'')+(q.difficulty?(' · '+q.difficulty):''));
      lines.push(q.question||'(sin enunciado)');
      lines.push('');
      (q.options||[]).forEach((opt,oi)=>{
        lines.push('  '+letter(oi)+') '+opt+(oi===q.correct?' ✓':''));
      });
      lines.push('');
      const correctTxt=(q.options&&q.options[q.correct]!==undefined)?(letter(q.correct)+') '+q.options[q.correct]):'(desconocida)';
      lines.push('Respuesta correcta: '+correctTxt);
      if(q.explicacion){lines.push('Explicación: '+q.explicacion);}

  // Descarga el prompt como paquete .txt listo para subir como FUENTE a NotebookLM.
  // Antepone una instrucción explícita para que NotebookLM lea el documento y
  // ejecute lo que contiene usando el resto de fuentes. Resuelve el caso de prompts
  // demasiado largos para pegar en el chat (~2000 car.) o en Instrucciones (~10000 car.).
  const downloadPromptPackage=(p,mode)=>{
    if(!p){alert('No hay ningún prompt en edición.');return;}
    if(!guardBlockRequired(p))return;
    const prompt=buildAnyPromptText(p,mode);

  const importUniverse=()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const parsed=JSON.parse(ev.target.result);
          // Acepta dos formatos: un universo suelto, o un objeto {uid:universo,...}
          // (export de "todos"). Detectamos por la presencia de claves de esquema.
          let candidates=[];
          if(parsed && typeof parsed==='object' && (parsed.id||parsed.night||parsed.strings)){
            candidates=[parsed];
          } else if(parsed && typeof parsed==='object'){
            candidates=Object.keys(parsed).map(k=>parsed[k]).filter(v=>v&&typeof v==='object');
          }
          if(!candidates.length){alert('El fichero no contiene ningún universo reconocible.');return;}

          const stored=getStoredUniverses();
          let added=0,replaced=0;const rejected=[];
          candidates.forEach(raw=>{
            const u=hydrateUniverse(raw);
            const res=validateUniverse(u,{phrasesOptional:false});
            const label=(raw&&(raw.name||raw.id))||'(sin nombre)';
            if(!res.valid){ rejected.push({label,errors:res.errors}); return; }
            if(NATIVE_UNIVERSE_IDS.indexOf(u.id)>=0){
              rejected.push({label,errors:['el id "'+u.id+'" pertenece a un universo nativo y no puede sobrescribirse']}); return;
            }
            // Guardamos el universo ORIGINAL (con phrasesRef si lo trae) para no
            // duplicar phrases en localStorage; la fusión lo hidrata al cargar.
            const exists=!!stored[u.id]||!!UNIVERSES[u.id];
            stored[u.id]=raw;
            if(exists) replaced++; else added++;
          });
          saveStoredUniverses(stored);

          let msg='Importación de universos:\n'+added+' añadido(s), '+replaced+' reemplazado(s).';
          if(rejected.length){
            msg+='\n\n'+rejected.length+' rechazado(s):';
            rejected.forEach(r=>{ msg+='\n• '+r.label+': faltan/incorrectos → '+r.errors.slice(0,8).join(', ')+(r.errors.length>8?', …':''); });
          }
          if(added||replaced){ msg+='\n\nRecarga la página para que el nuevo universo aparezca en el selector.'; }
          alert(msg);
        }catch(err){alert('Error al leer el fichero: '+err.message);}
      };reader.readAsText(file);
    };input.click();
  };

    // El troceo es SIEMPRE en bloques de 20: un cuestionario de más de 20 preguntas no
    // replicaría las condiciones de examen. Un objeto multi-set/pack no se ve afectado
    // (cada clave ya es su propio set); el troceo solo parte un array único grande.
    const plan=buildImportPlan(modalJson, modalName, {chunk:true,chunkSize:20}, sets);
    if(plan.parseError){ setModalError(plan.parseError); return; }
    // El nombre del input solo es obligatorio cuando se pega un ARRAY (un set, sin partes).
    // En multi-set (objeto) y en troceo, los nombres salen del JSON / del sufijo "· Parte N".
    if(plan.format==='array' && plan.sets.length===1 && !modalName.trim()){
      setModalError('Escribe un nombre para el temario.'); return;
    }
    const valid=plan.sets.filter(planSetValid);
    const rejected=plan.sets.filter(s=>!planSetValid(s));
    if(!valid.length){
      let msg='No se pudo importar ningún set de preguntas.';
      rejected.forEach(s=>{
        const why=s.collision?['ya existe un set con ese nombre']:s.errors;
        msg+='\n• '+(s.name||'(sin nombre)')+': '+why.slice(0,4).join('; ')+(why.length>4?'; …':'');
      });
      setModalError(msg); return;
    }
    // Sella e inserta los válidos. Date.now()+i evita ids colisionantes en el mismo tick.
    const today=new Date().toLocaleDateString('es-ES');
    const toAdd=valid.map((s,i)=>({id:Date.now()+i,name:s.name,questions:s.sealed,created:today,kind:modalContext==='simulacro'?'simulacro':'cuestionario'}));
    saveSets([...sets,...toAdd]);
    setShowModal(false);
    // Resumen post-import (la previsualización ya mostró el detalle antes de confirmar).
    const totalQ=valid.reduce((a,s)=>a+s.total,0);
    const totalOut=valid.reduce((a,s)=>a+s.outOfRange,0);
    const anyObj=valid.some(s=>s.withObj>0);
    let msg=valid.length===1
      ? 'Importado "'+valid[0].name+'" ('+totalQ+' preguntas).'
      : 'Importados '+valid.length+' sets ('+totalQ+' preguntas en total):\n'+valid.map(s=>'• '+s.name+' — '+s.total).join('\n');
    if(anyObj && valid.some(s=>s.withObj<s.total)){
      msg+='\n\nParte de las preguntas no traen objetivo etiquetado (campo "obj"); esas se medirán solo por bloque.';
    }
    if(totalOut>0){
      msg+='\n\n⚠ '+totalOut+' pregunta'+(totalOut!==1?'s traían':' traía')+' un objetivo fuera de rango y se descartó del foco (puedes reasignarlo en el Banco de preguntas).';
    }
    if(rejected.length){
      msg+='\n\nRechazados ('+rejected.length+'):';
      rejected.forEach(s=>{
        const why=s.collision?['nombre ya existente']:s.errors;
        msg+='\n• '+(s.name||'(sin nombre)')+': '+why.slice(0,3).join('; ')+(why.length>3?'; …':'');
      });
    }
    if(valid.length>1 || rejected.length || totalOut>0 || (anyObj && valid.some(s=>s.withObj<s.total))){
      alert(msg);
    }
    maybeShowSmith();
  };

  // -- Quiz start ─────────────────────────────────────────────────────────────
  const startQuiz=set=>{
    setActiveSet(set);
    let pool=[...set.questions].sort(()=>Math.random()-.5);
    const n=Math.min(numQuestions,pool.length);
    const shuffled=pool.slice(0,n);
    const timeLimit=timerMode==='per_question'?perQuestionSecs:Math.round((totalMins*60)/n);
    setQuizData({questions:shuffled,current:0,answers:[],times:[],timeLimit,freeNav,showCorrection,numOptions});
    setResults(null);setReminderSel(null);setReminderSaved(false);setViewingHistoryEntry(false);setMatrixRainDismissed(false);setMasteryReward(null);
    setOraclePhrase(getOraclePhrase(role));
    // ~20% de probabilidad de que Smith intercepte el oráculo (solo si puede aparecer)
    if(canShowSmith() && Math.random()<0.20){
      markSmithShown();
      setSmithMode('oracle');
      setSmithOracleContinue(()=>()=>{setShowSmith(false);setShowOracle(true);});
      setShowSmith(true);
    } else {
      setShowOracle(true);
    }
  };

  // -- Answer handler ─────────────────────────────────────────────────────────
  const handleAnswer=(answerOrigIdx,elapsed)=>{
    const q=quizData.questions;
    const newAnswers=[...quizData.answers,answerOrigIdx];
    const newTimes=[...(quizData.times||[]),elapsed];
    // Easter egg "dominado": en la PRIMERA respuesta de la sesión (answers vacío),
    // tomamos la foto del alcance y su dominio ANTES de que esta sesión mute Leitner.
    // Las preguntas que no traen _setName (quiz de set normal) heredan el nombre del
    // set activo, suficiente para derivar módulo/bloque/lección.
    if(quizData.answers.length===0){
      try{
        const tagged=q.map(qq=>qq._setName?qq:({...qq,_setName:(activeSet&&activeSet.name)||''}));
        const scope=scopeTouchedBySession(tagged);
        const before=masteryMapForScope(sets,getLeitner(),scope);
        masterySnapshotRef.current={scope,before,tagged};
      }catch(e){ masterySnapshotRef.current=null; }
    }
    // Update Leitner for this question
    const curQ=q[quizData.current];
    updateLeitner(curQ,answerOrigIdx===curQ.correct);
    if(quizData.current+1>=q.length){
      // Sesión terminada: ¿algún nivel cruzó a dominado? (Leitner ya actualizado.)
      try{
        const snap=masterySnapshotRef.current;
        if(snap){
          const after=masteryMapForScope(sets,getLeitner(),snap.scope);
          const crossing=highestMasteryCrossing(snap.before,after,snap.scope,sets);
          if(crossing){
            const phrase=getMasteryPhrase(crossing.level);
            setMasteryReward({...crossing,phrase});
          }
        }
      }catch(e){ /* la recompensa es accesoria: nunca debe romper el cierre del quiz */ }
      masterySnapshotRef.current=null;
      const correct=newAnswers.filter((a,i)=>a===q[i].correct).length;
      // Clear reminder for this set if one was pending
      const newEntry={id:Date.now(),setId:activeSet.id,setName:activeSet.name,kind:sessionKind(activeSet),
        correct,wrong:q.length-correct,total:q.length,
        answers:newAnswers,questions:q,times:newTimes,timeLimit:quizData.timeLimit||30,
        date:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
        reminder:null
      };
      const updatedHistory=[newEntry,...history].map(h=>{
        if(h.id!==newEntry.id&&h.setId===activeSet.id&&h.reminder)
          return{...h,reminder:null,reminderDate:null};
        return h;
      });
      saveHistory(updatedHistory);
      setStreakData(updateStreak());
      setPendingResults(newEntry);
      setShowPillScreen(true);
    } else {
      // Cambio 4: modo bolsa flexible (simulacro 10/12 min). Descontamos del
      // presupuesto global el tiempo consumido en esta pregunta. Si se agota,
      // el examen termina aquí aunque queden preguntas (igual que el reloj a 0).
      if(quizData._isExam&&quizData.examFlexBudget>0){
        const remaining=Math.max(0,examBudget-(elapsed||0));
        setExamBudget(remaining);
        if(remaining<=0){
          finalizeExamNow(q,newAnswers,newTimes);
          return;
        }
      }
      setQuizData(prev=>({...prev,current:prev.current+1,answers:newAnswers,times:newTimes}));
    }
  };

  // Cambio 4: cierre del examen cuando se agota la bolsa de tiempo global antes de
  // llegar a la última pregunta. Construye la entrada de historial con lo respondido
  // hasta ahora (las no respondidas cuentan como no contestadas) y va a la píldora.
  const finalizeExamNow=(q,answersSoFar,timesSoFar)=>{
    masterySnapshotRef.current=null;
    const correct=answersSoFar.filter((a,i)=>a===q[i].correct).length;
    const newEntry={id:Date.now(),setId:activeSet.id,setName:activeSet.name,kind:sessionKind(activeSet),
      correct,wrong:answersSoFar.length-correct,total:q.length,
      answers:answersSoFar,questions:q,times:timesSoFar,timeLimit:quizData.timeLimit||30,
      date:new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
      reminder:null
    };
    const updatedHistory=[newEntry,...history].map(h=>{
      if(h.id!==newEntry.id&&h.setId===activeSet.id&&h.reminder)return{...h,reminder:null,reminderDate:null};
      return h;
    });
    saveHistory(updatedHistory);
    setStreakData(updateStreak());
    setPendingResults(newEntry);
    setShowPillScreen(true);
  };

  const choosePill=pill=>{
    const pct=Math.round(pendingResults.correct/pendingResults.total*100);
    const phrase=getNextPhrase(pct,pill);
    setChosenPhrase(phrase);
    setPillColor(pill);
    setShowPillScreen(false);
    // Evaluate badges
    const leitner=getLeitner();
    const unlocked=evaluateBadges(history,sets,leitner,pill,streakData);
    if(unlocked.length>0){
      setNewBadges(unlocked);
    } else {
      setResults(pendingResults);
      setPage('results');
      maybeShowMentorLater(pct);
    }
  };

  const dismissBadges=()=>{
    const pct=pendingResults?Math.round(pendingResults.correct/pendingResults.total*100):0;
    setNewBadges([]);
    setResults(pendingResults);
    setPage('results');
    maybeShowMentorLater(pct);
  };

  // Lanza la comprobación del mentor un instante después de aterrizar en resultados,
  // para no solaparse con la animación de la píldora / insignias.
  const maybeShowMentorLater=(pct)=>{
    setTimeout(()=>{ maybeShowMentorAfterSession(pct); }, 900);
  };

  const continueFromOracle=()=>{
    setShowOracle(false);
    setPage('quiz');
  };

  const navigateQuiz=dir=>{
    setQuizData(prev=>({...prev,current:Math.max(0,Math.min(prev.questions.length-1,prev.current+dir))}));
  };

  const saveReminder=()=>{
    if(!reminderSel||!results)return;
    const d=new Date();d.setDate(d.getDate()+reminderSel);
    saveHistory(history.map(h=>h.id===results.id?{...h,reminder:reminderSel,reminderDate:d.toLocaleDateString('es-ES')}:h));
    setReminderSaved(true);
  };

  const pct=results?Math.round(results.correct/results.total*100):0;
  const circumference=2*Math.PI*54;
  const ringColor=pct>=80?'var(--accent)':pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--red)';

  // Cambio 10: un set está "realizado" si existe al menos una entrada de historial
  // con su setId (el historial solo registra sesiones TERMINADAS, no abandonadas).
  const setIsFinished=(setId)=>history.some(h=>h.setId===setId);
  // -- Group sets by module/block ─────────────────────────────────────────────
  const groupedSets=(kindFilter)=>{
    let base=sets;
    if(kindFilter==='simulacro')base=sets.filter(s=>s.kind==='simulacro');
    else if(kindFilter==='cuestionario')base=sets.filter(s=>s.kind!=='simulacro');
    let filtered=searchQ.trim()?base.filter(s=>s.name.toLowerCase().includes(searchQ.toLowerCase())):base;
    if(onlyUnfinished)filtered=filtered.filter(s=>!setIsFinished(s.id));
    const modules={};
    filtered.forEach(set=>{
      const g=parseSetGroup(set.name);
      const modKey=g.moduleKey||'_';
      if(!modules[modKey]){
        modules[modKey]={label:g.module,key:modKey,blocks:{}};
      }
      const mod=modules[modKey];
      if(!mod.blocks[g.block]){
        mod.blocks[g.block]={label:g.block,sets:[],sortKey:g.blockSortKey,specificity:g.specificity};
      }
      mod.blocks[g.block].sets.push({...set,_specificity:g.specificity});
    });
    // Sort blocks: general (specificity 0) first, then by blockSortKey numerically
    Object.values(modules).forEach(mod=>{
      const blockArr=Object.values(mod.blocks);
      blockArr.sort((a,b)=>{
        if(a.sortKey==='0'&&b.sortKey!=='0')return -1;
        if(b.sortKey==='0'&&a.sortKey!=='0')return 1;
        return a.sortKey.localeCompare(b.sortKey,undefined,{numeric:true});
      });
      // Sort sets within each block: general (lower specificity) first, then alphabetically
      blockArr.forEach(block=>{
        block.sets.sort((a,b)=>{
          if(a._specificity!==b._specificity)return a._specificity-b._specificity;
          return a.name.localeCompare(b.name);
        });
      });
      mod.blocks=Object.fromEntries(blockArr.map(b=>[b.label,b]));
    });
    return Object.values(modules).sort((a,b)=>a.key.localeCompare(b.key,undefined,{numeric:true}));
  };

  const toggleModule=key=>setCollapsedModules(p=>({...p,[key]:!p[key]}));
  const toggleBlock=key=>setCollapsedBlocks(p=>({...p,[key]:!p[key]}));

  // -- Render set card ────────────────────────────────────────────────────────
  const isModuleLevel=name=>!!name.match(/^[MT]\d+(?:\s|$)/);

  const renderSetCard=set=>{
    const sh=history.filter(h=>h.setId===set.id);
    const leitner=getLeitner();
    const l1=set.questions.filter(q=>(leitner[getQKey(q)]||{level:1}).level===1).length;
    const l3=set.questions.filter(q=>(leitner[getQKey(q)]||{level:1}).level===3).length;
    // Preguntas SIN CLASIFICAR: sin objetivo válido para el bloque del set. Mismo criterio
    // que el mapa (blockQuestions → obj null). Solo cuenta si el bloque tiene catálogo de
    // objetivos; así el badge identifica el cuestionario culpable de las "sin clasificar".
    const sg=parseSetGroup(set.name);
    const objCeil=objectivesForBlock(sg.moduleKey,sg.blockSortKey).length;
    const unclassified=objCeil>0?set.questions.filter(q=>!(Number.isInteger(q.obj)&&q.obj>=1)).length:0;
    const isNebuchadnezzar=isModuleLevel(set.name);
    return React.createElement('div',{className:'set-card'+(isNebuchadnezzar?' nebuchadnezzar':''),key:set.id},
      isNebuchadnezzar&&React.createElement('div',{className:'badge-nebuchadnezzar'},U().badges.nebuchadnezzar.icon+' '+U().badges.nebuchadnezzar.name),
      editingId===set.id
        ?React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',marginBottom:8}},
            React.createElement('input',{className:'form-input',style:{fontSize:14,padding:'5px 10px',flex:1},value:editingName,autoFocus:true,
              onChange:e=>setEditingName(e.target.value),
              onKeyDown:e=>{if(e.key==='Enter')confirmEdit(set.id);if(e.key==='Escape')setEditingId(null)}}),
            React.createElement('button',{className:'btn btn-gold btn-sm',onClick:()=>confirmEdit(set.id)},'✓'),
            React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>setEditingId(null)},'✕')
          )
        :React.createElement('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:6,marginBottom:4}},
            React.createElement('div',{className:'set-card-name'},set.name),
            React.createElement('button',{className:'btn btn-ghost btn-sm',style:{padding:'2px 7px',fontSize:12,lineHeight:1,flexShrink:0},
              title:'Renombrar',onClick:e=>startEdit(set,e)},React.createElement(Icon,{name:'rename',size:13}))
          ),

      React.createElement('div',{className:'set-card-meta'},(()=>{
        const abbr=setTemplateAbbr(set);
        const mix=setDifficultyMix(set);
        const parts=[set.questions.length+' preguntas',set.created];
        if(abbr)parts.push(TPL_ABBR_ICON[abbr]+' '+TPL_ABBR[abbr]);
        if(mix)parts.push(mix.easy+'-'+mix.med+'-'+mix.hard);
        return parts.join(' · ');
      })()),
      React.createElement('div',{className:'set-card-stats'},
        sh.length>0&&React.createElement('div',{className:'stat-pill'},'⏱ '+sh.length+' test'+(sh.length>1?'s':'')),
        sh.length>0&&React.createElement('div',{className:'stat-pill green'},'✓ '+Math.round(sh.reduce((a,h)=>a+h.correct,0)/sh.reduce((a,h)=>a+h.total,0)*100)+'% media'),
        l1>0&&React.createElement('div',{className:'stat-pill stat-pill-reforzar',style:{color:'var(--green)'}},'🔁 '+l1+' por reforzar'),
        l3>0&&React.createElement('div',{className:'stat-pill stat-pill-dominadas',style:{color:'var(--green)'}},'⭐ '+l3+' dominadas'),
        unclassified>0&&React.createElement('div',{className:'stat-pill',
          title:'Este set tiene '+unclassified+' pregunta'+(unclassified>1?'s':'')+' sin objetivo asignado (NotebookLM no las clasificó por no encajar en ningún objetivo del bloque). Es el cuestionario que infla el "sin clasificar" del mapa: bórralo y regéneralo, o corrige el objetivo en Entrenamiento → Banco de preguntas vistas.',
          style:{color:'var(--orange)',background:'rgba(245,158,11,.10)',border:'1px solid rgba(245,158,11,.4)'}},'⚠ '+unclassified+' sin clasificar')
      ),
      React.createElement('div',{className:'set-card-actions'},
        React.createElement('button',{
          className:'btn',
          className:'btn btn-conejo',
          style:{flex:1,background:'transparent',color:'var(--accent)',border:'1px solid rgba(var(--accent-rgb),.35)',fontFamily:"'DM Mono',monospace",letterSpacing:'.5px',fontSize:13,boxShadow:'0 0 10px rgba(var(--accent-rgb),.08)'},
          onClick:()=>startQuiz(set)
        },U().strings.followRabbit),
        React.createElement('button',{className:'btn btn-danger btn-sm',
          title:'Eliminar set',
          onClick:()=>{if(window.confirm('¿Eliminar el set "'+set.name+'"? Esta acción no se puede deshacer.'))saveSets(sets.filter(s=>s.id!==set.id));}
        },'🗑')
      )
    );
  };

  // -- Leitner summary for Repaso page ───────────────────────────────────────
  const leitnerSummary=()=>{
    const leitner=getLeitner();
    let l1=0,l2=0,l3=0;
    sets.forEach(s=>s.questions.forEach(q=>{
      const lvl=(leitner[getQKey(q)]||{level:1}).level;
      if(lvl===1)l1++;else if(lvl===2)l2++;else l3++;
    }));
    return {l1,l2,l3};
  };

  const leitnerBreakdown=()=>{
    const leitner=getLeitner();
    // group by module > block > set, for each caja level
    const breakdown={1:{},2:{},3:{}};
    sets.forEach(s=>{
      const g=parseSetGroup(s.name);
      s.questions.forEach(q=>{
        const lvl=(leitner[getQKey(q)]||{level:1}).level;
        const b=breakdown[lvl];
        if(!b[g.module])b[g.module]={};
        if(!b[g.module][g.block])b[g.module][g.block]={};
        if(!b[g.module][g.block][s.name])b[g.module][g.block][s.name]=0;
        b[g.module][g.block][s.name]++;
      });
    });
    return breakdown;
  };


  const computeModuleProgress=(modKey)=>{
    // Get all CUESTIONARIO sets in this module (excluye simulacros para que el
    // denominador de cobertura coincida con el listado de Cuestionarios y se
    // actualice al borrar/añadir sets; v1.8.3 fix).
    const modSets=sets.filter(s=>{
      if(s.kind==='simulacro')return false;
      const g=parseSetGroup(s.name);
      return g.moduleKey===modKey;
    });
    if(!modSets.length)return{coverage:0,mastery:0,coverageStr:'0/0',masteryPct:0};
    // Coverage: sets where history has at least one result >= 50%
    const practiced=modSets.filter(s=>{
      const sh=history.filter(h=>h.setId===s.id);
      return sh.some(h=>Math.round(h.correct/h.total*100)>=50);
    }).length;
    const coverage=modSets.length;
    // Mastery: questions in caja 3 / total questions
    const leitner=getLeitner();
    let totalQ=0,dominatedQ=0;
    modSets.forEach(s=>{
      totalQ+=s.questions.length;
      dominatedQ+=s.questions.filter(q=>(leitner[getQKey(q)]||{level:1}).level===3).length;
    });
    const masteryPct=totalQ>0?Math.round(dominatedQ/totalQ*100):0;
    return{coverage:practiced,coverageTotal:coverage,coverageStr:practiced+'/'+coverage,masteryPct};
  };
  // Desde la pantalla de dominio: practicar SOLO un bloque concreto.
  // Construye el Set de IDs de los sets de ese módulo+bloque y reutiliza el
  // entrenamiento mixto enfocado (misma maquinaria que la columna de Leitner).
  const startBlockPractice=(moduleKey,blockNum)=>{
    const ids=new Set();
    sets.forEach(s=>{
      const g=parseSetGroup(s.name||'');
      if(g.moduleKey!==moduleKey)return;
      const bn=(g.block||'').split('-')[1];
      if(String(bn)===String(blockNum))ids.add(s.id);
    });
    if(!ids.size){alert('Este bloque aún no tiene preguntas importadas.');return;}
    setPage('repaso');
    startMixedSession(ids,'enfocado',true);
  };

  // Desde el Mapa: practicar SOLO una lección concreta (M3-2.3). Hermana de
  // startBlockPractice una granularidad abajo: filtra los sets por módulo+bloque+lección.
  const startLessonPractice=(moduleKey,blockNum,lessonNum)=>{
    const ids=new Set();
    sets.forEach(s=>{
      const g=parseSetGroup(s.name||'');
      if(g.moduleKey!==moduleKey)return;
      if(String((g.block||'').split('-')[1])!==String(blockNum))return;
      if(String(g.lessonNum)!==String(lessonNum))return;
      ids.add(s.id);
    });
    if(!ids.size){alert('Esta lección aún no tiene preguntas importadas.');return;}
    setPage('repaso');
    startMixedSession(ids,'enfocado',true);
  };

  // Desde el Mapa (vista por objetivo): practicar SOLO un objetivo del bloque.
  // El objetivo puede repartirse entre varias lecciones/sets del bloque, así que
  // se seleccionan los sets del bloque y se filtra a nivel de pregunta por q.obj.
  const startObjectivePractice=(moduleKey,blockNum,objNum)=>{
    const ids=new Set();
    sets.forEach(s=>{
      const g=parseSetGroup(s.name||'');
      if(g.moduleKey!==moduleKey)return;
      if(String((g.block||'').split('-')[1])!==String(blockNum))return;
      ids.add(s.id);
    });
    if(!ids.size){alert('Este bloque aún no tiene preguntas importadas.');return;}
    setPage('repaso');
    startMixedSession(ids,'enfocado',true,(q)=>Number(q.obj)===Number(objNum));
  };

  // Desde Progreso: GENERAR preguntas nuevas del bloque flojo (no practicar lo que ya
  // hay, eso es startBlockPractice). Crea un prompt de Cuestionarios ya prerrellenado
  // con módulo+bloque, lo abre en el editor del gestor y lleva a la página Cuestionarios.
  const startBlockPromptGeneration=(moduleKey,blockNum)=>{
    const modLabel=moduleKey.startsWith('M')?'Módulo '+moduleKey.slice(1):'Track '+moduleKey.slice(1);
    // El prompt de refuerzo nace con el ANTI-REPETICIÓN activado: su misión es generar
    // preguntas NUEVAS del bloque flojo, así que pide a NotebookLM descartar las que ya
    // existen. Para que funcione, hay que subir el .txt de preguntas previas como fuente
    // (botón "Exportar preguntas.txt" en Entrenamiento; aviso mostrado en el editor).
    const blank={...PROMPT_BASE,id:'p_'+Date.now(),templateId:'standard',fromTemplate:false,
      kind:'refuerzo',
      name:'Refuerzo '+moduleKey+'-'+blockNum,modulo:moduleKey,bloque:String(blockNum),leccion:'',

  const startLeitnerSession=(selSets)=>{

  // Entrenamiento mixto (repetición espaciada).
  // scope='enfocado' -> respeta selSets ; scope='completo' -> ignora selección (todas).
  // includeBox3=true -> objetivo 70% C1 / 25% C2 / 5% C3 ; false -> 70/30 (sin dominadas).
  // Si una caja no tiene preguntas, su cuota se redistribuye entre las demás para
  // mantener el total configurado (numQuestions, p.ej. 20).
  const startMixedSession=(selSets,scope,includeBox3,qFilter)=>{
    const leitner=getLeitner();
    const allQ=[];sets.forEach(s=>s.questions.forEach(q=>allQ.push({...q,_setId:s.id,_setName:s.name})));
    const useSel=(scope==='enfocado')&&selSets;
    let filtered=useSel?allQ.filter(q=>selSets.has(q._setId)):allQ;
    // Filtro fino opcional a nivel de pregunta (p.ej. practicar un objetivo concreto del bloque).
    if(typeof qFilter==='function')filtered=filtered.filter(qFilter);
    const byLvl=(lv)=>filtered.filter(q=>(leitner[getQKey(q)]||{level:1}).level===lv).sort(()=>Math.random()-.5);
    const b1=byLvl(1), b2=byLvl(2), b3=includeBox3?byLvl(3):[];
    const avail={1:b1.length,2:b2.length,3:b3.length};
    const totalAvail=avail[1]+avail[2]+avail[3];
    if(!totalAvail){alert('No hay preguntas disponibles para el entrenamiento mixto con la configuración actual.');return;}
    const target=Math.min(numQuestions,totalAvail);
    // Cuotas objetivo
    let weights=includeBox3?{1:.70,2:.25,3:.05}:{1:.70,2:.30,3:0};
    // Redistribuir el peso de las cajas sin preguntas entre las que sí tienen
    let liveWeight=0;[1,2,3].forEach(k=>{if(avail[k]>0)liveWeight+=weights[k];});
    if(liveWeight<=0){alert('No hay preguntas disponibles para el entrenamiento mixto.');return;}
    const norm={};[1,2,3].forEach(k=>{norm[k]=avail[k]>0?weights[k]/liveWeight:0;});
    // Asignación inicial (respeta disponibilidad)
    let take={1:Math.min(avail[1],Math.round(target*norm[1])),
              2:Math.min(avail[2],Math.round(target*norm[2])),
              3:Math.min(avail[3],Math.round(target*norm[3]))};
    // Ajuste fino para cuadrar exactamente con target sin exceder disponibilidad
    let sum=take[1]+take[2]+take[3];
    const order=[1,2,3]; // prioridad de relleno: refuerzo primero
    let guard=0;
    while(sum<target&&guard++<1000){
      let added=false;
      for(const k of order){ if(take[k]<avail[k]){take[k]++;sum++;added=true;if(sum>=target)break;} }
      if(!added)break;
    }
    while(sum>target&&guard++<2000){
      let removed=false;
      for(let i=order.length-1;i>=0;i--){const k=order[i];if(take[k]>0){take[k]--;sum--;removed=true;if(sum<=target)break;}}
      if(!removed)break;
    }
    const pool=[...b1.slice(0,take[1]),...b2.slice(0,take[2]),...b3.slice(0,take[3])].sort(()=>Math.random()-.5);
    if(!pool.length){alert('No hay preguntas disponibles para el entrenamiento mixto.');return;}
    setActiveSet({id:'leitner',name:'Entrenamiento mixto · repetición espaciada'});
    const timeLimit=timerMode==='per_question'?perQuestionSecs:Math.round((totalMins*60)/pool.length);
    setQuizData({questions:pool,current:0,answers:[],times:[],timeLimit,freeNav,showCorrection,numOptions});
    setResults(null);setReminderSel(null);setReminderSaved(false);setViewingHistoryEntry(false);setMatrixRainDismissed(false);setMasteryReward(null);
    setOraclePhrase(getOraclePhrase(role));
    setShowOracle(true);
  };

    if(!pool.length){alert('Los sets de este módulo no contienen preguntas.');return;}
    let chosen=pool.sort(()=>Math.random()-.5);
    // Cambio 2C: el simulacro replica el examen real → SIEMPRE 20 preguntas.
    // Si el módulo tiene más, se sirven 20 al azar; si tiene menos, las que haya.
    const EXAM_Q=20;
    if(chosen.length>EXAM_Q)chosen=chosen.slice(0,EXAM_Q);
    const modLabel=parseSetGroup([...ids].length?(sets.find(s=>ids.has(s.id)).name||''):'').module||moduleKey;
    setActiveSet({id:'examen_'+moduleKey,name:'Simulacro de examen · '+modLabel,_isExam:true});

    // En modo bolsa, timeLimit es el reparto orientativo por pregunta (total/nº),
    // pero el límite real es el global acumulable (examBudget). QuizView lo gestiona.
    const isPerQ=examTimeMode==='perq30';

    const timeLimit=isPerQ?30:Math.round(totalSecs/chosen.length);

  // PURGA POR MÓDULO (módulo aprobado): borra los sets de SIMULACRO de ese módulo y

  const purgeModuleSimulacros=(moduleKey,modLabel)=>{
    const ids=moduleExamSets(moduleKey);
    if(!ids.size){alert('Este módulo no tiene simulacros importados.');return;}
    let nQ=0; sets.forEach(s=>{ if(ids.has(s.id))nQ+=s.questions.length; });
    if(!window.confirm('¿Borrar los simulacros de '+modLabel+'?\n\nSe eliminarán '+ids.size+' set(s) de simulacro ('+nQ+' preguntas) y dejarán de aparecer en el examen del módulo y en el entrenamiento mixto. Tu historial de exámenes se conserva.\n\nEsta acción no se puede deshacer.'))return;
    // 1) Sets que SOBREVIVEN a la purga.
    const remaining=sets.filter(s=>!ids.has(s.id));
    // 2) Claves Leitner aún respaldadas por algún set que sobrevive.
    const keepKeys=new Set();
    remaining.forEach(s=>(s.questions||[]).forEach(q=>keepKeys.add(getQKey(q))));

    const leitner=getLeitner(); let removedKeys=0;

    }); });

          (()=>{
            const leitner=getLeitner();

            // Build per-level set list: [{id,name,count}]
            const buildBoxSets=(lvl)=>{

                setLeitnerSel(prev=>{
                  const allIds=Object.keys(boxSets);
                  const cur=prev[caja]||Object.fromEntries(allIds.map(id=>[id,true]));
                  const next={...cur,[sid]:val};
                  const allTrue=allIds.every(id=>next[id]!==false);

                  setLeitnerSel(prev=>({...prev,[caja]:cur}));
                }

                  const next={...cur};

            };

            const renderBreakdownCol=(caja,lvl,isMixed)=>{

                  React.createElement('span',{style:{fontSize:11,fontWeight:700,color:cajaColors[caja],flex:1}},cajaLabels[caja]),
                  React.createElement('span',{style:{fontSize:10,color:'var(--text3)',fontFamily:'DM Mono,monospace'}},totalQ+'p')
                ),
                modKeys.map(modKey=>{
                  const mod=mods[modKey];
                  const modTotal=mod.sets.reduce((a,s)=>a+s.count,0);
                  const modState=getModState(modKey);
                  const panelKey=caja+'-'+modKey;
                  const modExpanded=leitnerModOpen[panelKey]!==false;
                  return React.createElement('div',{key:modKey,style:{padding:'2px 0'}},
                    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'3px 0',cursor:'pointer'},

// ===
// OracleScreen component - typewriter effect
// ===
function OracleScreen({phrase,onContinue}){
  const [displayed,setDisplayed]=useState('');
  const [done,setDone]=useState(false);
  const idxRef=useRef(0);

  useEffect(()=>{
    idxRef.current=0;setDisplayed('');setDone(false);
    const interval=setInterval(()=>{
      if(idxRef.current>=phrase.length){
        clearInterval(interval);setDone(true);return;
      }
      setDisplayed(phrase.slice(0,idxRef.current+1));
      idxRef.current++;
    },38);
    return()=>clearInterval(interval);
  },[phrase]);

  return React.createElement('div',{className:'oracle-screen',onClick:onContinue},
    React.createElement('div',{className:'oracle-prefix'},U().strings.oracleLabel),
    React.createElement('div',{className:'oracle-text'},
      displayed,
      React.createElement('span',{className:'oracle-cursor'})
    ),
    done&&React.createElement('div',{className:'oracle-hint'},
      '[ haz clic para continuar ]'
    )
  );
}

  // Build trimmed+shuffled options once on mount
  const optsRef=useRef(null);
  if(!optsRef.current){
    const all=question.options.map((text,origIdx)=>({text,origIdx}));
    const correct=all.find(o=>o.origIdx===question.correct);
    const others=all.filter(o=>o.origIdx!==question.correct).sort(()=>Math.random()-.5).slice(0,numOptions-1);
    optsRef.current=[correct,...others].sort(()=>Math.random()-.5);
  }
  const opts=optsRef.current;
  const corrIdx=opts.findIndex(o=>o.origIdx===question.correct);

  useEffect(()=>{
    answeredRef.current=false;setRevealed(false);setSelected(null);
    startTimeRef.current=Date.now();
    timerRef.current=setInterval(()=>{
      setTimeLeft(prev=>{
        if(prev<=1){clearInterval(timerRef.current);setExpired(true);return 0;}
        return prev-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[]);

  useEffect(()=>{
    if(expired&&!answeredRef.current){
      answeredRef.current=true;
      const elapsed=Math.round((Date.now()-startTimeRef.current)/1000);
      if(showCorrection){setRevealed(true);setTimeout(()=>onAnswer(-1,elapsed),1800);}
      else{const t=setTimeout(()=>onAnswer(-1,elapsed),1200);return()=>clearTimeout(t);}
    }
  },[expired]);

  const selectOption=si=>{
    if(answeredRef.current)return;
    answeredRef.current=true;
    clearInterval(timerRef.current);
    const elapsed=Math.round((Date.now()-startTimeRef.current)/1000);
    setSelected(si);
    if(showCorrection){
      setRevealed(true);
      setTimeout(()=>onAnswer(opts[si].origIdx,elapsed),1600);
    } else {
      setTimeout(()=>onAnswer(opts[si].origIdx,elapsed),500);
    }
  };

  const circumference=2*Math.PI*28;
  // Cambio 4 (pulido): en modo bolsa el anillo se mide contra el TOTAL del examen
  // (flexTotal, 600/720 s), no contra timeLimit (el restante al montar la pregunta).
  // Así el anillo decrece de forma continua a lo largo de todas las preguntas en vez
  // de rellenarse al pasar de una a otra. En modo rígido (perq30) se usa timeLimit.
  const ringRef=(flexBudget&&flexTotal>0)?flexTotal:timeLimit;
  const strokeOffset=circumference-(timeLeft/ringRef)*circumference;
  const timerColor=timeLeft>ringRef*.5?'var(--accent)':timeLeft>ringRef*.25?'var(--orange)':'var(--red)';
  const progressPct=(current/total)*100;
  const isCorrect=selected!==null&&opts[selected].origIdx===question.correct;

  return React.createElement('div',null,
    React.createElement('div',{className:'quiz-header'},
      React.createElement('div',null,
        React.createElement('div',{className:'quiz-title'},'Set: ',React.createElement('span',null,setName)),
        React.createElement('div',{className:'quiz-progress'},'Pregunta '+(current+1)+' de '+total)
      ),
      React.createElement('div',{className:'timer-circle'},
        React.createElement('svg',{className:'timer-svg',viewBox:'0 0 64 64'},
          React.createElement('circle',{className:'timer-bg',cx:32,cy:32,r:28}),
          React.createElement('circle',{className:'timer-fg',cx:32,cy:32,r:28,
            style:{strokeDasharray:circumference,strokeDashoffset:strokeOffset,stroke:timerColor,transition:'stroke-dashoffset .9s linear, stroke .5s'}})
        ),
        React.createElement('div',{className:'timer-text',style:{color:timerColor,fontSize:flexBudget&&timeLeft>=60?15:undefined}},
          flexBudget?(Math.floor(timeLeft/60)+':'+String(timeLeft%60).padStart(2,'0')):timeLeft)
      )
    ),
    React.createElement('div',{className:'progress-bar'},
      React.createElement('div',{className:'progress-fill',style:{width:progressPct+'%'}})
    ),
    React.createElement('div',{className:'question-card'},
      React.createElement('div',{className:'question-num'},'PREGUNTA '+(current+1)+' / '+total+(question.difficulty?' · '+question.difficulty:'')),
      React.createElement('div',{className:'question-text'},question.question),
      React.createElement('div',{className:'options'},
        opts.map((opt,si)=>{
          let cls='option';
          if(answeredRef.current||revealed)cls+=' disabled';
          if(si===selected)cls+=' selected';
          if(revealed&&si===corrIdx)cls+=' correct-reveal';
          if(revealed&&si===selected&&selected!==corrIdx)cls+=' wrong-reveal';
          return React.createElement('div',{className:cls,key:si,onClick:()=>selectOption(si)},
            React.createElement('div',{className:'option-letter'},['A','B','C','D'][si]),
            React.createElement('div',{className:'option-text'},opt.text)
          );
        })
      ),
      revealed&&React.createElement('div',{className:'correction-box '+(isCorrect?'correct':'wrong')},
        isCorrect?'✓ ¡Correcto!':'✕ Incorrecto — la respuesta correcta era: '+opts[corrIdx].text,
        question.explicacion&&React.createElement('div',{className:'correction-explain'},'💡 '+question.explicacion)
      ),
      expired&&!revealed&&React.createElement('div',{className:'timeout-banner'},
        flexBudget?'⏱ Tiempo total agotado — finalizando el examen...':(isExam?'⏱ Tiempo agotado — pasando a la siguiente...':'⏱ Tiempo agotado — pasando a la siguiente...')),
      freeNav&&!isExam&&React.createElement('div',{className:'nav-btns'},
        React.createElement('button',{className:'btn btn-ghost',disabled:!hasPrev,onClick:()=>onNav(-1),style:{opacity:hasPrev?1:.3}},'← Anterior'),
        React.createElement('button',{className:'btn btn-ghost',disabled:!hasNext,onClick:()=>onNav(1),style:{opacity:hasNext?1:.3}},'Siguiente →')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script>
(function(){
  function positionTooltip(wrap){
    var box=wrap.querySelector('.tooltip-box');
    if(!box)return;
    var r=wrap.getBoundingClientRect();
    box.style.display='block';
    var bw=box.offsetWidth,bh=box.offsetHeight;
    var top=r.top-bh-10;
    var left=r.left+r.width/2-bw/2;
    if(top<8)top=r.bottom+8;
    if(left<8)left=8;
    if(left+bw>window.innerWidth-8)left=window.innerWidth-bw-8;
    box.style.top=top+'px';
    box.style.left=left+'px';
  }
  document.addEventListener('mouseover',function(e){
    var wrap=e.target.closest('.tooltip-wrap');
    if(wrap)positionTooltip(wrap);
  });
  document.addEventListener('mouseout',function(e){
    var wrap=e.target.closest('.tooltip-wrap');
    if(wrap&&!wrap.contains(e.relatedTarget)){
      var box=wrap.querySelector('.tooltip-box');
      if(box)box.style.display='none';
    }
  });
})();
</script>
</body>
</html>
