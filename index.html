/* ============================================================
   GENERADOR DE PROMPTS DE UNIVERSO (Fase D — v5.4)
   El alumno rellena un formulario en el modal "Crear universo"
   y se genera un prompt autocontenido que pega en cualquier IA.
   La IA devuelve un JSON que el alumno importa con el botón ⚙️
   (lo valida validateUniverse). Tres niveles de detalle:
   - rapida:  datos mínimos, la IA inventa todo el sabor.
   - guiada:  + tono y citas semilla que orientan a la IA.
   - avanzada: + control fino (subtítulo, oráculo, terminal, efecto).
   ============================================================ */

// Catálogo de efectos visuales disponibles (claves de EFFECT_REGISTRY).
// Se mantiene aquí como lista declarativa para el formulario; si se añade
// un efecto al registro, añadir también su entrada aquí.
const UNIVERSE_EFFECT_OPTIONS = [
  {value:'matrixRain', label:'Lluvia de código (estilo Matrix)'},
  {value:'tronTrails',  label:'Estelas de neón en rejilla (estilo Tron)'},
  {value:'hyperspace',  label:'Salto al hiperespacio (estrellas radiales)'}
];

// Guía semántica de las 15 insignias: qué condición cumple cada una.
// La IA necesita esto para inventar nombre/desc coherentes con el universo
// SIN cambiar la mecánica (la lógica vive en BADGE_LOGIC, es fija).
const BADGE_GUIDE = [
  {id:'blue_pill',      cond:'Completar el primer test'},
  {id:'red_pill',       cond:'Elegir el lado "sarcástico/reto" por primera vez al ver resultados'},
  {id:'white_rabbit',   cond:'Completar todos los sets de un módulo'},
  {id:'the_one',        cond:'Sacar 100% en un test'},
  {id:'no_spoon',       cond:'Dominar 50 preguntas (llevarlas a la caja final de repetición espaciada)'},
  {id:'nebuchadnezzar', cond:'Completar un set de módulo con 80% o más'},
  {id:'streak_fire',    cond:'Mantener una racha de 7 días'},
  {id:'resurrection',   cond:'Retomar la app tras romper una racha'},
  {id:'architect',      cond:'Completar 10 sesiones de Entrenamiento por repetición espaciada'},
  {id:'mastery',        cond:'Dominar todos los objetivos de un módulo (todos en verde)'},
  {id:'deja_vu',        cond:'Repetir el mismo test 3 veces'},
  {id:'oracle_50',      cond:'Completar 50 tests en total'},
  {id:'bullet_time',    cond:'Responder correctamente en menos de 5 segundos'},
  {id:'jacking_in',     cond:'Importar el primer cuestionario'},
  {id:'kung_fu',        cond:'Desbloquear todas las demás insignias (insignia culminante)'}
];

// Convierte un HEX (#rrggbb) a "r,g,b". Tolera formato corto y mayúsculas.
function hexToRgbStr(hex){
  let h=String(hex||'').trim().replace('#','');
  if(h.length===3) h=h.split('').map(c=>c+c).join('');
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return '0,229,255';
  const n=parseInt(h,16);
  return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);
}

// Deriva los 8 tokens de noche a partir de un único HEX de acento. Así el
// alumno solo elige UN color y el prompt ya trae el bloque night sugerido.
function nightTokensFromHex(hex){
  const rgb=hexToRgbStr(hex);
  return {
    accent:hex, accentRgb:rgb, accentText:hex,
    accentBg:'rgba('+rgb+',.12)', accentBorder:'rgba('+rgb+',.38)',
    accentSubtle:'rgba('+rgb+',.06)', accentStrong:'rgba('+rgb+',.22)',
    accentGlow:'0 0 16px rgba('+rgb+',.55)'
  };
}

// slug a partir del nombre, para sugerir el id del universo.
function slugifyUniverseId(name){
  return String(name||'').toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,24) || 'universo';
}

// Construye el prompt de texto que el alumno pegará en una IA.
// `f` = datos del formulario; `level` = 'rapida'|'guiada'|'avanzada'.
function buildUniversePrompt(f, level){
  const id = slugifyUniverseId(f.id || f.name);
  const rgb = hexToRgbStr(f.accent);
  const night = nightTokensFromHex(f.accent);
  const nightJson = JSON.stringify(night, null, 2).split('\n').map(l=>'  '+l).join('\n').trim();
  const badgeList = BADGE_GUIDE.map(b=>'  - "'+b.id+'": '+b.cond).join('\n');

  // Resolución del efecto. El campo técnico "effect" del JSON debe ser SIEMPRE una
  // clave válida del registro de efectos (si no, el motor cae a matrixRain). Si el
  // alumno eligió "Otro" y describió un efecto propio, el JSON usará la clave válida
  // más afín (la IA decide) y la descripción se pasa como guía de inspiración.
  const validEffectKeys = UNIVERSE_EFFECT_OPTIONS.map(o=>o.value);
  const isCustomEffect = (f.effect==='__custom');
  const effectDesc = (f.effectCustom||'').trim();
  // Para el ejemplo del campo "effect" damos uno válido por defecto.
  const effectTech = (!isCustomEffect && validEffectKeys.indexOf(f.effect)>=0) ? f.effect : 'matrixRain';
  let effectInstruction;
  if(isCustomEffect && effectDesc){
    effectInstruction = 'El alumno imagina este efecto de celebración: "'+effectDesc+'". '
      + 'El catálogo de efectos ANIMADOS disponibles ahora mismo es limitado: '
      + validEffectKeys.map((k,i)=>'"'+k+'" ('+UNIVERSE_EFFECT_OPTIONS[i].label+')').join(' y ')+'. '
      + 'En el campo "effect" del JSON usa la clave de ese catálogo cuyo estilo MÁS se parezca a lo que describe el alumno (no inventes una clave nueva o el efecto no se renderizará). '
      + 'Usa además su descripción para inspirar los COLORES, las citas y el tono general del universo.';
  } else {
    effectInstruction = 'Usa "effect": "'+effectTech+'".';
  }
  // Color del efecto (opcional). Si el alumno lo activó, va al campo "effectColor".
  const effectColorOn = !!f.effectColorOn && /^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(String(f.effectColor||'').trim());
  const effectColorVal = effectColorOn ? (String(f.effectColor).trim().charAt(0)==='#'?String(f.effectColor).trim():'#'+String(f.effectColor).trim()) : '';
  if(effectColorOn){
    effectInstruction += ' Además, el efecto debe pintarse en el color "'+effectColorVal+'" (NO el acento): incluye en el JSON el campo "effectColor": "'+effectColorVal+'".';
  }

  // Bloque de extras según nivel.
  let extras='';
  if(level!=='rapida'){
    const tono = (f.tone||'').trim();
    const citas = (f.seedQuotes||'').trim();
    extras += '\n## Tono y referencias que el alumno aporta\n';
    if(tono)  extras += '- Tono deseado de los personajes y la narrativa: '+tono+'\n';
    if(citas) extras += '- Citas o frases semilla (PARAFRASÉALAS, no las copies literalmente; úsalas solo como inspiración de estilo):\n'+citas.split('\n').map(c=>'    · '+c.trim()).filter(c=>c.length>6).join('\n')+'\n';
    if(!tono && !citas) extras += '- (El alumno no especificó tono concreto: elige uno fiel al espíritu de la franquicia, siempre parafraseando.)\n';
  }
  if(level==='avanzada'){
    extras += '\n## Indicaciones avanzadas\n';
    if((f.subtitle||'').trim()) extras += '- Subtítulo/lema del universo (puedes refinarlo): "'+f.subtitle.trim()+'"\n';
    extras += '- Efecto visual de celebración: '+effectInstruction+'\n';
    extras += '- Genera las 3 secuencias de "terminal" con sabor propio del universo (comandos, rutas y mensajes coherentes con la franquicia), siguiendo EXACTAMENTE la forma del ejemplo (cls/text/delay, y suffix/cursor donde aplique).\n';
    extras += '- Genera pools de "oracle" ricos: 20 frases "neutral" y 10 por cada rol.\n';
  } else {
    extras += '\n## Efecto visual\n- '+effectInstruction+'\n';
  }

  // En nivel rápido/guiado compartimos phrases por referencia (phrasesRef:"matrix")
  // para no obligar a la IA a inventar 120 frases educativas agnósticas del temario.
  // En avanzado lo dejamos a elección, pero recomendamos igualmente phrasesRef.
  const phrasesNote = level==='avanzada'
    ? 'Incluye "phrasesRef": "matrix" (recomendado: reutiliza los pools educativos existentes). Solo si el alumno quiere pools propios, incluye "phrases" con los 6 arrays ('+SCHEMA_PHRASES_KEYS.join(', ')+'), cada uno con frases motivacionales/sarcásticas GENÉRICAS de estudio (no temáticas de la franquicia).'
    : 'Incluye "phrasesRef": "matrix" (reutiliza los pools educativos ya existentes; NO inventes el bloque "phrases").';

  return [
'Eres un diseñador de "universos" (skins temáticos) para El Konstructo, una app de práctica de cuestionarios gamificada. Tu tarea es generar UN universo completo en formato JSON, listo para importar, basado en la franquicia y los datos que te doy.',
'',
'## Datos del universo a crear',
'- Nombre visible: '+(f.name||'(sin nombre)'),
'- id sugerido (úsalo tal cual): '+id,
'- Franquicia / película de referencia: '+(f.franchise||'(no especificada)'),
'- Color de acento (modo noche): '+(f.accent||'#00e5ff')+'  (rgb '+rgb+')',
'- Personaje protagonista A (rol "héroe/motivador"): '+(f.roleAName||'(sin nombre)'),
'- Personaje protagonista B (rol "contrapunto/ágil"): '+(f.roleBName||'(sin nombre)'),
extras,
'## REGLAS DE PROPIEDAD INTELECTUAL (obligatorias)',
'- PARAFRASEA el tono y el espíritu de la franquicia. NO transcribas diálogos literales de películas, libros o juegos.',
'- NO uses logotipos, nombres de marca registrada como identificadores técnicos, ni texto extraído literalmente de ninguna obra.',
'- Las frases del oráculo, terminal y citas deben ser ORIGINALES, evocando el estilo sin copiarlo.',
'- Si un personaje tiene una frase célebre, reescríbela con otras palabras manteniendo solo la idea.',
'',
'## Esquema EXACTO del JSON que debes devolver',
'Devuelve un único objeto JSON con estos campos (todos obligatorios salvo que se indique). Respeta nombres y tipos al milímetro o la importación fallará:',
'',
'- "id": "'+id+'"  (string, sin espacios)',
'- "name": "'+(f.name||'')+'"  (string visible en el selector)',
'- "subtitle": string corto (lema del universo)',
'- "night": objeto con EXACTAMENTE estas 8 claves de color (usa estos valores derivados del acento elegido):',
nightJson,
'- "roles": { "a": {"key":"<slug_de_'+(f.roleAName||'A')+'>", "label":"<símbolo> <NOMBRE EN MAYÚSCULAS>", "name":"'+(f.roleAName||'')+'"}, "b": {"key":"<slug_de_'+(f.roleBName||'B')+'>", "label":"<símbolo> <NOMBRE>", "name":"'+(f.roleBName||'')+'"} }',
'- "effect": "'+effectTech+'"  (debe ser una clave de efecto válida del registro)',
(effectColorOn ? '- "effectColor": "'+effectColorVal+'"  (color HEX con el que se pinta el efecto; distinto del acento)' : '- "effectColor": OPCIONAL — omítelo y el efecto usará el color de acento; inclúyelo (HEX) solo si quieres un color de efecto distinto del acento'),
'- "strings": objeto con EXACTAMENTE estas 23 claves (todas string), tematizadas a la franquicia:',
'  '+SCHEMA_STRINGS_KEYS.join(', '),
'  (tabQuiz/tabTrain/tabHistory llevan un emoji o símbolo al inicio; spaced/celebrationQuote/emptyBox3/pillBlue/pillRed van entre comillas dentro del string, como citas).',
'- "choice": { "shape": "pill" o "disc", "a": {"shapeClass","captionClass","inlineClass","attribution"}, "b": {idem} }. "a" es el lado motivacional, "b" el sarcástico. La "attribution" SIEMPRE empieza por "— El Konstructo · " seguido del nombre temático de la elección (no cambies "El Konstructo").',
'- "oracle": { "neutral": [20 frases], "<key del rol A>": [10 frases], "<key del rol B>": [10 frases] }. Las claves de rol deben COINCIDIR con roles.a.key y roles.b.key.',
'- "badges": objeto con EXACTAMENTE estos 15 ids; cada uno con {"icon": emoji, "name": string, "desc": string}. NO cambies los ids ni inventes otros. Tematiza icon/name/desc a la franquicia, pero la desc debe seguir describiendo la MISMA condición:',
badgeList,
'- '+phrasesNote,
'- "terminal": array de 1 a 3 secuencias. Cada secuencia es un array de líneas {"cls": "tl-dim|tl-prompt|tl-out|tl-warn|tl-ascii|tl-special", "text": string, "delay": número en ms}; las líneas de prompt llevan además "suffix" y la última puede llevar "cursor": true.',
'- "duel": OBLIGATORIO. La "escena de duelo" es un easter egg: aparece de vez en cuando un VILLANO de la franquicia que se burla del alumno, luego el HÉROE le replica, y al final un MENTOR le anima. NO se usan imágenes específicas (se dibujan siluetas-arquetipo genéricas), solo TEXTOS. Estructura:',
'    {',
'      "villainName": nombre del antagonista de la franquicia (string),',

'      "villain": { "neutral": [12 burlas del villano al alumno por estudiar/fallar], "resurrection": [5 burlas para cuando el alumno vuelve tras abandonar], "oracle": [5 frases inquietantes justo antes de empezar un test] },',
'      "heroRemates": [4 réplicas desafiantes del héroe al villano],',
'      "mentorLines": [3 frases de ánimo del mentor al alumno, cálidas y sabias]',
'    }',
'    IMPORTANTE PI: todas las frases ORIGINALES, evocando el estilo SIN copiar diálogos literales. El villano trata al alumno con desdén; el héroe responde con determinación; el mentor, con calidez. Mantén coherencia con el tono indicado.',
'',
'## Formato de salida',
'Devuelve ÚNICAMENTE el objeto JSON, sin markdown, sin ```json, sin explicaciones. Empieza por { y termina por }.',
'',
'## Ejemplo COMPLETO de un universo válido (úsalo como plantilla de estructura, NO copies su contenido):',
UNIVERSE_EXAMPLE_JSON

// Valida un universo contra el esquema. Devuelve {valid, errors:[...rutas]}.
// `phrasesOptional`: si true, acepta que phrases falte (se compartirá por
// referencia, como hace Tron). Para import de un universo suelto exigimos phrases
// salvo que el fichero declare phrasesRef apuntando a un universo ya existente.
function validateUniverse(u, opts){
  opts = opts || {};
  const errors = [];
  const need = (cond, path) => { if(!cond) errors.push(path); };
  const isStr = v => typeof v === 'string' && v.length > 0;
  const isArr = v => Array.isArray(v) && v.length > 0;

  if(!u || typeof u !== 'object'){ return {valid:false, errors:['(el fichero no es un objeto de universo)']}; }

  need(isStr(u.id), 'id');
  need(isStr(u.name), 'name');
  need(isStr(u.subtitle), 'subtitle');
  need(isStr(u.effect), 'effect');
  // effectColor es OPCIONAL; si está, debe ser un HEX válido (#rgb o #rrggbb).
  if(u.effectColor!==undefined && u.effectColor!==null && u.effectColor!==''){
    need(typeof u.effectColor==='string' && /^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(String(u.effectColor).trim()),
      'effectColor (debe ser un color HEX, p. ej. #aabbcc)');
  }

  // night (8 tokens)
  if(!u.night || typeof u.night !== 'object'){ errors.push('night'); }
  else SCHEMA_NIGHT_KEYS.forEach(k => need(isStr(u.night[k]), 'night.'+k));

  // roles a/b con key/label/name
  if(!u.roles || !u.roles.a || !u.roles.b){ errors.push('roles (a y b)'); }
  else ['a','b'].forEach(side => {
    ['key','label','name'].forEach(k => need(isStr(u.roles[side] && u.roles[side][k]), 'roles.'+side+'.'+k));
  });

  // strings (23 claves)
  if(!u.strings || typeof u.strings !== 'object'){ errors.push('strings'); }
  else SCHEMA_STRINGS_KEYS.forEach(k => need(isStr(u.strings[k]), 'strings.'+k));

  // choice: shape + lados a/b
  if(!u.choice || typeof u.choice !== 'object'){ errors.push('choice'); }
  else {
    need(isStr(u.choice.shape), 'choice.shape');
    ['a','b'].forEach(side => SCHEMA_CHOICE_SIDE_KEYS.forEach(k =>
      need(isStr(u.choice[side] && u.choice[side][k]), 'choice.'+side+'.'+k)));
  }

  // phrases (propio) o phrasesRef (compartido). Si ninguno y no es opcional → error.
  const hasRef = isStr(u.phrasesRef);
  const hasOwn = u.phrases && typeof u.phrases === 'object';
  if(hasOwn){
    SCHEMA_PHRASES_KEYS.forEach(k => need(isArr(u.phrases[k]), 'phrases.'+k));
  } else if(hasRef){
    need(!!UNIVERSES[u.phrasesRef], 'phrasesRef → universo "'+u.phrasesRef+'" no existe');
  } else if(!opts.phrasesOptional){
    errors.push('phrases (o phrasesRef a un universo existente)');
  }

  // oracle: neutral + un pool por cada clave de rol
  if(!u.oracle || typeof u.oracle !== 'object'){ errors.push('oracle'); }
  else {
    need(isArr(u.oracle.neutral), 'oracle.neutral');
    if(u.roles && u.roles.a && u.roles.b){
      need(isArr(u.oracle[u.roles.a.key]), 'oracle.'+(u.roles.a.key||'(rolA)'));
      need(isArr(u.oracle[u.roles.b.key]), 'oracle.'+(u.roles.b.key||'(rolB)'));
    }
  }

  // badges: las 15 presentaciones con icon/name/desc
  if(!u.badges || typeof u.badges !== 'object'){ errors.push('badges'); }
  else SCHEMA_BADGE_IDS.forEach(id => {
    const b = u.badges[id];
    if(!b){ errors.push('badges.'+id); }
    else ['icon','name','desc'].forEach(k => need(isStr(b[k]), 'badges.'+id+'.'+k));
  });

  // terminal: array de secuencias (cada una array de líneas)
  need(isArr(u.terminal), 'terminal');

  // duel: OPCIONAL. Si está presente, validamos su forma mínima (villano con al
  // menos un pool de frases + remates del héroe). mentorLines es opcional.
  if(u.duel!==undefined && u.duel!==null){
    if(typeof u.duel!=='object'){ errors.push('duel (debe ser un objeto)'); }
    else {
      const d=u.duel;
      need(isStr(d.villainName), 'duel.villainName');
      need(d.villain && typeof d.villain==='object' && isArr(d.villain.neutral), 'duel.villain.neutral');
      need(isArr(d.heroRemates), 'duel.heroRemates');
      // mentorLines, resurrection, oracle, cooldownMin → opcionales (no se exigen).
    }
  }

  return {valid: errors.length === 0, errors};
}

// Normaliza un universo recién importado: resuelve phrasesRef → phrases reales.
function hydrateUniverse(u){
  const out = Object.assign({}, u);
  if(!out.phrases && out.phrasesRef && UNIVERSES[out.phrasesRef]){
    out.phrases = UNIVERSES[out.phrasesRef].phrases;
  }
  return out;
}

// Fusiona los universos guardados con los nativos. Un universo guardado que ya no
// valide (esquema cambiado, fichero corrupto) se descarta con aviso en consola en
// vez de romper el arranque. Los nativos (matrix, tron) NO se pueden pisar.
const NATIVE_UNIVERSE_IDS = Object.keys(UNIVERSES);
(function mergeStoredUniverses(){
  const stored = getStoredUniverses();
  Object.keys(stored).forEach(uid => {
    if(NATIVE_UNIVERSE_IDS.indexOf(uid) >= 0) return; // no pisar nativos
    const u = hydrateUniverse(stored[uid]);
    const res = validateUniverse(u, {phrasesOptional:true});
    if(res.valid){ UNIVERSES[uid] = u; }
    else { console.warn('Universo guardado "'+uid+'" descartado (esquema inválido):', res.errors); }
  });
})();

// Restauración de página tras un cambio de universo (que recarga). One-shot,
// memoizado a nivel de módulo: las claves se consumen en la primera llamada y
// las tres inicializaciones de estado (page, results, viewingHistoryEntry) leen
// del mismo resultado cacheado. Una recarga normal (sin cambio de universo) no
// tiene claves y cae a 'home', como siempre.
let _returnState=null;
function consumeReturnState(){
  if(_returnState) return _returnState;
  let page='home', results=null, viewingHistory=false;
  try{
    const sp=localStorage.getItem('quiz_return_page');
    if(sp){
      localStorage.removeItem('quiz_return_page');
      if(sp==='results'){
        const rid=localStorage.getItem('quiz_return_results_id');
        localStorage.removeItem('quiz_return_results_id');
        if(rid){
          const hist=JSON.parse(localStorage.getItem('quiz_history')||'[]');
          const entry=hist.find(h=>String(h.id)===String(rid));
          if(entry){ page='results'; results=entry; viewingHistory=true; }
        }
      } else if(['home','repaso','history'].includes(sp)){
        page=sp;
      }
    }
  }catch{}
  _returnState={page,results,viewingHistory};
  return _returnState;
}

function getPhraseKey(pct, pill) {
  const range = pct < 50 ? 'low' : pct < 80 ? 'med' : 'high';
  return pill + '_' + range;
}

function getNextPhrase(pct, pill) {
  const key = getPhraseKey(pct, pill);
  const pool = PHRASES[key];
  let queues;
  try { queues = JSON.parse(localStorage.getItem('quiz_phrase_queues') || '{}'); } catch { queues = {}; }
  if (!queues[key] || queues[key].length === 0) {
    // Refill: shuffle a fresh copy
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    queues[key] = shuffled;
  }
  const phrase = queues[key].shift();
  localStorage.setItem('quiz_phrase_queues', JSON.stringify(queues));
  return phrase;
}

// Frase de recompensa de DOMINIO. level ∈ 'lesson'|'objective'|'block'.
// Cascada de contenido: phrases del universo activo → phrases de matrix (siempre
// existen). Así los universos personalizados que no definan mastery_* nunca quedan
// sin texto. Misma mecánica de cola anti-repetición que getNextPhrase.
function getMasteryPhrase(level){
  const key = 'mastery_' + level;
  const active = U().phrases || {};
  const pool = (Array.isArray(active[key]) && active[key].length)
    ? active[key]
    : (UNIVERSES.matrix.phrases[key] || []);
  if(!pool.length) return '';
  let queues;
  try { queues = JSON.parse(localStorage.getItem('quiz_mastery_queues') || '{}'); } catch { queues = {}; }
  // La cola se indexa por universo+nivel para no mezclar pools entre temáticas.
  const qKey = (ACTIVE_UNIVERSE||'matrix') + ':' + key;
  if (!queues[qKey] || queues[qKey].length === 0) {
    queues[qKey] = [...pool].sort(() => Math.random() - 0.5);
  }
  const phrase = queues[qKey].shift();
  localStorage.setItem('quiz_mastery_queues', JSON.stringify(queues));
  return phrase;
}
// Cita de MÓDULO DOMINADO para la tarjeta compartible. Fija por módulo (mk = M1..T5).
// Cascada: (1) masteryModuleOwn del universo activo (Tron) → (2) phrases.mastery_module
// del universo activo (Matrix) → (3) genérica del universo (masteryModuleGenericOwn o
// phrases.mastery_module_generic) al azar → (4) genérica de Matrix. Nunca vacía.
function getModulePhrase(mk){
  const u=U();
  // (1) campo propio del universo (Tron lo usa para pisar las citas)
  if(u.masteryModuleOwn && u.masteryModuleOwn[mk]) return u.masteryModuleOwn[mk];
  // (2) mapa en phrases del universo activo (Matrix)
  const ph=u.phrases||{};
  if(ph.mastery_module && ph.mastery_module[mk]) return ph.mastery_module[mk];
  // (3) genérica del universo activo
  const genOwn=u.masteryModuleGenericOwn;
  if(Array.isArray(genOwn)&&genOwn.length) return genOwn[Math.floor(Math.random()*genOwn.length)];
  const genPh=ph.mastery_module_generic;
  if(Array.isArray(genPh)&&genPh.length) return genPh[Math.floor(Math.random()*genPh.length)];
  // (4) último recurso: genérica de Matrix
  const mg=UNIVERSES.matrix.phrases.mastery_module_generic||[];
  return mg.length?mg[Math.floor(Math.random()*mg.length)]:'';
}

// v1.8: alias para la tarjeta compartible de maestría. Texto libre del alumno
// (nombre real o apodo). Se recuerda entre sesiones; '' = sin nombre (tarjeta anónima).

function saveStreak(d){localStorage.setItem('quiz_streak',JSON.stringify(d))}
function updateStreak(){
  const now=Date.now();
  const d=getStreak();
  const last=d.lastTest||0;
  const hoursSince=(now-last)/3600000;
  // Same day or within 48h window
  const lastDate=new Date(last);
  const todayDate=new Date(now);
  const isSameDay=lastDate.toDateString()===todayDate.toDateString();
  if(isSameDay){
    // Already counted today, just update lastTest time
    d.lastTest=now;
  } else if(hoursSince<=48){
    // Within window, extend streak
    d.current=(d.current||0)+1;
    d.record=Math.max(d.current,d.record||0);
    d.lastTest=now;
  } else {
    // Streak broken
    d.current=1;
    d.record=Math.max(1,d.record||0);
    d.lastTest=now;
  }
  saveStreak(d);
  return d;
}
function getStreakStatus(){
  const d=getStreak();
  if(!d.lastTest)return{current:0,record:0,alive:false};
  const hoursSince=(Date.now()-d.lastTest)/3600000;
  return{current:d.current||0,record:d.record||0,alive:hoursSince<=48};
}


// -- Oracle phrase pools --

function getOraclePhrase(role) {
  const neutral = ORACLE_PHRASES.neutral;
  // El pool personal se indexa por la CLAVE del rol activo (definida por el
  // universo: 'neo'/'trinity' en Matrix, 'sam'/'quorra' en Tron...).
  const personal = ORACLE_PHRASES[role] || ORACLE_PHRASES[U().roles.a.key];
  // 1 in 3 chance of personal phrase
  const pool = Math.random() < 0.33 ? personal : neutral;
  const key = 'oracle_queue_' + (pool === neutral ? 'neutral' : role);
  let queues;
  try { queues = JSON.parse(localStorage.getItem('quiz_oracle_queues') || '{}'); } catch { queues = {}; }
  if (!queues[key] || queues[key].length === 0) {
    queues[key] = [...pool].sort(() => Math.random() - 0.5);
  }
  const phrase = queues[key].shift();
  localStorage.setItem('quiz_oracle_queues', JSON.stringify(queues));
  return phrase;
}

function isModLvl(sets,setId){
  const s=sets.find(x=>x.id===setId);
  return s?!!s.name.match(/^[MT]\d+(?:\s|$)/):false;
}
function checkModuleComplete(history,sets){
  const mods={};
  sets.forEach(s=>{const m=s.name.match(/^([MT]\d+)/);if(m)mods[m[1]]=(mods[m[1]]||[]).concat(s.id);});
  return Object.values(mods).some(ids=>ids.every(id=>history.some(h=>h.setId===id&&Math.round(h.correct/h.total*100)>=50)));
}
// Insignia de maestría de módulo. v1.8: ya NO exige "todas las preguntas en caja 3"
// (insostenible al subir muchos cuestionarios por lección: el denominador se dispara).
// Ahora se sella cuando algún módulo tiene TODOS sus objetivos del catálogo medidos y
// dominados (media Leitner ≥ MASTERY_THRESHOLD). Robusto al volumen y fiel a "dominas el
// objetivo", no "farmeaste preguntas". Detecta el módulo por el prefijo del nombre del set.
function checkModuleMastery(sets,leitner){
  const mks={};
  (sets||[]).forEach(s=>{const m=(s.name||'').match(/^([MT]\d+)/);if(m)mks[m[1]]=true;});
  return Object.keys(mks).some(mk=>isModuleSealed(sets,leitner,mk));
}
function checkDejaVu(history){
  const counts={};
  history.forEach(h=>{counts[h.setId]=(counts[h.setId]||0)+1;});
  return Object.values(counts).some(c=>c>=3);
}
function checkBulletTime(history){
  return history.some(h=>h.questions&&h.answers&&h.times&&h.questions.some((q,i)=>h.answers[i]===q.correct&&h.times[i]<=5));
}
function countCaja3(sets,leitner){
  let n=0;
  sets.forEach(s=>s.questions.forEach(q=>{if((leitner[getQKey(q)]||{level:1}).level===3)n++;}));
  return n;
}

// ── EASTER EGGS · secretos de exploración (v1.3) ──────────────────────────────
// Filosofía: NO son recompensas por puntuar (eso son las insignias). Son secretos
// escondidos por la interfaz que se descubren EXPLORANDO. Tres ejes de la app:
// constancia (insignias) · maestría (tarjetas, Fase B) · curiosidad (easter eggs).
// Patrón Vía 3: el LUGAR es fijo/nativo (logo, racha, ayuda…), el CONTENIDO que
// revelan sale del universo activo. El registro vive en localStorage SOLO como
// "¿descubierto sí/no? + cuándo"; nada de arte pesado aquí.
//
// Estados de un easter egg en la vitrina de Historial ("Tus easter eggs"):
//   - apagado mudo:   "??? · por descubrir"  (icono: huevo cerrado con ?)
//   - apagado pista:  acertijo críptico       (solo si difficulty:'hard' y el alumno
//                     lleva ≥ umbral de sesiones sin hallarlo; huevo púrpura + 💡)
//   - encendido:      huevo abierto / SVG temático + el GESTO con que se halló (trofeo)
//
// Acertijos (red de seguridad anti-frustración): solo en los 'hard'. Se escalonan
// 1 cada EE_HINT_STEP sesiones, contando SOLO los hard aún no descubiertos. Así el
// explorador activo casi nunca ve un acertijo; el que se atasca recibe ayuda gradual.
const EE_HINT_STEP=15;   // sesiones entre acertijos sucesivos (≈ 6 meses ≈ 60 sesiones / 4 hard)
const EE_HINT_FIRST=15;  // primera pista no antes de la sesión nº 15 (exploración limpia al principio)

// Catálogo. `reveal`: cómo se muestra el gesto al descubrirlo (TROFEO, no instrucción
// previa). `hint`: acertijo críptico para los hard. `icon`: SVG temático opcional;
// si falta, la vitrina usa el huevo abierto genérico.
const EASTER_EGGS=[
  {id:'ee_terminal', name:'El terminal oculto', difficulty:'easy',
   reveal:'Mantén pulsado el logo', hint:null, art:'terminal'},
  {id:'ee_duel', name:'El duelo del agente', difficulty:'easy',
   reveal:'Mantén pulsada la racha', hint:null, art:'duel'},
  {id:'ee_help_quote', name:'El susurro de la guía', difficulty:'hard',
   reveal:'Triple clic en el icono de Ayuda', hint:'Quien pregunta tres veces seguidas, a veces recibe una respuesta que no buscaba.', art:'quote'},
  {id:'ee_konami', name:'La secuencia secreta', difficulty:'hard',
   reveal:'↑ ↑ ↓ ↓ ← → ← → con el teclado', hint:'Los viejos jugadores conocen un conjuro de flechas. Arriba, arriba…', art:'effect'},
  {id:'ee_help_hidden', name:'La página que no estaba', difficulty:'hard',
   reveal:'Busca una palabra clave en la Ayuda', hint:'En la guía hay una sección que solo aparece si sabes qué buscar. Prueba a teclear el nombre de la app.', art:'page'},
  {id:'ee_results_void', name:'El vacío revelador', difficulty:'hard',
   reveal:'Clic en el espacio bajo tus resultados', hint:'Al terminar, no todo está donde se ve. Hay un hueco silencioso esperando un clic.', art:'void'}
];

function saveEasterEggs(d){try{localStorage.setItem('quiz_eastereggs',JSON.stringify(d))}catch(e){}}
// Marca un easter egg como descubierto (idempotente). Devuelve true si era nuevo.
function discoverEasterEgg(id){
  const d=getEasterEggs();
  if(d[id]) return false;
  d[id]={date:Date.now()};
  saveEasterEggs(d);
  return true;
}
function eggIsFound(id){ return !!getEasterEggs()[id]; }
// ¿Debe mostrarse el acertijo de un egg hard aún no hallado? Escalonado por sesiones
// (history.length), contando solo los hard pendientes y repartiendo 1 pista cada
// EE_HINT_STEP. El i-ésimo hard pendiente (ordenado por catálogo) desbloquea su pista
// en la sesión EE_HINT_FIRST + i*EE_HINT_STEP.
function eggHintVisible(id, sessions){
  const egg=EASTER_EGGS.find(e=>e.id===id);
  if(!egg||egg.difficulty!=='hard'||eggIsFound(id)) return false;
  const found=getEasterEggs();
  const pendingHard=EASTER_EGGS.filter(e=>e.difficulty==='hard'&&!found[e.id]);
  const idx=pendingHard.findIndex(e=>e.id===id);
  if(idx<0) return false;
  return sessions>=(EE_HINT_FIRST+idx*EE_HINT_STEP);
}
function evaluateBadges(history,sets,leitner,lastPill,streakData){
  const earned=getBadges();
  const unlockedIds=Object.keys(earned);
  const newlyUnlocked=[];
  ACHIEVEMENTS.forEach(a=>{
    if(earned[a.id])return;
    try{
      const ok=a.check(history,sets,leitner,lastPill,streakData,unlockedIds);
      if(ok){
        earned[a.id]=new Date().toLocaleDateString('es-ES');
        newlyUnlocked.push(a);
      }
    }catch(e){}
  });
  if(newlyUnlocked.length)saveBadges(earned);
  return newlyUnlocked;
}

// Deriva moduleKey (M2/T1) a partir del campo libre p.modulo ("M2", "Módulo 2", "m2"...)
function promptModuleKey(p){
  if(!p||!p.modulo)return '';
  const raw=String(p.modulo).trim();
  let m=raw.match(/([MT])\s*0*(\d+)/i);              // "M2", "T1", "M 2"
  if(m)return m[1].toUpperCase()+parseInt(m[2],10);
  m=raw.match(/m[oó]dulo\s+0*(\d+)/i);                // "Módulo 2"
  if(m)return 'M'+parseInt(m[1],10);
  m=raw.match(/track\s+0*(\d+)/i);                    // "Track 1"
  if(m)return 'T'+parseInt(m[1],10);
  return '';
}
// Construye la sección "##Objetivos de esta generación" con los objetivos no dominados.
// Numera cada objetivo por su posición en el bloque (estable) y pide a NotebookLM el
// campo "obj" en cada pregunta, para poder medir el dominio objetivo a objetivo.
// Lee estado vivo (sets + leitner) desde localStorage para no depender del render.
function buildFocusSection(p,maxObj){
  if(p&&p.focusOn===false)return '';   // toggle del usuario: foco desactivado
  const mk=promptModuleKey(p);
  if(!mk)return '';
  let sets=[];try{sets=JSON.parse(localStorage.getItem('quiz_sets')||'[]');}catch{sets=[];}
  const leitner=getLeitner();
  const blockNum=p.bloque?String(p.bloque).replace(/\D/g,''):'';
  // Cuando NO se indica bloque, Cuestionarios prioriza el bloque más flojo ya
  // practicado (repaso inteligente). El examen completo de módulo ya NO vive aquí:
  // tiene su propia página (Simulacros), con su builder y reparto por bloque.
  const f=focusObjectives(sets,leitner,mk,blockNum,0); // 0 = todos los candidatos
  if(!f||!f.objetivos||!f.objetivos.length)return '';
  // CATÁLOGO DE CLASIFICACIÓN: SIEMPRE todos los objetivos del bloque, en full y en
  // compacto. Truncarlo (antes 3/2 vía maxObj) hacía que NotebookLM no pudiera etiquetar
  // las preguntas del 3er objetivo, dejando huecos en el mapa de dominio. El maxObj ya no
  // recorta el catálogo; solo la selección MANUAL del usuario (focusExclude) se usa como
  // una pista suave de énfasis, sin quitar ningún objetivo de la lista de clasificación.
  const allObjs=f.objetivos;
  const hasManual=!!(p&&Array.isArray(p.focusExclude)&&p.focusExclude.length);
  const emphasis=hasManual?allObjs.filter(o=>p.focusExclude.indexOf(o)<0):[];
  // Número estable = posición del objetivo en su bloque (1-based), NO posición en la
  // selección. Así "obj":2 apunta siempre al mismo objetivo aunque se enfaticen otros.
  const numOf=(o)=>{const i=allObjs.indexOf(o);return i>=0?i+1:'?';};
  let s=`##Objetivos de aprendizaje del bloque (catálogo de clasificación`;
  s+=f.label?` · ${f.label}):\n`:`):\n`;
  s+=`Genera las preguntas a partir del contenido REAL de las fuentes seleccionadas, sin forzar la cobertura de todos los objetivos: una lección puede cubrir solo uno de ellos.\n`;
  s+=`Después, clasifica cada pregunta en el objetivo de esta lista que mejor le corresponda según las fuentes, y anota su número en el campo "obj" del JSON. Reglas de clasificación:\n`;
  s+=`- El valor de "obj" debe ser ÚNICAMENTE uno de los números de esta lista; nunca inventes un número que no aparezca aquí.\n`;
  s+=`- Si una pregunta no encaja con claridad en ningún objetivo de la lista, OMITE el campo "obj" en esa pregunta (es preferible no etiquetar a etiquetar mal).\n`;
  s+=`- Antes de cerrar el JSON, revisa que cada "obj" se corresponde de verdad con lo que evalúa la pregunta.\n`;
  s+=`Lista completa de objetivos del bloque (clasifica SIEMPRE contra TODOS estos; no se omite ninguno):\n`;
  allObjs.forEach(o=>{s+=`[${numOf(o)}] ${o}\n`;});
  if(emphasis.length&&emphasis.length<allObjs.length){
    s+=`Si el contenido de las fuentes lo permite, concentra ALGO MÁS de preguntas en estos objetivos, sin descuidar el resto del bloque: ${emphasis.map(numOf).join(', ')}.\n`;
  }
  return s;
}
// Abreviatura de plantilla que el prompt pedirá a NotebookLM incrustar en cada

const TPL_ID_TO_ABBR={quick:'RR',standard:'ST',errors:'RT',practical:'AP',analysis:'AR'};

  return (p&&TPL_ID_TO_ABBR[p.templateId])||'';
}

  // ##3 Pensamiento

    const r1=p.arR1||(DEFAULT_AR_R1(fileLabel));

  const optArr=JSON.stringify(['A','B','C','D','E'].slice(0,numOpc));

// ── SIMULACROS · Prompt de la Opción 4 ──────────────────────────────────────
// Pide a NotebookLM un SIMULACRO de examen del módulo completo, devuelto YA como

// Cada sub-array lleva preguntas con "obj" LOCAL (numeración relativa a su bloque),

//  1) Genera las preguntas a partir del CONTENIDO real; usa la fuente de objetivos

//  2) Lista de objetivos inline como respaldo, agrupada por bloque, por si en algún

  txt+=`- Cada pregunta tiene una sola respuesta correcta\n`;
  txt+=`- Distribución de dificultad: ${easyPct}% FÁCIL, ${medPct}% MEDIA, ${hardPct}% DIFÍCIL\n`;
  txt+=`- Las preguntas FÁCIL son definiciones directas o conceptos concretos (máximo ${p.lenPreg.easy} palabras)\n`;
  txt+=`- Las preguntas MEDIA presentan un contexto breve antes de la pregunta (máximo ${p.lenPreg.med} palabras incluyendo el contexto)\n`;
  txt+=`- Las preguntas DIFÍCIL plantean un caso con datos específicos y requieren una decisión justificada (máximo ${p.lenPreg.hard} palabras incluyendo el caso)\n`;
  txt+=`- La respuesta correcta debe tener una longitud similar a las incorrectas (±${p.variation}% de variación máxima)\n`;
  txt+=`- La respuesta correcta debe distribuirse aleatoriamente entre las posiciones ${optLetters}\n`;
  if(p.restrictions)txt+=`- ${p.restrictions.split('\n').join('\n- ')}\n`;
  txt+=`##2. Normas sobre las respuestas incorrectas:\n`;

  txt+=`- Deben mezclar términos reales del módulo usados en contexto incorrecto\n`;

  // (DEFAULT_COGNICION: "nada de definiciones que solo exijan recordar") contradecía

  const cognicionText=p.cognicion||DEFAULT_COGNICION;

  // #Formato — OBJETO multi-set por bloque (lo que la app ya importa).
  txt+=`#Formato requerido:\n`;
  txt+=`Devuelve el resultado ÚNICAMENTE como un OBJETO JSON válido, sin texto adicional, sin explicaciones, sin bloques de código markdown. Empieza directamente con \`{\` y termina con \`}\`.\n`;
  txt+=`El objeto tiene UNA CLAVE POR BLOQUE, con este patrón de nombre, y su valor es el array de preguntas de ese bloque:\n`;
  const sample={};
  const sampleKeys=(blockKeys.length?blockKeys:['1','2']).slice(0,3);
  sampleKeys.forEach(bk=>{ sample[`${mk||'M0'}-${bk} Simulacro`]='[ ...preguntas del bloque '+bk+'... ]'; });
  txt+='```\n{\n';
  sampleKeys.forEach((bk,i)=>{ txt+=`  "${mk||'M0'}-${bk} Simulacro": [ ...preguntas del bloque ${bk}... ]${i<sampleKeys.length-1?',':''}\n`; });
  txt+='}\n```\n';
  txt+=`Cada pregunta (objeto dentro de cada array) tiene exactamente esta estructura:\n`;
  txt+=`\`{"id": "${mk||'M0'}-1-Q01", "question": "texto", "options": ${optArr}, "correct": 0, "difficulty": "FÁCIL", "explicacion": "Explicación breve.", "obj": 1}\`\n\n`;
  txt+=`Donde:\n`;
  txt+=`- la CLAVE del objeto sigue el patrón "${mk||'M0'}-<bloque> Simulacro" (p. ej. "${mk||'M0'}-1 Simulacro"). IMPORTANTE: cada clave DEBE empezar por el prefijo del bloque (${mk||'M0'}-1, ${mk||'M0'}-2…). NO uses nombres genéricos como "Simulacro examen", "Parte 1" ni "Parte 2": cada bloque del temario va en su propia clave con su prefijo, para que las preguntas se clasifiquen en el bloque correcto.\n`;
  txt+=`- \`id\` es OBLIGATORIO en TODAS las preguntas (no lo omitas) y debe empezar EXACTAMENTE por el prefijo del bloque al que pertenece: "${mk||'M0'}-1-Q01", "${mk||'M0'}-1-Q02"… reiniciando la numeración en cada bloque. Ese prefijo es lo que clasifica cada pregunta; si falta o no coincide con su clave, la pregunta se archivará en el bloque equivocado.\n`;
  txt+=`- \`correct\` es el índice 0-${numOpc-1} de la opción correcta\n`;
  txt+=`- \`difficulty\` solo admite: "FÁCIL", "MEDIA" o "DIFÍCIL"\n`;
  txt+=`- \`explicacion\` es una frase corta (máximo 30 palabras) que justifica la respuesta correcta\n`;
  txt+=`- \`obj\` es el número del objetivo LOCAL de su bloque (según el catálogo de arriba); omítelo si la pregunta no encaja en ninguno`;
  return txt;
}

function buildPromptTextCompact(p){
  let prefix='MODULO';
  if(p.modulo){
    prefix=p.modulo.toUpperCase().replace(/\s+/g,'');
    if(p.bloque)prefix+='-'+p.bloque;
    if(p.leccion)prefix+='.'+p.leccion;
    prefix+='_TEMA';
  }
  const easyPct=Math.max(0,Math.min(100,p.easy||0));const medPct=Math.max(0,Math.min(100-easyPct,p.med||0));const hardPct=Math.max(0,100-easyPct-medPct);
  const numOpc=p.numOpciones||4;
  const optLetters=['A','B','C','D','E'].slice(0,numOpc).join(', ');
  const optArr=JSON.stringify(['A','B','C','D','E'].slice(0,numOpc));
  let txt='';
  // Cabecera — lee los campos editables, no plantilla fija
  txt+=`#Rol: ${(p.rol||DEFAULT_ROL).trim()}\n`;
  txt+=`#Contexto: ${(p.contexto||DEFAULT_CONTEXTO).trim()}\n`;
  txt+=`#Objetivo: ${(p.objetivo||DEFAULT_OBJETIVO).trim()}\n`;
  txt+=`#Tarea: ${(p.tarea||DEFAULT_TAREA_TPL(p.numQ)).replace(/\{n\}/g,p.numQ)}\n`;
  txt+=`#Reglas:\n`;
  // ##1 — sin cabecera, solo bullets
  txt+=`- ${numOpc} opciones (${optLetters}), una sola correcta, posición aleatoria\n`;
  txt+=`- Dificultad: ${easyPct}% FÁCIL, ${medPct}% MEDIA, ${hardPct}% DIFÍCIL\n`;
  txt+=`- FÁCIL: concepto concreto (máx ${p.lenPreg.easy} palabras). MEDIA: contexto breve + pregunta (máx ${p.lenPreg.med}). DIFÍCIL: caso con datos y decisión justificada (máx ${p.lenPreg.hard})\n`;
  txt+=`- La correcta de longitud similar a las incorrectas (±${p.variation}%)\n`;
  // ##2 — sin cabecera, solo bullets
  txt+=`- Incorrectas plausibles y relacionadas con el tema, nunca absurdas; usa términos reales del módulo en contexto incorrecto\n`;
  txt+=`- Palabras por opción incorrecta — FÁCIL: 5-${p.lenResp.easy}; MEDIA: 8-${p.lenResp.med}; DIFÍCIL: 8-${p.lenResp.hard}\n`;
  // ##3 pensamiento — sin cabecera
  txt+=`- Nada de definiciones de memoria: exige comprender, relacionar, contrastar, aplicar, analizar, diagnosticar o evaluar\n`;
  // ##Objetivos — catálogo de clasificación COMPLETO (todos los del bloque, igual que la
  // versión completa; el 2º argumento ya no recorta, se conserva por compatibilidad).
  const focusCompact=buildFocusSection(p,2);
  if(focusCompact)txt+=focusCompact;
  // ##4 contenidos + antirepeat — sin cabecera
  const hasExtra=p.extra||p.antirepeat;
  if(hasExtra){
    if(p.extra)txt+=`${p.extra}\n`;
    if(p.antirepeat){
      const fileLabel=p.antirepeatFile?`"${p.antirepeatFile}"`:'el banco de preguntas previas';
      const r1=p.arR1||DEFAULT_AR_R1(fileLabel);
      const r2=p.arR2||DEFAULT_AR_R2;
      const r3=p.arR3||DEFAULT_AR_R3;
      const r4=p.arR4||DEFAULT_AR_R4;
      if(p.arR1On!==false)txt+=`- ${r1}\n`;
      if(p.arR2On!==false)txt+=`- ${r2}\n`;
      if(p.arR3On!==false)txt+=`- ${r3}\n`;
      if(p.arR4On!==false)txt+=`- ${r4}\n`;
    }
  }
  if(p.extra2)txt+=`${p.extra2}\n`;
  // Formato
  const withObjC=!!focusCompact;
  const objFieldC=withObjC?`, "obj": 1`:``;
  const tplAbbrC=promptTplAbbr(p);
  const tplFieldC=tplAbbrC?`, "tpl": "${tplAbbrC}"`:``;
  txt+=`#Formato:\n`;
  txt+=`Solo un array JSON válido, sin texto ni markdown. Empieza con \`[\` y termina con \`]\`. Cada objeto:\n`;
  txt+=`\`{"id": "${prefix}-Q01", "question": "texto", "options": ${optArr}, "correct": 0, "difficulty": "FÁCIL", "explicacion": "texto"${objFieldC}${tplFieldC}}\`\n`;
  txt+=`- \`id\` OBLIGATORIO en cada pregunta y debe empezar por el prefijo de bloque ${prefix} (${prefix}-Q01, ${prefix}-Q02…); ese prefijo clasifica la pregunta en su bloque.\n`;
  txt+=`- \`correct\`: índice 0-${numOpc-1} de la correcta\n`;
  txt+=`- \`difficulty\`: "FÁCIL", "MEDIA" o "DIFÍCIL"\n`;
  txt+=`- \`explicacion\`: frase corta (máx 30 palabras) que justifica la correcta`;
  if(withObjC)txt+=`\n- \`obj\`: nº del objetivo del catálogo de arriba; omítelo si no encaja en ninguno`;
  if(tplAbbrC)txt+=`\n- \`tpl\`: SIEMPRE "${tplAbbrC}" en todas las preguntas`;
  return txt;
}

// Dispatcher único: enruta al builder correcto según el tipo de prompt.
// Un prompt de Simulacros (p.kind==='simulacro') usa SIEMPRE el builder de la
// Opción 4 (objeto multi-set por bloque); no tiene versión compacta porque el
// catálogo por bloque es lo que da valor. El resto de prompts (cuestionarios)
// mantienen su comportamiento previo (completo / compacto).
// ── PACK · Prompt de los 3 cuestionarios de un mismo bloque ────────────────────
// Pide a NotebookLM un OBJETO MULTI-SET POR ESTILO, ya con el formato que importa
// buildImportPlan: {"M2-1 Respuestas trampa":[...],"M2-1 Aplicación práctica":[...],...}.
// Incluye: clasificación por objetivo (ilumina el mapa), FOCO SUAVE hacia los objetivos
// no dominados (sin excluir el resto del bloque), anti-repetición entre los 3 sets y
// anti-repetición contra el banco previo (arR1..arR4). Foco calculado al generar, leyendo
// el bloque que el usuario fijó en el editor (mismas funciones que los cuestionarios).
function buildPackPromptText(p){
  const numOpc=p.numOpciones||4;
  const numQ=p.numQ||20;
  const optLetters=['A','B','C','D','E'].slice(0,numOpc).join(', ');
  const optArr=JSON.stringify(['A','B','C','D','E'].slice(0,numOpc));

  let prefix='MODULO';
  if(p.modulo){prefix=p.modulo.toUpperCase().replace(/\s+/g,'');if(p.bloque)prefix+='-'+p.bloque;}
  const blockKey=(p.modulo?p.modulo.toUpperCase().replace(/\s+/g,''):'M0')+(p.bloque?'-'+p.bloque:'');

  // Catálogo COMPLETO del bloque (numeración local 1..n) → clasifica e ilumina el mapa.
  const mk=promptModuleKey(p);
  const blockNum=p.bloque?String(p.bloque).replace(/\D/g,''):'';
  const objList=(mk&&blockNum)?objectivesForBlock(mk,blockNum):[];
  const withObj=objList.length>0;

  // FOCO SUAVE: objetivos NO dominados del bloque, del estado real (sets + Leitner).
  // No excluye nada del catálogo: solo marca cuáles priorizar.
  let weakSet=[];
  if(withObj){
    try{
      const fo=focusObjectives(getSetsLS(),getLeitner(),mk,blockNum,0); // max=0 → todos los candidatos
      weakSet=applyFocusSelection((fo&&fo.objetivos)||[],p,3)||[];
    }catch(e){weakSet=[];}
  }
  const isWeak=(t)=>weakSet.indexOf(t)>=0;

  const rol=p.rol||DEFAULT_ROL,contexto=p.contexto||DEFAULT_CONTEXTO,
        objetivo=p.objetivo||DEFAULT_OBJETIVO,restrict=p.restrictions||PROMPT_BASE.restrictions;
  const ar=p.antirepeat!==false; // ON por defecto en el pack
  const fileLabel=p.antirepeatFile?`"${p.antirepeatFile}"`:'';

  let txt='';
  if(rol)txt+=`#Rol: ${rol}\n`;
  if(contexto)txt+=`#Contexto: ${contexto}\n`;
  if(objetivo)txt+=`#Objetivo: ${objetivo}\n`;
  txt+=`#Tarea: Genera un PACK de ${PACK_STYLES.length} cuestionarios del MISMO bloque (${blockKey}), cada uno con un enfoque distinto y ${numQ} preguntas tipo test, a partir del CONTENIDO REAL de las fuentes.\n`;

  txt+=`#Reglas comunes a los ${PACK_STYLES.length} cuestionarios:\n`;
  txt+=`##1. Redacción\n- ${numOpc} opciones (${optLetters}), una sola correcta, posición aleatoria.\n`;
  if(restrict)txt+=`- ${String(restrict).split('\n').join(' ')}\n`;
  txt+=`##2. Incorrectas\n- Plausibles y técnicamente relacionadas, nunca absurdas. Usan términos reales del módulo en contexto incorrecto.\n`;

  txt+=`##3. ANTI-REPETICIÓN ENTRE LOS ${PACK_STYLES.length} CUESTIONARIOS (MUY IMPORTANTE)\n`;
  txt+=`- Cubren el MISMO bloque: NO repitas preguntas entre ellos. Son duplicadas si comparten concepto, escenario o respuesta, aunque cambie la redacción.\n`;
  txt+=`- Reparte los conceptos; si uno ya se evaluó en un cuestionario, en otro abórdalo SOLO desde un ángulo distinto.\n`;
  txt+=`- Antes de cerrar el JSON, revisa los ${PACK_STYLES.length} arrays juntos y elimina solapamientos.\n`;

  let secN=4;
  if(ar){
    txt+=`##${secN}. ANTI-REPETICIÓN CON EL BANCO PREVIO\n`;
    if(p.arR1On!==false)txt+=`- ${(p.arR1||DEFAULT_AR_R1(fileLabel))}\n`;
    if(p.arR2On!==false)txt+=`- ${(p.arR2||DEFAULT_AR_R2)}\n`;
    if(p.arR3On!==false)txt+=`- ${(p.arR3||DEFAULT_AR_R3)}\n`;
    if(p.arR4On!==false)txt+=`- ${(p.arR4||DEFAULT_AR_R4)}\n`;
    secN++;
  }

  if(withObj){
    txt+=`##${secN}. Clasificación por objetivo\n`;
    txt+=`Clasifica cada pregunta en el objetivo de esta lista que mejor le corresponda y anota su número en "obj":\n`;
    objList.forEach((o,i)=>{txt+=`[${i+1}] ${o}${isWeak(o)?' ⟵ PRIORITARIO':''}\n`;});
    txt+=`- "obj" debe ser uno de los números de la lista; nunca inventes uno que no aparezca. Si no encaja con claridad, omite "obj".\n`;
    if(weakSet.length){
      const rest=100-PACK_FOCUS_PRIORITY_PCT;
      txt+=`- FOCO (suave): concentra MÁS preguntas en los objetivos marcados PRIORITARIO (los menos dominados), pero cubre también el resto del bloque para no repetir. Reparte aprox. ${PACK_FOCUS_PRIORITY_PCT}% a los prioritarios y ${rest}% al resto.\n`;
    }
  }

  txt+=`\n#Enfoque de cada cuestionario:\n`;
  PACK_STYLES.forEach((s,i)=>{
    txt+=`\n### ${i+1} — «${s.name}» (clave "${blockKey} ${s.name}")\n`;
    txt+=`- Dificultad: ${s.easy}% FÁCIL / ${s.med}% MEDIA / ${s.hard}% DIFÍCIL\n`;
    txt+=`- Longitud máx. enunciado: ${s.lenPreg.easy}/${s.lenPreg.med}/${s.lenPreg.hard} palabras (fácil/media/difícil)\n`;
    txt+=`- Pensamiento: ${s.cognicion||DEFAULT_COGNICION}\n`;
    if(s.extra)txt+=`- Enfoque: ${s.extra}\n`;
  });

  txt+=`\n#Formato requerido:\n`;
  txt+=`Devuelve SOLO un OBJETO JSON válido, sin texto ni markdown. Empieza con \`{\` y termina con \`}\`. Una clave por cuestionario, su valor es el array de ${numQ} preguntas:\n`;
  txt+='```\n{\n';
  PACK_STYLES.forEach((s,i)=>{txt+=`  "${blockKey} ${s.name}": [ ...${numQ} preguntas... ]${i<PACK_STYLES.length-1?',':''}\n`;});
  txt+='}\n```\n';
  const objField=withObj?`, "obj": 1`:``;
  txt+=`Cada pregunta: \`{"id": "${prefix}-Q01", "question": "texto", "options": ${optArr}, "correct": 0, "difficulty": "FÁCIL", "explicacion": "Breve."${objField}, "tpl": "RT"}\`\n`;
  txt+=`- la CLAVE empieza SIEMPRE por "${blockKey}" + el nombre del enfoque (clasifica el cuestionario en su bloque; no la cambies).\n`;
  txt+=`- \`id\` OBLIGATORIO, empieza por el prefijo de bloque ${prefix} (${prefix}-Q01, Q02…) reiniciando en cada cuestionario; ese prefijo clasifica la pregunta. \`correct\`: índice 0-${numOpc-1}. \`difficulty\`: FÁCIL/MEDIA/DIFÍCIL. \`explicacion\`: máx. 30 palabras.`;
  if(withObj)txt+=` \`obj\`: número del objetivo; omítelo si no encaja.`;
  txt+=`\n- \`tpl\` identifica el estilo del cuestionario y es DISTINTO en cada uno: usa "${TPL_ID_TO_ABBR[PACK_STYLES[0].id]||'RT'}" en todas las preguntas del cuestionario «${PACK_STYLES[0].name}», "${TPL_ID_TO_ABBR[PACK_STYLES[1].id]||'AP'}" en las de «${PACK_STYLES[1].name}» y "${TPL_ID_TO_ABBR[PACK_STYLES[2].id]||'AR'}" en las de «${PACK_STYLES[2].name}». No lo omitas.`;
  return txt;
}

function buildAnyPromptText(p,mode){
  if(p&&p.kind==='pack')return buildPackPromptText(p);
  if(p&&p.kind==='simulacro')return buildSimulacroPromptText(p);
  return mode==='compact'?buildPromptTextCompact(p):buildPromptText(p);
}

// ── Terminal ─ easter egg logo long-press ─────────────────────────────────────

function TerminalEasterEgg({seqIdx,onClose,onNext}){
  const bodyRef=useRef(null);
  const timersRef=useRef([]);

  useEffect(()=>{
    timersRef.current.forEach(clearTimeout);
    timersRef.current=[];
    const body=bodyRef.current;
    if(!body)return;
    body.innerHTML='';
    const seq=TERM_SEQS[seqIdx%TERM_SEQS.length];
    seq.forEach(item=>{
      const el=document.createElement('div');
      el.className='terminal-line '+item.cls;
      if(item.cursor){
        el.innerHTML='<span class="tl-prompt">'+item.text+'</span><span class="terminal-cursor"></span>';
      }else if(item.suffix){
        el.innerHTML='<span class="'+item.cls+'">'+item.text+'</span><span class="tl-cmd">'+item.suffix+'</span>';
      }else{
        el.textContent=item.text;
      }
      body.appendChild(el);
      const t=setTimeout(()=>{el.classList.add('tl-vis');body.scrollTop=body.scrollHeight;},item.delay);
      timersRef.current.push(t);
    });
    return()=>timersRef.current.forEach(clearTimeout);
  },[seqIdx]);

  const skipAll=()=>{
    timersRef.current.forEach(clearTimeout);
    timersRef.current=[];
    if(bodyRef.current)bodyRef.current.querySelectorAll('.terminal-line').forEach(el=>el.classList.add('tl-vis'));
  };

  return React.createElement('div',{className:'terminal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    React.createElement('div',{className:'terminal-box'},
      React.createElement('div',{className:'terminal-titlebar'},
        React.createElement('div',{className:'terminal-dot',style:{background:'#ff5f57'}}),
        React.createElement('div',{className:'terminal-dot',style:{background:'#febc2e'}}),
        React.createElement('div',{className:'terminal-dot',style:{background:'#28c840'}}),
        React.createElement('div',{className:'terminal-title'},U().strings.terminalTitle)
      ),
      React.createElement('div',{className:'terminal-body',ref:bodyRef}),
      React.createElement('div',{className:'terminal-footer'},
        React.createElement('button',{className:'terminal-btn',onClick:onNext},'↻ Nueva sesión'),
        React.createElement('button',{className:'terminal-btn',style:{marginLeft:'auto'},onClick:skipAll},'▶▶ Saltar'),
        React.createElement('button',{className:'terminal-btn',onClick:onClose},'✕ Cerrar')
      )
    )
  );
}

const SMITH_COOLDOWN_MS = 45 * 60 * 1000; // 45 minutos (fallback por defecto)

// El duelo (villano vs héroe + mentor) está disponible si el universo activo lo
// declara: Matrix vía su adaptador, los demás vía u.duel. Antes era exclusivo de
// Matrix; ahora es una característica generalizada de los universos.
function smithUniverseEnabled(){ return getDuel()!==null; }

// Cooldown efectivo: el del duelo (cooldownMin) o el por defecto.
function duelCooldownMs(){
  const d=getDuel();
  const m = d && typeof d.cooldownMin==='number' && d.cooldownMin>0 ? d.cooldownMin : 45;
  return m*60*1000;
}

function canShowSmith(){
  if(!smithUniverseEnabled()) return false;
  try{
    const last = parseInt(localStorage.getItem('quiz_smith_last')||'0',10);
    return Date.now() - last > duelCooldownMs();
  }catch{return true;}
}
function markSmithShown(){
  try{localStorage.setItem('quiz_smith_last', String(Date.now()));}catch{}
}

// Resurrection: solo aparece una vez por racha rota (se resetea cuando la racha vuelve a estar viva)
function canShowSmithResurrection(streakAlive){
  if(streakAlive) return false; // racha aún viva, no aplica
  try{return !localStorage.getItem('quiz_smith_resurrection_shown');}catch{return false;}
}
function markSmithResurrectionShown(){
  try{localStorage.setItem('quiz_smith_resurrection_shown','1');}catch{}
}
function clearSmithResurrectionFlag(){
  // Se llama cuando la racha vuelve a estar viva (el usuario ha retomado)
  try{localStorage.removeItem('quiz_smith_resurrection_shown');}catch{}

// Pools planos de SOLO las burlas del villano (para el texto de Esmiz). Se generan
// desde SMITH_EXCHANGES. Como el villano resuelve su frase por rol (v / vTrini),
// estos pools guardan el ÍNDICE del intercambio, no el texto, para luego casar la
// réplica. La selección real se hace en pickMatrixExchange().
const SMITH_PHRASES = SMITH_EXCHANGES.neutral.map(e=>e.v);                 // compat: alguien podría leerlo
const SMITH_PHRASES_RESURRECTION = SMITH_EXCHANGES.resurrection.map(e=>e.v);
const SMITH_PHRASES_ORACLE = SMITH_EXCHANGES.oracle.map(e=>e.v);

// Elige un intercambio (burla + réplica) coherente con el rol del héroe.
// Devuelve {villainPhrase, heroRemate}. heroKey ∈ 'neo'|'trinity'.
function pickMatrixExchange(mode, heroKey){
  const list = SMITH_EXCHANGES[mode] || SMITH_EXCHANGES.neutral;
  const ex = getRandFrom(list);
  const isTrini = heroKey==='trinity';
  // El villano usa la variante de Trini (sin "Anderson") si existe y el héroe es Trini.
  const villainPhrase = (isTrini && ex.vTrini) ? ex.vTrini : ex.v;
  // La réplica sale del set del personaje atado a ESTA burla → siempre coherente.
  const remates = isTrini ? (ex.trini||ex.neo) : (ex.neo||ex.trini);
  const heroRemate = (Array.isArray(remates) && remates.length) ? getRandFrom(remates) : 'Esto aún no ha terminado.';
  return {villainPhrase, heroRemate};
}

// ── Sistema de DUELO generalizado (villano → héroe → mentor) ──────────────────
// El easter egg de Matrix (Smith vs Neo/Trinity) se reexpresa como un "duelo"
// estándar, y cualquier universo puede declarar el suyo en u.duel. Estructura:
//   duel: {
//     villainName, heroName, mentorName,
//     heroSvg|villainSvg|mentorSvg (opcionales; si faltan → arquetipos),
//     villain:    { neutral:[…], resurrection:[…], oracle:[…] },
//     heroRemates:[…],
//     mentorLines:[…]   // frase de ánimo final (opcional)
//   }
// Matrix conserva EXACTAMENTE sus SVG y frases vía este adaptador.
const DUEL_MATRIX = {
  villainName:'Esmiz', heroName:'Nio', mentorName:'Mor-feo',
  villainSvg:SVG_SMITH,
  mentorSvg:SVG_MORPHEUS,
  // Matrix elige héroe Neo/Trinity según el rol; lo resolvemos en el componente.
  villain:{ neutral:SMITH_PHRASES, resurrection:SMITH_PHRASES_RESURRECTION, oracle:SMITH_PHRASES_ORACLE },
  // Matrix usa intercambios EMPAREJADOS (burla↔réplica por rol) vía pickMatrixExchange;
  // ya no hay pool de remates suelto (eso causaba réplicas incoherentes).

  mentorLines:[
    "Te he traído hasta aquí. El resto del camino lo recorres tú.",
    "No te he enseñado para que ganes. Te he enseñado para que sepas que puedes.",
    "Recuerda: solo intento abrirte la puerta. Eres tú quien debe cruzarla.",
    "Hay una diferencia entre conocer el camino y recorrerlo. Tú ya lo recorres.",
    "No te pido que creas en mí. Te pido que empieces a creer en ti.",
    "El examen pondrá a prueba lo que sabes. Yo sé lo que eres capaz de aprender.",
  ],
  cooldownMin:45,
};

// Devuelve el bloque de duelo del universo activo (Matrix usa su adaptador; los
// demás, su u.duel si lo tienen). null = el universo no tiene duelo configurado.
function getDuel(){
  if(ACTIVE_UNIVERSE==='matrix') return DUEL_MATRIX;
  const u=U();
  return (u && u.duel && typeof u.duel==='object') ? u.duel : null;
}

// Elige un remate de héroe genérico (universos no-Matrix). Sin la restricción del
// nombre (esa es específica de Neo/Smith).
function pickGenericRemate(duel){
  const pool=(duel && Array.isArray(duel.heroRemates) && duel.heroRemates.length)?duel.heroRemates:['Esto aún no ha terminado.'];
  return getRandFrom(pool);
}

// Helper: renderiza una "cara" del duelo. Si el universo aporta una imagen
// (img: URL o dataURL) la usa; si no, pinta el SVG (que hereda el acento).
function duelFace(img, svg){
  if(img && typeof img==='string' && img.trim()){
    return React.createElement('img',{className:'duel-photo',src:img,alt:''});
  }
  return React.createElement('div',{style:{width:'100%',height:'100%'},dangerouslySetInnerHTML:{__html:svg}});
}

function SmithEasterEgg({role, mode, onClose, onContinue, forceMentor}){
  // mode: 'neutral' | 'resurrection' | 'oracle' | 'random'
  //  - neutral/resurrection/oracle: duelo según el contexto (frase del villano del pool del modo).
  //  - random: invocación manual (long-press en la Racha) → escena ALEATORIA de las tres
  //    (villano solo / héroe solo / mentor solo), como sorpresa. Ignora cooldown (se controla fuera).
  // Componente generalizado: Matrix usa su adaptador (Smith/Neo/Trinity); otros
  // universos usan u.duel + siluetas-arquetipo. Fases:
  // 0 villano aparece · 1 burbuja villano · 2 VS · 3 héroe+remate · 4 mentor · 5 hint
  const [phase, setPhase] = useState(0);
  const duel = useRef(getDuel()).current;
  const isMatrix = ACTIVE_UNIVERSE==='matrix';

  // Resolución de contenido del duelo.
  const resolved = useRef((function(){
    if(!duel){ return null; }
    // Nombres de quién habla (Matrix resuelve héroe por rol; el resto usa duel.*Name).
    const villainName = duel.villainName || 'El villano';
    let heroName, mentorName;
    if(isMatrix){
      const hk = (role==='neo'||role==='trinity') ? role : 'neo';
      heroName = hk==='neo' ? (U().roles.a.name||'Neo') : (U().roles.b.name||'Trinity');
    } else {
      heroName = duel.heroName || 'El héroe';
    }
    mentorName = duel.mentorName || 'El mentor';

    // Frase del villano + réplica del héroe.
    // - Matrix: intercambio EMPAREJADO (burla↔réplica) coherente por rol, en una
    //   sola elección. Resuelve que Esmiz no llame "Sr. Anderson" a Trini y que la
    //   réplica siempre pegue con la burla.
    // - Otros universos: burla aleatoria del pool + remate genérico (sin emparejar).
    const vmode = (mode==='random') ? 'neutral' : mode;
    let villainPhrase, heroSvg, heroRemate;
    if(isMatrix){
      const heroKey = (role==='neo'||role==='trinity') ? role : 'neo';
      const ex = pickMatrixExchange(vmode, heroKey);
      villainPhrase = ex.villainPhrase;
      heroRemate = ex.heroRemate;
      heroSvg = heroKey==='neo' ? SVG_NEO : SVG_TRINITY;
    } else {
      const vpool = (duel.villain && (duel.villain[vmode]||duel.villain.neutral)) || [];
      villainPhrase = vpool.length ? getRandFrom(vpool) : '…';
      heroSvg = duel.heroSvg || SVG_ARCH_HERO;
      heroRemate = pickGenericRemate(duel);
    }
    const villainSvg = duel.villainSvg || SVG_ARCH_VILLAIN;
    // Imágenes opcionales por personaje (URL o dataURL). Tienen prioridad sobre el SVG.
    const villainImg = duel.villainImg || null;
    const heroImg    = duel.heroImg    || null;
    const mentorImg  = duel.mentorImg  || null;
    // Mentor (opcional).
    const hasMentorContent = Array.isArray(duel.mentorLines) && duel.mentorLines.length>0;
    const mentorSvg = duel.mentorSvg || SVG_ARCH_MENTOR;
    const mentorLine = hasMentorContent ? getRandFrom(duel.mentorLines) : null;

    // ¿Qué personajes se muestran en esta escena?
    // - random: UNA de las tres, al azar (sorpresa). El mentor solo entra en la baraja si hay contenido.
    // - automático (neutral/resurrection/oracle): villano + héroe siempre; mentor RARO y condicionado
    //   (la decisión de mostrarlo llega ya tomada vía duel.__showMentor, fijado por quien dispara).
    let showVillain=true, showHero=true, showMentor=false;
    if(mode==='random'){
      const cast=['villain','hero'];
      if(hasMentorContent) cast.push('mentor');
      const pick=getRandFrom(cast);
      showVillain = pick==='villain';
      showHero    = pick==='hero';
      showMentor  = pick==='mentor';
    } else {
      showMentor = hasMentorContent && !!forceMentor;
    }
    return {villainName,heroName,mentorName,villainPhrase,heroSvg,heroRemate,villainSvg,
            villainImg,heroImg,mentorImg,mentorSvg,mentorLine,showVillain,showHero,showMentor};
  })()).current;

  useEffect(()=>{
    if(!resolved) return;
    const ts=[];
    // Tiempos según qué se muestra. Cada bloque visible avanza una fase.
    if(resolved.showVillain && resolved.showHero){
      // Duelo completo (villano → héroe [→ mentor]).
      ts.push(setTimeout(()=>setPhase(1),200));
      ts.push(setTimeout(()=>setPhase(2),1800));
      ts.push(setTimeout(()=>setPhase(3),2600));
      if(resolved.showMentor){
        ts.push(setTimeout(()=>setPhase(4),4000));
        ts.push(setTimeout(()=>setPhase(5),5200));
      } else {
        ts.push(setTimeout(()=>setPhase(5),3800));
      }
    } else {
      // Escena de un solo personaje (modo random): aparición + hint.
      ts.push(setTimeout(()=>setPhase(1),200));
      ts.push(setTimeout(()=>setPhase(4),200)); // por si es solo mentor
      ts.push(setTimeout(()=>setPhase(5),2200));
    }
    return()=>ts.forEach(clearTimeout);
  },[]);

  // En modo oráculo el botón de cierre continúa al test
  const isOracle = mode==='oracle';
  const hintText = isOracle ? '[ clic para entrar al test ]' : '[ haz clic para cerrar ]';
  const handleClick = isOracle && onContinue ? onContinue : onClose;

  // Si el universo no tiene duelo configurado, no renderizamos nada (cierre seguro).
  if(!resolved) return null;

  const children=[];

  // Villano (silueta/imagen + nombre + frase)
  if(resolved.showVillain){
    children.push(React.createElement('div',{key:'vs',className:'duel-speaker villain'+(phase>=1?' vis':'')}, resolved.villainName));
    children.push(React.createElement('div',{key:'vf',className:'smith-silhouette'+(phase>=1?' vis':'')},
      duelFace(resolved.villainImg, resolved.villainSvg)));
    children.push(phase>=1&&React.createElement('div',{key:'vb',className:'smith-bubble'+(phase>=1?' vis':'')}, resolved.villainPhrase));
  }

  // Separador solo si hay villano Y héroe
  if(resolved.showVillain && resolved.showHero){
    children.push(React.createElement('div',{key:'sep',className:'smith-vs'+(phase>=2?' vis':'')},'— — —'));
  }

  // Héroe (nombre + silueta/imagen + remate)
  if(resolved.showHero){
    const hv = resolved.showVillain ? phase>=3 : phase>=1; // si va solo, aparece ya
    children.push(React.createElement('div',{key:'hs',className:'duel-speaker hero'+(hv?' vis':'')}, resolved.heroName));
    children.push(React.createElement('div',{key:'hw',className:'smith-hero-wrap'+(hv?' vis':'')},
      React.createElement('div',{className:'smith-hero-sil'}, duelFace(resolved.heroImg, resolved.heroSvg)),
      React.createElement('div',{className:'smith-remate'},resolved.heroRemate)
    ));
  }

  // Mentor (nombre + silueta/imagen + frase de ánimo)
  if(resolved.showMentor){
    const mv = (resolved.showVillain && resolved.showHero) ? phase>=4 : phase>=4||phase>=1;
    children.push(React.createElement('div',{key:'ms',className:'duel-speaker mentor'+(mv?' vis':'')}, resolved.mentorName));
    children.push(React.createElement('div',{key:'mw',className:'smith-mentor-wrap'+(mv?' vis':'')},
      React.createElement('div',{className:'smith-mentor-sil'}, duelFace(resolved.mentorImg, resolved.mentorSvg)),
      React.createElement('div',{className:'smith-mentor-line'},resolved.mentorLine)
    ));
  }

  // Hint
  children.push(React.createElement('div',{key:'hint',className:'smith-hint'+(phase>=5?' vis':'')}, hintText));

  return React.createElement('div',{className:'smith-overlay',onClick:handleClick},
    React.createElement('div',{className:'smith-box',onClick:e=>e.stopPropagation()}, children)
  );
}

// ── Efectos de celebración (100% aciertos) ───────────────────────────────────
// Cada efecto pinta SOLO su canvas de fondo (260px de alto). El overlay de
// estadísticas (100% / correctas / preguntas / cita) es COMPARTIDO y agnóstico,
// vive en CelebrationOverlay. La invocación se desacopla por EFFECT_REGISTRY,
// que mapea U().effect → componente de fondo. Para añadir un universo nuevo con
// efecto propio basta con: (1) crear su componente de fondo y (2) registrarlo.

// Lee el acento computado del universo activo (canvas no resuelve var(--accent)).
function readAccentHex(fallback){
  return (getComputedStyle(document.body).getPropertyValue('--accent')||fallback).trim()||fallback;
}

// Color del EFECTO de celebración. Si el universo define "effectColor" (HEX válido)
// se usa ese; si no, cae al acento del universo. Permite, p. ej., acento amarillo
// (Star Wars) con hiperespacio blanco-azulado. fallback se usa si todo falla.
function readEffectHex(fallback){
  try{
    const ec=U().effectColor;
    if(typeof ec==='string' && /^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(ec.trim())){
      const v=ec.trim();
      return v.charAt(0)==='#'?v:('#'+v);
    }
  }catch(e){}
  return readAccentHex(fallback);
}

// Fondo Matrix: lluvia de katakana cayendo, color del acento del universo.
function MatrixRainBg(){
  const canvasRef=useRef(null);
  const animRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const ACCENT_HEX=readEffectHex('#00ff41');
    const W=canvas.offsetWidth||640;
    const H=260;
    canvas.width=W;canvas.height=H;
    const CHARS='アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEFZ<>{}[]|/\\=+*#@$%';
    const COL_W=18;const cols=Math.floor(W/COL_W);
    const drops=Array.from({length:cols},()=>({
      y:Math.random()*-60,speed:0.25+Math.random()*0.55,
      len:8+Math.floor(Math.random()*20),
      chars:Array.from({length:32},()=>CHARS[Math.floor(Math.random()*CHARS.length)]),
      lastSwap:0
    }));
    let frame=0;
    const draw=()=>{
      ctx.fillStyle='rgba(0,0,0,0.16)';ctx.fillRect(0,0,W,H);frame++;
      drops.forEach((drop,ci)=>{
        const x=ci*COL_W+2;
        if(frame-drop.lastSwap>5){
          drop.chars[Math.floor(Math.random()*drop.chars.length)]=CHARS[Math.floor(Math.random()*CHARS.length)];
          drop.lastSwap=frame;
        }
        for(let i=0;i<drop.len;i++){
          const yPos=Math.floor(drop.y-i)*COL_W;
          if(yPos<0||yPos>H)continue;
          if(i===0){ctx.fillStyle='#ffffff';ctx.shadowColor=ACCENT_HEX;ctx.shadowBlur=8;}
          else if(i<3){ctx.fillStyle=ACCENT_HEX;ctx.shadowColor=ACCENT_HEX;ctx.shadowBlur=4;}
          else{const f=1-(i/drop.len)*0.85;ctx.fillStyle=`rgba(0,${Math.floor(200*f+55)},${Math.floor(40*f)},${f})`;ctx.shadowBlur=0;}
          ctx.font=`${i===0?600:400} 13px 'DM Mono',monospace`;
          ctx.fillText(drop.chars[i%drop.chars.length],x,yPos);
        }
        ctx.shadowBlur=0;drop.y+=drop.speed;
        if(drop.y*COL_W>H+drop.len*COL_W&&Math.random()<0.015){
          drop.y=Math.random()*-20;drop.speed=0.25+Math.random()*0.55;drop.len=8+Math.floor(Math.random()*20);
        }
      });
      animRef.current=requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[]);
  return React.createElement('canvas',{ref:canvasRef,style:{height:260,background:'#000'}});
}

// Fondo Tron: estelas de moto de luz (light cycles). Líneas de neón que avanzan
// dejando rastro y giran SIEMPRE en ángulo recto, sobre una rejilla tenue. Toman
// el color del acento (cian Tron) del universo activo.
function TronTrailsBg(){
  const canvasRef=useRef(null);
  const animRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const ACCENT_HEX=readEffectHex('#00e5ff');
    const W=canvas.offsetWidth||640;
    const H=260;
    canvas.width=W;canvas.height=H;
    const DIRS=[[1,0],[-1,0],[0,1],[0,-1]];
    // Una segunda estela en un tono cálido (naranja Tron) para el contraste clásico.
    const RIVAL_HEX='#ff9d2f';
    const makeCycle=(color,glow)=>{
      const edge=Math.floor(Math.random()*4);
      let x,y,d;
      if(edge===0){x=0;y=Math.random()*H;d=0;}
      else if(edge===1){x=W;y=Math.random()*H;d=1;}
      else if(edge===2){x=Math.random()*W;y=0;d=2;}
      else{x=Math.random()*W;y=H;d=3;}
      return {x,y,d,color,glow,speed:1.6+Math.random()*1.1,
        trail:[{x,y}],sinceTurn:0,nextTurn:30+Math.floor(Math.random()*70)};
    };
    let cycles=[makeCycle(ACCENT_HEX,true),makeCycle(ACCENT_HEX,true),makeCycle(RIVAL_HEX,false)];
    const step=(c)=>{
      const [dx,dy]=DIRS[c.d];
      c.x+=dx*c.speed;c.y+=dy*c.speed;c.sinceTurn++;
      // Giro en ángulo recto al alcanzar el contador, o rebote girando al tocar borde.
      const hitEdge=c.x<2||c.x>W-2||c.y<2||c.y>H-2;
      if(c.sinceTurn>=c.nextTurn||hitEdge){
        const perp=(c.d===0||c.d===1)?[2,3]:[0,1];
        c.d=perp[Math.floor(Math.random()*2)];
        c.sinceTurn=0;c.nextTurn=30+Math.floor(Math.random()*70);
        c.x=Math.max(2,Math.min(W-2,c.x));c.y=Math.max(2,Math.min(H-2,c.y));
        c.trail.push({x:c.x,y:c.y});
      }
      // Punto de rastro periódico (el segmento recto se dibuja entre vértices).
      const last=c.trail[c.trail.length-1];
      if(Math.abs(last.x-c.x)+Math.abs(last.y-c.y)>1.5)c.trail.push({x:c.x,y:c.y});
      if(c.trail.length>90)c.trail.shift();
    };
    const draw=()=>{
      // Estela larga: fundido sutil para que el rastro persista varios frames.
      ctx.fillStyle='rgba(2,6,12,0.10)';ctx.fillRect(0,0,W,H);
      // Rejilla tenue de fondo (estética Grid).
      ctx.strokeStyle='rgba(80,160,200,0.06)';ctx.lineWidth=1;
      ctx.beginPath();
      for(let gx=0;gx<=W;gx+=40){ctx.moveTo(gx,0);ctx.lineTo(gx,H);}
      for(let gy=0;gy<=H;gy+=40){ctx.moveTo(0,gy);ctx.lineTo(W,gy);}
      ctx.stroke();
      cycles.forEach(c=>{
        step(c);
        // Rastro de neón.
        ctx.beginPath();
        ctx.moveTo(c.trail[0].x,c.trail[0].y);
        for(let i=1;i<c.trail.length;i++)ctx.lineTo(c.trail[i].x,c.trail[i].y);
        ctx.lineTo(c.x,c.y);
        ctx.strokeStyle=c.color;ctx.lineWidth=2.4;
        ctx.shadowColor=c.color;ctx.shadowBlur=c.glow?12:8;
        ctx.lineJoin='miter';ctx.lineCap='square';
        ctx.stroke();
        // Cabeza brillante (la "moto").
        ctx.shadowBlur=14;ctx.fillStyle='#ffffff';
        ctx.fillRect(c.x-2.5,c.y-2.5,5,5);
        ctx.shadowBlur=0;
      });
      animRef.current=requestAnimationFrame(draw);
    };
    // Fondo inicial sólido oscuro para que el primer fundido no parpadee.
    ctx.fillStyle='#02060c';ctx.fillRect(0,0,W,H);
    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[]);
  return React.createElement('canvas',{ref:canvasRef,style:{height:260,background:'#02060c'}});
}

// Salto al hiperespacio: campo de estrellas que parten del centro y se estiran en
// líneas radiales hacia los bordes, como atravesar un túnel de luz. La punta de
// cada estela usa el acento del universo; el cuerpo funde a blanco. Hay un breve
// "destello" inicial de aceleración. Pensado para franquicias espaciales.
function HyperspaceBg(){
  const canvasRef=useRef(null);
  const animRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const ACCENT_HEX=readEffectHex('#4d9fff');
    const W=canvas.offsetWidth||640;
    const H=260;
    canvas.width=W;canvas.height=H;
    const cx=W/2, cy=H/2;
    const NUM=180;
    // Cada estrella vive en coordenadas (ángulo, distancia desde el centro). Al
    // avanzar, la distancia crece de forma acelerada → la estela se alarga y se va
    // más rápido cuanto más lejos, dando la sensación de aceleración al hiperespacio.
    const makeStar=(spread)=>{
      const ang=Math.random()*Math.PI*2;
      return {
        ang,
        dist: Math.random()* (spread||40),         // empieza cerca del centro
        speed: 0.6+Math.random()*1.1,
        len: 0                                      // longitud de la estela (px)
      };
    };
    let stars=Array.from({length:NUM},()=>makeStar(Math.max(W,H)/2));
    const maxR=Math.sqrt(cx*cx+cy*cy)+20;
    let warp=0;                                     // 0→1 destello/aceleración inicial
    const draw=()=>{
      // Fondo negro profundo con leve persistencia para que las estelas dejen rastro.
      ctx.fillStyle='rgba(2,4,12,0.35)';ctx.fillRect(0,0,W,H);
      if(warp<1) warp+=0.02;
      const boost=0.6+warp*1.6;                     // arranca lento y acelera
      stars.forEach(s=>{
        const prevDist=s.dist;
        // Aceleración radial: cuanto más lejos del centro, más rápido (túnel).
        s.dist += s.speed*boost*(1+s.dist/maxR*3);
        s.len = Math.min(60, (s.dist-prevDist)*4 + s.dist*0.08);
        const sx=cx+Math.cos(s.ang)*s.dist;
        const sy=cy+Math.sin(s.ang)*s.dist;
        const tx=cx+Math.cos(s.ang)*(s.dist-s.len);
        const ty=cy+Math.sin(s.ang)*(s.dist-s.len);
        // Color: punta acento, cola blanca; brillo crece con la distancia.
        const t=Math.min(1,s.dist/maxR);
        const grad=ctx.createLinearGradient(tx,ty,sx,sy);
        grad.addColorStop(0,'rgba(255,255,255,0)');
        grad.addColorStop(0.6,'rgba(255,255,255,'+(0.5*t+0.2)+')');
        grad.addColorStop(1,ACCENT_HEX);
        ctx.strokeStyle=grad;
        ctx.lineWidth=0.6+t*1.8;
        ctx.shadowColor=ACCENT_HEX;ctx.shadowBlur=6*t;
        ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(sx,sy);ctx.stroke();
        // Recicla la estrella al salir de pantalla → flujo continuo.
        if(s.dist>maxR){ const ns=makeStar(8); s.ang=ns.ang; s.dist=ns.dist; s.speed=ns.speed; s.len=0; }
      });
      ctx.shadowBlur=0;
      animRef.current=requestAnimationFrame(draw);
    };
    ctx.fillStyle='#02040c';ctx.fillRect(0,0,W,H);
    draw();
    return()=>cancelAnimationFrame(animRef.current);
  },[]);
  return React.createElement('canvas',{ref:canvasRef,style:{height:260,background:'#02040c'}});
}

// Registro de efectos: U().effect (string) → componente de fondo.
const EFFECT_REGISTRY={
  matrixRain:MatrixRainBg,
  tronTrails:TronTrailsBg,

};
